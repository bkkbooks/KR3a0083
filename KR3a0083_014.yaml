body:
  text: 東溪日談録卷十四明周琦撰史系談下西晉魏晉王司馬炎漢亡廢魏元帝為陳留王遂篡其位而為晉武帝者其志起於司馬懿之將蜀司馬師之廢立司馬昭之稱公取蜀所致也故即位之初追祖懿為宣帝伯父師為景帝父昭為文帝而報本焉或曰禪然乎以愚觀之炎世臣魏也非臣漢也篡魏也非篡漢也謂晉為魏之賊則可謂為漢之賊則未可故亡漢者魏也非晉也篡魏者晉也非禪也晉將取漢先借魏而亡之謂用心之逺則可謂篡漢其可乎武帝後惠帝之世賈后亂政諸王攻屠天下大亂家固不齊也懷帝之世兄弟相屠者三人而惠帝其一家亦不齊也遷陷洛陽為漢劉聰所弒愍帝以懷帝遇害即位長安漢劉曜陷長安而降之是以家之不齊故外患得以乘其機西晉之衰也有自矣西晉都洛陽懷帝被陷愍帝即位長安亦陷傳四主共五十二年有名睿者懷帝之世為安東將軍鎮建業起而為東晉焉東晉晉元帝司馬睿乃懿曾孫或曰睿母通小吏牛金而生焉常為安東將軍鎮建業漢劉聰陷懷帝於洛陽劉曜陷愍帝於長安羣臣以王導為謀主請即位建業晉之業復焉元帝後有明帝者負明斷之資不能剪王敦之亂成帝以幼沖之年庾太后臨朝厥後庾氷立太后之弟曰康帝康帝傳其子曰穆帝褚太后臨朝又傳康帝弟曰哀帝哀帝傳其母弟曰帝奕至奕始降為海西公桓溫立會稽王曰簡文帝其子嗣之曰孝武帝能用謝安以敗苻堅之衆至傳其子曰安帝為桓玄所逼劉裕弒之又傳其次子曰恭帝亦劉裕所篡尋弒之夫晉自洛陽之衰更姓者三元帝為牛金之子一也康帝為成帝之母弟二也帝奕為哀帝之母弟三也竊司馬氏姓實非其𣲖帝奕之亂喪於劉裕之手也豈無自哉東晉都建業傳十一主其别洛陽為西晉建業為東晉者皆後世之稱也南朝南朝之地亦都建業蓋晉傳宋宋傳齊齊傳梁梁傳陳自吳至此凡六朝也南宋晉宋王彭城劉裕是為宋武帝者先為晉下邳太守晉相國桓玄逼晉安帝禪位裕討平之至裕為相國封宋公廢安帝而弒之恭帝立又弒之以愚觀之裕為安帝討桓玄除虺蜴也至弒安帝已有心於篡矣所忌者帝之弟德文耳及德文立而見弒裕遂自稱帝焉肆虎狼也除虺蜴而肆虎狼君子之事君也肯為是哉武帝後繼之以少文孝武廢明蒼梧順通八主其間被弒者六宫車宴駕得正而殂者二檀道濟弒少帝太子劭弒文帝臣下弒廢帝蕭道成弒蒼梧王又弒順帝宋遂亡夫劉裕弒安順二主以取帝位故其後也被弒多矣此天道之好還也湯武固征伐矣其於桀紂曾弒之乎南宋都建業傳八主共六十年南齊宋齊王蘭陵蕭道成弒宋順帝滅其族而篡其位是為齊髙祖者事宋明帝時帝以太子弱諸弟強憂之用道成盡殺諸弟既而太子昱立為蒼梧王復嗜殺中外恐懼道成遂弒之立凖是為順帝道成之權自是益重故袁粲謀殺之事泄父子皆為道成所殺已而順帝亦禪位道成尋弒之誅其族其事與劉裕等皆操戈入室導人之殺已也雖曰治天下使黃金同土價何為哉髙祖之後繼以武鬱林海陵明東昏和通七主其間亦被弒者四宫車晏駕正殂者三蕭鸞弒鬱林王海陵王國人弒東昏侯蕭衍弒和帝而篡之齊亡焉夫蕭鸞蕭衍齊疏族也弒主以夷其族而復篡之因齊王為梁天道好還若為宋矣厥後梁亦四主而亡非還之尤速乎南齊亦都建業傳七主共二十三年祚之尤促者也南梁齊梁王蕭衍乃齊疏族弒齊和帝而篡其位是為梁武帝者嘗為齊南雍州刺史知齊將亂密修武備起兵入建康為齊相國封梁王已而篡齊和帝廢為巴陵王尋弒之遂稱帝後為侯景所逼憂憤而殂北魏於此始分東魏於洛陽西魏於長安其混亂也孰甚於是武帝之信浮屠非徒信而已乃酷信之宗廟為之不得血食侯景既逼憂憤而殂景立太子綱復弒而篡之先次子繹封湘東王者與王僧辨起兵及陳霸先亦起兵共誅景建康大亂故繹復江陵即位未幾西魏陷江陵帝繹出降為魏人所殺繹之子方智封晉安王者因江陵之陷即位建康故陳霸先得以篡之梁遂亡夫以疏族之親連弒骨肉以取天下尚浮屠足保乎况身為天子宗廟不能血食大本已失故浮屠愈尚國祚愈促吾道足信他道之不足信也明矣南梁都建康遷江陵又復建康共四主五十七年之間奔走不暇也南陳梁陳王吳興陳霸先篡梁敬帝是為陳武帝者以梁武帝為侯景所逼而殂梁湘東王繹並霸先起兵斬景尸送建康霸先於此已有篡志所忌者湘東王繹晉安王方智耳故繹不敢即位建康復江陵不幸西魏破之至晉安王方智始又即位建康故為霸先所篡廢為江隂王霸先遂稱帝焉噫國本弱而為之扶植不窺伺以生僭亂者幾何人哉武帝後繼以文帝臨海王宣帝者皆安靜守成國體不搖至於後主奢華酒色近習用事將士解體隋兵起焉故後主被虜而陳遂亡南陳都建康傳五主共三十二年自吳至此止六朝雖後梁復王都江陵耳後梁後梁宣帝名察者昭明太子統之子也見侯景作亂簡文帝被弒奔西魏西魏立為梁王徙江陵使稱帝故為宣帝傳明帝後主共三世隋既虜陳後主滅陳已而亦廢其國夫陳滅梁隋滅陳去梁已三十餘年子孫之依於人者自忿前烈起而國焉不幸無繼絶世舉廢國者安得而不亡哉惟西魏德之則華夏之不如夷狄也後梁都江陵傳三主共二十三年北朝北朝之主初都平城北魏時也後分西魏都長安東魏都洛陽南朝梁武帝時也魏併諸國始有北朝之地其後分為東魏西魏東魏傳北齊西魏傳後周後周併北齊遂傳隋焉北魏朔野南侵而為北魏道武帝者姓拓拔名圭本朔野君長併十六國奄有北方建國號魏遂稱帝都平城傳明元帝又能開拓境土太武帝復侵宋降涼自淮以北悉有之文成帝能懷集中外民心復安獻文帝禪位太子自稱太上皇孝文帝變左袵之俗改拓拔之姓為元氏宣武帝魏政漸衰孝明帝六歲即位胡太后淫穢孝莊帝後長廣王熀廣陵王恭二人為爾朱兆相繼立之熀僅三月恭止二月髙歡起兵誅兆廢恭立朗安定王亦一年耳北魏衰焉於是平陽王修以弒恭與熀懼歡奔長安依宇文泰遂立為西魏故歡立清河王亶之子善見於洛陽是為東魏其事在梁武帝大通二年北魏都平城傳一十三主共一百四十九年東魏東魏靜帝名善見者清河王亶之世子也初平陽王修逼於髙歡奔長安髙歡奉善見即位洛陽年始十一遷都於鄴歡自為大丞相歡死歡之子澄襲爵遂幽帝善見於含章臺澄死弟洋又自為相國封齊王遂廢帝善見而篡其位夫有所與者必有所取東魏之祚得於髙氏之手豈不亦失於髙氏乎東魏都洛陽復都鄴止一主十六年西魏西魏武帝名修者本魏平陽王也以弒恭與熀為髙歡所逼奔長安依宇文泰時文泰有都督關中之權遂以修即帝位泰為丞相卒弒之繼武帝者文帝先為南陽王亦宇文泰立之軍國政事一出於泰故廢帝繼立以誅泰為志謀泄遂為泰廢尋弒之泰遂立恭帝復拓跋之姓泰死子覺嗣爵為太師自稱為周公遂廢帝而篡其位夫東魏之得喪者髙氏也西魏之得喪者宇文氏也得之於彼寧不亦失於彼無足怪也西魏都長安傳四主共二十五年北齊北齊之宣帝髙洋歡之子澄之弟篡東魏靜帝是為北齊其志始於父歡而繼成於兄澄也歡先封齊王而澄洋以次襲爵故國號齊都於鄴或曰禪以豫言之自歡誅兆廢恭徙善見於洛陽而立之已有篡意惜乎早死子澄繼襲幽帝善見亦將篡之惜又早死次子洋又繼則廢善見而篡其位父子相繼為之至是則謀成矣殺元氏七百二十一人而滅其族抑何殘暴如是哉宣帝洋之子殷繼立曰廢帝者洋不豫時殷幼囑其弟常山王演曰奪則任汝慎勿殺之其後演廢殷殺之自立是為昭帝一年墜馬而殂洋之弟湛立曰武成帝者用奢賦重吏民苦之湛之子緯立曰後主者奢侈昏亂周武帝滅之夫爭奪固胡人之遺風矣其謂奪則任汝慎勿殺之臨終遺囑有如是者哀哉北齊傳於東魏共五主歷二十七年建都於鄴蓋自洛徙也後周後周閔帝宇文覺先為西魏太師自稱周公年十五篡魏祚國非覺之所自為矣宇文護為之亦非覺所自志矣宇文泰都督關中時為武帝所依既立之已而又立文帝又立廢帝乘以國本之弱一立一廢又弒之篡奪之心計於一家久矣故至於覺其年雖幼而事有可取之勢護復為之輔焉能不成帝業乎以稱周公故國號周焉閔帝傳明帝傳武帝傳宣帝傳靜帝而共以成此洪休者固護所輔護以閔帝惡已而致其弒明帝明敏亦護所忌護以明帝明敏而進其毒此家庭之禍也宣帝寵后父楊堅佐王室而靜帝則其女之子與吾之孫等耳不佐之乃滅其族以奪之此外戚之禍也禍起於內外族戚之間固骨肉之自相殘矣骨肉相殘其先叔護一人至連弒二帝亦甚焉故楊堅元舅得以乘之遂滅其族而篡其位堅固所謂忍人也其外戚之禍非自家庭以導之乎後周都長安傳五主共二十五年隋南北兩朝為蛙鳴蟬噪之主視唐虞三代秦漢以來之為一統者可恥也故隋起而混一之使歸於一如天無二日矣若無嫌焉但傷殘骨肉為暴橫耳享祚不永冝哉隋文帝楊堅𢎞農人父忠仕魏封隋公至周堅襲爵其女為宣帝后傳靜帝以堅元舅為相進爵隋王未幾篡女之子靜帝之位弒之而滅其族遂自稱帝國號隋焉先是周武帝滅齊執其後主而北朝無出繼之君堅又滅陳虜其後主而南朝無再造之國併南北而歸於一隋固得軻定於一之義矣惜乎得國於殘忍之餘未善焉文帝之次子廣立曰煬帝者先為晉王以后獨孤氏之言廢太子勇立廣為太子後文帝不豫召廣入宫中囑後事文帝以廣逼陳夫人怪之曰畜生何足付大事獨孤誤我將召故太子勇廣聞之遂弒文帝遣人縊殺勇而立焉則煬帝者豈非弒父與兄以嗣帝位者乎及其在位大興宫室求海內竒花異獸以實洛陽顯仁新宫苑囿又自長安西苑引諸水以達河洛淮泗開𨝍溝而入於江旁植以栁又自長安至江都作離宫四十餘處以資遊樂窮奢極欲漫遊無度且徴天下兵集於涿者一百一十三萬餽運者倍之窮兵黷武以伐髙麗取無益之地故四方騷動盜賊競起猶在江都淫酗酒色而無已焉唐公李淵兵入長安立文帝之孫侑代王為帝淵自為丞相煬帝忘返自遙尊為太上皇遂致從臣思歸而謀叛故宇文化及弒之自古人君如是者不多見也安得而不喪乎恭帝侑李淵所立半年而禪於唐淵即帝位其子世民起義兵削平僭亂隋於是乎亡焉隋都長安傳三主共三十七年唐唐髙祖李淵隴西成紀人父炳周封為唐公淵襲爵隋以為𢎞化留守天下盜起以為山西河東撫慰大使承制黜陟討捕羣盜次子世民見隋室方亂隂有安天下之志煬帝南遊不返長安位虛賊盜競起故淵起兵入長安以代王侑即位淵為丞相後為唐王故國號唐焉取天下之心在淵者為少在世民者為多然亦非若篡弒之儔也唐之佐髙祖以定天下者太宗世民也髙祖以建成首子立為太子世民立為秦王元吉立為齊王建成元吉以唐有天下皆世民之功力謀傾之世民遂殺建成元吉髙祖因傳位世民有房玄齡杜如晦等為相魏徴等參預朝政武功文德兼有之惟殺建成元吉可議耳髙祖曰不圗為天子乃見今日之骨肉相殘建成元吉雖所自取世民殘忍亦甚矣唐之德此亦有慚者歟建成喜酒色遊畋元吉多過失世民功名日盛於成吉然成與吉不能自知且謀傾世民其事已不仁矣謀未行而人已覺智乎以豫觀之世民茍不遜於天倫自恃已功髙祖立儲之議必不辭焉既不辭也二子復謀殺之能不起世民之殘忍哉是世民之殘忍者二子之所自取當不獨責之世民也女主自王有二吕后其一武后其二吕后止於稱制與諸吕危劉之禍武后則不止稱制廢中宗立睿宗而淫穢之聲播之後世醜聲無踰於此夫女隂也男陽也陽得以兼隂隂不得以兼陽故隂常減陽之半與男得以兼女女不得以兼男故女常減男之半者一爾乃天地之大義隂陽之正道也由此以觀則女主為隂百官萬民為陽武后以一介之隂在百官萬民衆陽之上天地之義已反悖矣隂陽之道已倒持矣豈非一大變乎故家之不齊國之不治天下之不安也有自矣玄宗在位四十四年方其初也好賢樂善勵精政事任姚崇宋璟為相以致開元之治靡不有初矣及其後有奪子妃之恥以召祿山之亂兵連禍結乘輿幸蜀幾危唐祚非鮮克有終乎不有郭子儀李光弼等克復兩京以立肅宗迎歸而為太上皇幾何不淪於蜀耶唐之禍患內外並起髙宗寵武后卒至自王殺唐宗室中宗寵韋后卒至擅權進毒弒帝玄宗寵楊妃卒至安祿山之亂幾危唐祚肅宗寵張后卒至李輔國之變禍生宫掖此唐宫妾之害生於內也肅宗任宦官李輔國卒至於殺后憲宗任宦官陳𢎞志卒至於弒逆敬宗任宦官劉克明卒至於亡身文帝立於宦官王守澄卒至甘露之變與有受制家奴之嘆昭宗制於宦官劉季述卒至少陽之幽與有别立太子之禍此唐宦官之害亦生於內也玄宗相用姦臣李林甫杜絶言路掩蔽聰明養成天下之大亂德宗惑於盧杞楊炎傾陷忠良遂致劉晏之自殺此唐姦臣之禍生於外也德宗之世藩鎮李希烈朱泚田悅朱滔王武俊李訥相繼反叛憲宗之世藩鎮尤甚強盛僖宗之時藩鎮愈強盜賊並起黃巢入冦長安此唐藩鎮之禍亦生於外也國家之患內禍生於宦官宫妾外禍生於姦邪藩鎮內外兼攻國體容不弱乎所賴者郭子儀李光弼李晟李德裕輩削平僭亂姚崇宋璟李吉甫輩粉飾太平唐之業始有可觀者焉玄宗以後盜賊日起藩鎮日叛其間善恢復保全者六肅宗平安慶緒等之亂克復兩京代宗討史朝義之亂恢復疆土順宗能保安宗社憲宗伐叛討逆武宗能削平叛亂宣宗則又卓越乎前非善用人之所致乎不善保全出奔者四玄宗奔西蜀德宗奔奉天僖宗奔鳳翔昭宗奔華州非不善用人之所致乎不能修德致隳唐政者二穆宗喜聲色遊畋而唐之業墜懿宗驕恣淫虐而唐之政衰非不善用人又暴亂淫虐乎不善納言致輕國體者三憲宗佛骨之迎韓愈表諫不從而見黜敬宗荒淫之甚李德裕進丹扆六針不聽而自恣文宗為宦官王守澄等所制權右人主無人敢言惟劉蕡對策又極言見黜非不善納言為嬖幸所致乎故唐止為漢唐之唐不能為唐虞之唐也悲夫唐室之興祚得於髙祖功由於太宗其間髙宗即位六年以前政猶出之於已六年以後自廢后立武后以來政出於中宫自武后廢中宗自立二十年之後始有狄仁傑舉用張柬之等遷后上陽宫迎立中宗惜乎中宗亦惑於韋后墨敕斜封卒至殺身及睿宗亦先廢而後立在位僅三年耳玄宗之初好賢樂善勵精政事相姚崇宋璟非不足為賢主奈何天寶以後溺愛貴妃致祿山之禍唐幾於不祚矣肅宗之初郭子儀李光弼克復兩京迎歸玄宗非不足為英主奈何上元以後制於李輔國有弒后之恥厥后代武宗用郭李恢復疆土其事可嘉德宗相盧杞藩鎮叛而出奔又可醜焉順宗在位止八月而禪位太子委任李吉甫等為得其人而社稷安矣憲宗初誅藩鎮威令固張末年以來驕侈太甚為宦官陳𢎞志所弒豈智乎穆宗喜聲色而藩鎮復亂敬宗喜遊嬉而終制宦官文宗受制家奴甘露之變可驚武宗削平叛亂唐室之威復振宣宗始終全美而人思之懿宗驕恣而政愈衰僖宗則政由下出黃巢亂而出奔昭宗則又內制於宦官外逼於藩鎮出奔被幽故致朱全忠以遷洛陽尋弒之又殺太子以下九人致立少子以篡其位而唐之祚亡焉唐都長安之後昭宗遷洛陽共二十一主二百八十九年五代五代之所謂代者亦相代之意而季則猶孟仲季之為末稱也故周代漢漢代晉晉代唐唐代梁而皆謂之後焉五代通八姓也後梁唐之降臣梁王朱全忠為梁太祖者先與黃巢為亂降唐故賜名全忠後更名曰晃宋州碭山人在唐鎮汴攻併徐兖及河北河東等處遷唐都洛封梁王後篡唐稱帝國號梁都汴為東都洛為西都嘗與晉王李克用等割據地界不能削平慙憤成疾末年欲立子友文遂為友圭所弒已而均王誅友圭自立焉均王名友貞太祖溫之第四子與唐李存朂連年用兵後攻梁克之貞命其下殺已於是梁亡梁傳二主其間且父子兄弟自相弒奪及已自殺以致國亡者蓋全忠先受唐之賜誓然後降唐厥後挾天子令諸侯威振天下卒至殺唐九子滅唐三百年社稷鴆弒哀帝而篡其位故父子兄弟自相弒奪及已自殺二主而亡蓋亦天也復何望其傳主之多乎後梁都汴傳二主共十七年後唐唐莊宗李存朂本朱邪氏事唐有功賜姓李沙陀人存朂之父克用平黃巢有功封晉王至朂襲封以兵威克敵滅梁稱帝國號唐矜功好畋嗜色御衆無法軍叛中流矢而殂李克用養子亦胡人名邈佶烈繼立為明帝登極之年已踰六十在位八年穀豐兵少較之五代亦小康耳其子嗣之曰閔帝未一年又其養子從珂本王姓封潞王者兵入洛陽閔帝出奔廢為鄂王而從珂立焉珂與石敬塘素不相得敬塘與契丹合兵破之從珂自焚而死唐亡後唐都洛陽傳四主三姓共十四年後晉後唐明宗壻天平節度使石敬塘為晉髙祖者先以拒命唐發兵討之敬塘求救契丹破唐契丹立為皇帝國號晉都大梁敬塘割十六州之地上表契丹稱兒皇帝為羣臣所恥及出帝重貴繼立亦上書契丹止稱孫皇帝而不稱臣契丹怒連年交戰兵入大梁執重貴以歸封負義侯遷於北方河東節度使劉知逺舉兵入大梁自立為帝未幾重貴還汴知逺已先立一月所謂此交已固彼來已晚晉遂亡焉後晉都汴傳二主共十一年後漢後晉節度使劉知逺之為後漢髙祖者沙陀人先仕晉鎮河東為節度使契丹執晉出帝北歸知逺舉兵入汴梁稱帝自以為漢之後立髙祖光武皇帝為百世不遷之主痛子承訓之喪成疾一年病殂繼此而為隱帝者曰髙第二子承祐也狎䁥嬖幸誅戮大臣郭威等被譖欲殺之故威引兵入朝自訴帝遣兵拒之為亂兵所弒太后臨朝契丹入冦太后遣威將兵出征至澶州將士大譟裂黃旗以被威體呼萬歲震地擁威南還代漢遂稱帝漢亡後漢都汴梁傳二主共四年後周後漢節度使郭威為後周太祖者太原人先仕漢為節度使唐莊宗宫人之寧家者擇姻見威知有大貴願歸之漢隱帝為兵所弒之後契丹入冦太后命威禦之軍至澶州將士裂黃旗被之南還即位與宋太祖黃袍加身事同威無子以妻姪柴榮為嗣是為世宗其為人英武治國有道五代之時此亦賢主惜乎功未成而早亡世宗之子恭帝宗訓繼之七歲即位都點檢趙匡胤事周纍立大功中外附之匡胤以征契丹兵至陳橋擁黃袍入王蓋威裂黃旗之報天道好還何如是之急也周亡焉後周都汴傳三主共十年宋北宋後周都點檢趙匡胤為宋太祖者涿郡人先為後周殿前點檢世宗殂恭帝幼以禦契丹擁黃袍而還恭帝禪之遂即帝位其事固可議矣但其囑將士曰少帝太后不得驚犯公卿不得侵陵厚亦至焉其弟太宗繼之雖不能無燭影之疑而開拓境土削平海內任用人才百度修舉蓋亦賢主太宗次子真宗相冦凖而為北門鎖鑰征契丹而致南北講和美甚矣奈何惑於王欽若為封禪祠祀天書土木之事一時並起未盡善焉真宗之子仁宗西鄙多事慶厯間君子滿朝天下承平懿王之子英宗有韓琦歐陽修者調護兩宫之譖道州周敦頤生焉英宗之子神宗初年勵精為治熙寧以後王安石以青苗之法誤之洛陽程皓生焉神宗之子哲宗相司馬光有改青苗之志故後世以慶厯元祐並稱皓之弟頤生焉神宗次子徽宗貶斥善良進用姦諛極土木之工修道衍之教金兵南來禪位於子是為欽宗已而金兵陷汴徽宗欽宗皆執而北太后迎立康王南渡遂都杭焉北宋都汴傳九主共一百六十七年南宋宋髙宗構者神宗第九子也先為康王太后因金兵陷汴執徽欽二主迎構於應天府即位以主和誤國召李綱為相磁州守臣宗澤知開封留守時綱治軍政略有緒開封知府黃潛善相州守汪伯彥復主和綱相數十日遂罷又以潛善伯彥為相國因誅上書人決策幸東南無復經理兩河駕至揚州金兵分三道南來至汴宗澤募義兵百萬大敗之纍表請上還汴潛善忌功沮之澤死金兵至揚州駕行至瓜州渡江如杭州罷潛善伯彥又以朱勝非為相亦罷又以吕頤浩為相上如建康太后為金兵所逼如南昌上如杭州如浙東金兵又分兩道一從蘄黃渡江趨堯昌各處追太后不及陷潭灃自石首而回一從滁和自太平渡江陷建康又陷杭州追上不及乃退嶽飛敗之於六合上歸越州頤浩亦罷又以范宗尹為相時秦檜北依達蘭始南歸言曰如欲天下無事須是南自南北自北以達蘭意上書求和宗尹亦罷檜又曰我有二策可以聳動天下又以檜為右相吕頤浩為左相檜自此専主和議矯奏金牌令班師嶽飛泣下東拜曰十年之力廢於一旦檜搆嶽飛等赴獄何鑄鞫之飛裂衣示背有盡忠報國四字改鞫亦知無罪曲順檜意誅飛自是無復敢言兵者胡銓上疏斬檜上不聽卒至誤國萬世之下固知嶽飛之忠秦檜之姦矣又安知宗澤之忠黃潛善之姦誤於前邪髙宗不悟卒至自誤悲夫孝宗繼髙宗而立鋭意恢復以史浩為相張浚為樞密使督師江淮許國之心不下嶽飛惜乎早卒乃復與金講和南北安靜中原之土竟不能復國家之恥竟不能雪有恢復之主無恢復之臣孝宗其亦賢君者歟光宗之世周必大用事從容廟堂引進善類惜乎早罷不用及排斥善類誣朱熹輩為偽學理宗之世真德秀魏了翁者出君子滿朝奈何丁大全賈似道相繼用事邪正互進惟程朱之學復崇值元之興與之同滅金焉度宗之世賈似道秉政端人斥盡恭宗之世元兵入冦執之北降端宗名是尚幼當元兵復冦之時楊妃與弟楊亮節負是與昺如溫州航海至福州羣臣從之陳宜中張世傑奉是即位以文天祥為丞相遷碙州而崩陸秀夫又立昺焉時方八歲楊太后聽政羣臣欲散秀夫曰度宗一子尚在將焉置之遷崖山元兵薄世傑之舟張洪範等交戰世傑秀夫知事去先驅妻子入海即負帝同溺忠義之士同溺者數萬宋亡説者謂宋以忠厚得天下士以忠厚報之信夫南宋都杭如閩廣故曰一汴二杭三閩四廣傳九主共一百五十五年遼契丹南侵國號遼者自其道宗始也道宗姓耶律名洪基其國先在橫山之南元魏時號契丹後梁均王時太祖始稱帝道宗始號遼歷太祖太宗世宗穆宗景宗聖宗興宗七主皆與宋和議南朝為兄北朝為弟惟興宗申南北之好以息征戰而道宗則以國號遼連歲用兵故傳海濱王為金所滅而亡遼都燕傳九主共一百五十年金女直南侵國號金者自其太祖始也太祖姓完顔氏名阿固達初臣契丹宋徽宗時稱帝國號大金舉兵滅遼體漢制度傳太宗滅遼攻宋執徽欽二帝遂有中原陜西之地自太宗熙宗海陵王世宗章宗東海郡侯宣宗哀宗凡九主而宣宗以前連歲敗兵至哀宗始走蔡州元兵與宋兵夾攻克之金亡金都上都即洛陽傳九主共一百十九年元蒙古南侵奄有天下而國號元者自其世祖始也世祖姓怯特名呼必賚世為蒙古部長方元太祖立後功德日盛諸部皆慕義來降用兵如神滅國四十傳太宗定宗憲宗世祖至世祖始滅宋號元成宗承混一之後垂拱而治武宗承富有之業創治改法仁宗一遵世祖成憲為大元盛德守文之主英宗用法無私有姦黨畏罪之正泰定天下無事號稱治平時明宗文宗頗有變動寧宗乃明宗次子立二月而崩順帝乃其嫡長以母被讒移居廣西以寧宗之崩歸國即位享祚三十餘年荒於淫樂四方盜起羣雄割據垂二十年始亡元都燕傳十四主共一百六十三年繼大統者九十三年也東溪日談録卷十四
