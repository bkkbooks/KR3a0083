body:
  text: 東溪日談録卷五明周琦撰祭祀談下五嶽四瀆四海皆天下名山大川天地大氣所在所以祀之者祀其氣也非若人鬼祀其有形者也祀氣者以壇祀形者以廟東嶽泰山西嶽華山南嶽衡山北嶽恒山中嶽嵩山祀之各有其地江瀆河瀆淮瀆濟瀆祀之各有其源東海西海南海北海祀之各有其方固不可在彼者而祀於此在此者而祀於彼亦不可貌其形以病其氣封其爵以廟其爲鬼自唐武德貞觀間制祭五嶽四瀆四海之後武后垂拱四年封洛水爲顯聖侯享齊四瀆封嵩山爲神嶽天中王天授二年又封華嶽爲金天王始肇山川之封故𤣥宗開元十三年封泰山爲天齊王天寳九載封中嶽爲中天王南嶽爲司天王北嶽爲安天王六載封河瀆爲靈源公濟瀆爲清源公江瀆爲廣源公淮瀆爲長源公此五嶽四瀆爲人鬼而封之也宋真宗大中祥符元年加號泰山爲仁聖天齊王五年又加東嶽爲天齊仁聖帝南嶽爲司天昭聖帝西嶽爲金天順聖帝北嶽爲安天元聖帝中嶽爲中天嵩聖帝加東嶽有淑明后南嶽有景明后西嶽有肅明后北嶽有靖明后中嶽有正明后仁宗康定二年加東海爲潤聖廣德王南海爲洪聖廣利王西海爲通聖廣潤王北海爲中聖廣澤王復增四瀆公爵爲王爵也夫五嶽亦山耳海瀆亦水耳以其爲名山大川天地扶輿清淑之氣所在國以山而立民以川而養故祭之也惡有所謂帝與王哉又惡有所謂后以配之哉惟我國家一掃唐宋之陋祭不用爵而用主止曰某之神也但東嶽南嶽天下尚有行祠耳五嶽曰泰山之神恒山之神華山之神衡山之神嵩山之神四瀆曰江瀆之神河瀆之神淮瀆之神濟瀆之神四海曰東海之神西海之神南海之神北海之神其曰王曰帝曰公曰侯曰后曰妃皆前代妄封之號國家止曰某神者得祀山川本意凡祭不當祭皆爲淫祀泰厲天子所祭天子爲天下主故祭聖賢有功於天下後世者國厲諸侯所祭諸侯爲一國主故祭聖賢有功於一國者族厲大夫所祭大夫爲一家主故祭先代之爲聖爲賢有功於一家者庶人則以無後者祔食盖尊賢恤孤之意不爲淫祀今皆行之雖祭名不同而義有在也狄仁傑毁呉楚淫祠七百餘處惟夏禹呉太伯季札伍員四廟不毁盖以爲先代聖賢有功於天下生民者也太伯季札伍員固呉人呉所當祭若夏禹者雖㑹計於呉嘗爲天子矣亦非呉人之所當祭者也孔子爲天縱之聖有功於天下後世誠萬世之師今春秋祀之以丁者取丁火文明之象洞燭萬世而無涯也其號以漸而加其祀以漸而崇其配享以漸而定其從祀以漸而増道日尊於後世也可見矣春秋之後未有國學亦無州郡學止魯有孔子廟知本之君多如魯祠之秦固暴虐前漢高祖十一年復沛祠孔子于曲阜後漢章帝元和二年亦祠孔子于魯三國魏齊王正始二年舉行釋奠蕭齊永明二年亦行釋奠元魏太和十六年帝修堯舜禹湯文王周公之祀亦親祠孔子十九年又祠于魯而封其後唐太宗貞觀二年罷祠先聖周公以先師孔子爲先聖顔囘爲先師二十一年始以左丘明卜子夏公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭𤣥服䖍何休王肅王弼杜預范寗賈逵二十二人從祀孔子前是或祀周公爲先聖孔子爲先師或專祀孔孟至是始有定制唐𤣥宗開元八年改從祀孔子皆爲坐像及以孔子諸弟從祀前是孔子像坐從祀像立羣弟列而不饗至是皆爲坐像而羣弟子皆列祀于丘明之上宋神宗元豐七年始以孟軻配享及以荀况揚䧺韓愈從祀徽宗崇寧二年以王安石配享位在孟軻之次是年封孔子之後為衍聖公四年則令郡邑之學以諸儒從祀大觀二年始以孔伋從祀政和三年追封安石爲舒王其子王雱爲臨川伯皆從祀焉欽宗靖康元年罷安石配享而猶從祀孝宗淳熈四年罷王雱從祀而安石猶存理宗淳祐元年始加周敦頥張載程顥程頥封爵與朱熹並皆從祀始出安石不祀度宗咸淳三年始以顔囘曾參孔伋孟軻並配孔子升顓孫師于十哲列邵雍司馬光于從祀元世祖至元三十一年有崇奉孔子之詔成宗大德十一年有加封大成之制武宗至大八年遣宦者釋奠而致大風之異仁宗皇慶二年以許衡在從祀之列文宗至順元年加封顔囘爲兖國復聖公曾參爲郕國宗聖公孔伋爲沂國述聖公孟軻爲鄒國亞聖公與加封叔梁紇顔氏之爵始以董仲舒從祀嗟夫孔子之功天地生民之功也羣弟之功發孔子之道教萬世無窮者也諸儒之功衛翼聖人之道者也餘如揚䧺安石之儔何預哉從祀以四配以十哲以两廡見孔子之道大而能博誠以萬世爲王者也本朝𢎞治壬子樂益孔子以八佾之樂帝王師事孔子厚之以天子之樂其視後世葬權貴僭以天子之具者不亦猶爲愈乎今國家祭古帝有太昊氏炎帝氏神農氏黄帝軒轅氏金天氏高陽氏髙辛氏陶唐氏有虞氏夏禹王商湯王周武王漢髙祖皇帝漢光武皇帝唐太宗皇帝宋太祖皇帝元世祖皇帝而又及其臣者以有君即有臣亦祭法所謂泰厲之意也其氣相屬故耳當代功臣之設於正位者中山武寧王徐開平忠武王常岐陽武靖王李寧河武順王鄧東甌襄武王湯黔寧昭靖王沐共六人列於左者都指揮使馮國用郢國公僉都督耿再成四海昭國公僉都督丁德興濟國公都督同知張得均蔡國公靖海侯呉楨海國襄敏公平章康茂才蘄國武義公副使邵成東海郡公共七人列於右者叅政胡大海越國武莊公都督同知趙得勝宋國公廣德侯華髙巢國武莊公都督同知俞通海開國忠烈公江隂侯呉良江國襄烈公宜寧侯督良臣安國忠壯公安陸侯呉復黔國威敏公左都督府副使孫興祖共八人皆廟食萬世而保全同休也豈漢髙朝爵而暮死者比哉老子李其姓耳其名耼其字老子其號周定王二年丙辰二月十五日生景王二十三年己卯八十四歲而卒嘗爲周柱下史至不仕始出函谷關尹喜留著道德經五千言孔子嘗見而稱之其猶龍乎莊周宗其學者復有玉清元始上清靈寳太清道德三清之分盖宗佛氏法身報身化身之說也天地間則又多此一家之學與佛氏並行以亂吾道之眞也老氏止一道德經未嘗有醮天朝斗科儀其爲此科儀者後世之人附㑹其意也玉皇經南斗北斗經漢人張道陵所撰度人經生神經玉樞經唐人杜光庭所撰玉皇誥宋徽宗所撰其餘諸經宋人王欽若所撰清凈消災等經又倣釋氏之經撰之也豈老氏立爲是教耶煉丹之說起於漢人魏伯陽其經亦伯陽所作叅同契始於漢人張道陵惟此二書近道德經之說然亦非老子之言也世之學老莊者只當倣老子莊子及魏伯陽張道陵以事之足矣其象三清殊無理也佛氏刹利其姓悉達其名瞿曇其號本西域人其父名凈梵號大䧺其母摩邪氏生于周昭王二十六年甲寅四月八日卒于周穆王五十三年壬申壽七十九歲亦人鬼也生于西域亦卒于西域中國人學之謬矣哉瞿曇爲人中國本未見之故其佛號皆曰南無所謂南無者南方無而西方有也其所稱也明白矣中國苦自學之髠其髪異其服爲西域人狀何益之有哉瞿曇有法身報身化身故曰三生中國人香火之者亦像此三身而取法焉孰知瞿曇之學所自來耶瞿曇之學本無薦㧞先亾之說後人作爲佛書四十二章扶持其教又作爲十八地獄之說惑人從其教而行其術其教大行盛于孔氏雖達人智士亦不能不爲之誘矣朱子家禮所載祭儀抑人禫祭用之者最多其餘虞祭等儀亦用之但不甚盛耳君子之祭所當祭者如天子祭天地使天位乎上地位乎下隂陽各得其所以和天下民物諸侯祭山川使山峙而不崩川流而不竭出氣爲雲降而爲雨隂陽各順其時以和一國民物大夫以上於春祭户内陽之意於秋祭門外隂之意於夏祭竈陽盛而熱於内於冬祭行隂盛而寒於外於六月祭中霤使中土以旺四時和一家之民物士庶祭先木本水源通和氣於子孫凡此則祭之有益故曰祭則受福若祭所不當祭者不惟獻腥獻熟奠斚奠帛徒費精神而與己無關何所取乎此孔子所以抑季氏也昔張南軒嘗毁淫祠司户持牒出門兩足俱軟而不能行厥後乗輿至祠破其像腹中得一盒内一大蟲轉旋不已鼎内熱油煑之方死司戸脚即能行於此可見廟祀厲鬼之能靈者非鬼靈也有依草附木者如是蟲之靈也淫祠可不毁乎不毁則乆而怪生以禍民也佛氏之作非徒爲異端而抑之父母本無罪犯而老死者浮圖立拔亡之典取之於地獄九幽以罪人待之人子於此果孝乎非孝乎不特浮圖之謬而從之者亦謬淫祠之妄無踰於是矣淫祠起於佛老之惑世佛老惑世起於聖學之不明達人從之愚人焉得有不從乎故當自學孔孟者先明其心而不爲之惑也正學不明故異端易惑異端既惑故邪道易攻不幸邪巫邪術吉㓙中其說禍福亂其心雖達人志䘮悍士氣昏謂厲鬼殺人而懼其死謂得䘮惑人而祈其存誰如李德裕之絶聖水聖火歐陽文忠之絶佛池禍福西門豹之絶巫嫗陳希亮之絶巫覡張南軒之絶古佛袈裟是皆明乎聖賢者也邪道豈足以攻之哉故不惑於淫當明正學爲本方士醮天起于秦雜方士以郊後世用方士以司郊祭之樂舞者盖亦此之遺意也東溪日談録卷五
