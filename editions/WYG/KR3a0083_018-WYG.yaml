body:
  text: 東溪日談錄卷十八明周琦撰闢異談世謂天皇氏地皇氏人皇氏者按三五厯紀曰天地開闢陽清為天隂濁為地盤古在其中一日九變神於天聖於地天日髙一丈地日深一丈盤古日長一丈如此八千歲天極髙地極深盤古極長乃為三皇以愚觀之開闢之初未有文字孰從而記之邪其説與煉石補天斷鰲立極聚蘆止水者同荒唐也何足慿哉兩間之物日月風雨雷電晝夜山嶽江海淮瀆草木皆隂陽之氣運行披拂激薄晦明流峙發榮如此固非物於物者也厯年紀謂盤古之生而嘘以為風雨吹以為雷電開目為晝閉目為夜死而左目為日右目為月左手為東嶽右手為西嶽腹為中嶽首為南嶽足為北嶽骨節為山林腸為江海血為淮瀆毛髮為草木者皆厯年紀之謬也世人之説凡類此者當斥之不可以亂吾道也世謂雷爲有形之鬼神雷氣也豈有形邪按易雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考則雷之爲物乃陽氣自下奮上者也羲文周孔皆本是以作易矣未嘗謂爲有形之鬼神也是故雷之震驚者氣激薄也遺屑者氣隕墜也雷氣也非形也謂有形者巫氏愚人以禍福祭祀也與雷州布鼓同荒唐也世謂日烏月兎日果有烏月果有兎乎按漢天文志曰日中有三足烏説者亦曰月中隂氣所積爲兎以予言之天陽氣之浮者也陽之精則爲日地隂氣之凝者也隂之精則爲月二氣之凝與浮既定而爲天地則二氣之精即運而不已烏兎生於有天地日月之後即天地日月運行之氣所生者也豈是氣所生之物成形之後復入於是氣之中以雜乎隂陽精氣同一運行邪夫日月者隂陽之精氣也固非外物之可雜者也世有月桂之説酉陽雜俎之妄也酉陽雜俎曰月中有桂髙五百丈下有一人嘗斫之樹創隨合其人姓吳名剛西河人學僊有過謫伐桂夫月者隂之精在天地氣中轉旋不已曷嘗有他物雜之於内桂之爲物非土地不生非雨露不滋豈此隂寒氣中可以産此植物一夜一周隨月轉旋根株枝幹顚倒上下而傾覆邪吳剛何等人也抑何從而入於月邪酉陽雜俎荒唐孰甚世人附㑹其説使助詞章之什同爲荒唐也孰甚哉又謂月中嘗有八萬二千人修其凹處及收修月斧鑿者亦雜俎之妄也世人惑月之説甚多其曰后羿妻嫦娥偷羿不死藥奔入月宫之爲蟾蜍者漢天文志之誤也其曰明皇與申天師八月十五日夜遊月宫見榜曰廣寒清虚之府翠色冷光相射極光寒不可留者唐野史天寳遺事之誤也其曰八月十五夜月中落桂子於杭州僧寺者古今詩話之誤也其曰月中有兎搗藥致有搗藥兎長生之句者杜工部之誤也其曰聽月髙樓接太清倚樓聽月最分明碾空吚啞氷輪響搗藥丁東玉杵鳴樂奏廣寒音歴歴斧侵叢桂韻丁丁夜深一陣天風起吹落嫦娥笑語聲者後世詩人之誤也害理之説也若淮南子曰月中有物婆娑者乃山河影其空闕者乃海水影者其説頗近理也世當於其近理者且從之害理者痛去之庶乎不畔道矣道經有三十六天及謂别有官府釋典有地藏地獄及謂别有閻羅天子夫天者氣之浮地者氣之凝地在天中天包地外天之轉旋不已一晝一夜行九十餘萬里一日一周繞地一遍其行如此安得别有宮府在天之上同轉旋乎茍天有三十六層地必亦有三十六層地有三十六層人必亦有三十六層不知我輩所居之天地今在第幾十層邪及地之下有山嶽髙峙河海深洩立有官府曰閻羅天子治天下事者固曰天子治地下事者宜曰地子以此推之不止曰僭亦稱非其稱皆見其妄其必無也明矣獄有一十八層必深且廣既立閻羅其吏胥獄卒當有一項人役自何代何方入於地下以居長夜不旦之中今在何處人死氣歸於天形歸於地舉世皆然其見閻羅執去受刑者㡬何人無罪而還者又㡬何人舉世未曽見之其無也亦明矣惑萬世而不解也可嘆世人惑天之説者謂煉石補天謂九天謂三十六天謂天君天尊惑地之説者謂斷鼇立極謂十八地獄謂閻羅天子惑日之説者謂三足烏謂十日並出謂長繩可繫惑月之説者謂有兎有桂有吳剛有嫦娥有蟾蜍有廣寒宫惑風之説者謂風伯惑雨之説者謂雨師惑雷之説者謂雷公惑電之説者謂電母惑星之説者謂星官星君惑山之説者謂罔魎惑水之説者謂龍罔象惑土之説者謂羵羊惑人之説者謂有牛首謂有蛇身謂死化爲熊謂熊殺人惑鬼之説者謂鬼火謂鬼嘯惑神之説者謂廟軍馬出遊謂司人禍福惑禽之説者謂祀爰居惑獸之説者謂狐化人如此之類多矣惑之者人也難惑者理也君子當以理解其惑不當附㑹其説也東溪日談録卷十八
