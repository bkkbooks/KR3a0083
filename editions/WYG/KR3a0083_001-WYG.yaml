body:
  text: 東溪日談録卷一明周琦撰性道談上周子論太極第一畫這圏者是形容太極乃隂陽渾然之未發者第二又畫這圏半面多白半面多黒者是形容兩儀左多白者是陽之動曰陽儀右多黒者是隂之静曰隂儀第三又畫這水火土金木五様小圏者是形容五行第四又畫這圏是形容乾道成男坤道成女乃太極動静之初無極之真二五之精妙合而凝之為氣化者第五又畫這圏是形容萬物化生乃太極既有動静分隂分陽氣化成男成女之後其所成之男女又各構精而生男女為萬物之形化者大抵太極動静始生兩儀兩儀變合始生五行其真精妙合始生男女此氣之化男女搆精始生萬物此形之化氣化之後固有形化形化之中亦有氣化故隂陽動静妙合而不已氣化形化生生而無窮周子畫這五箇圏只是一箇理别而為五使人易曉其第一箇圏是太極第二圏之為兩儀者亦第一圏太極動而生底陽静而生底隂其中小圏子即太極本體左邉白多底動而為陽之儀者是以右邉黒多底為之根右邉黒多底静而為隂之儀者是以左邉白多底為之根此第一圏太極之體所以立第三五小圏之盛隂生水而居右者是太極動而為陽者變與隂合則隂得陽助故隂先生水而居右其盛陽生火而居左者是太極静而為隂者合為陽之變則陽得隂用故陽生火而居左盛陽固生火矣其陽之穉者則生而為木故木次於火亦居乎左盛隂固生水矣其隂之穉者則生而為金故金次於水亦居乎右隂陽盛穉既立其體而變合之氣沖融於其間者則生而為土以居乎水火木金之中如五常之性分寄於仁義禮智之間此隂陽互根五行互交如環無端者皆第一圏太極之所為也第四圏之乾道成男坤道成女者亦第一圏太極既生兩儀五行之後無極底真理二五底精氣妙合凝聚得陽之多者成男而歸之乾得隂之多者成女而歸之坤此之男女皆氣化之所生者即孔子所謂天地絪縕萬物化醇是已第五圏之萬物化生者亦第一圏太極隂陽氣化成男成女之後其所成之男女又各構精復生男女以形化形無有涯盡此之萬物皆形化之所生即孔子所謂男女構精萬物化生是已此隂陽氣化於其始形化於其後无終窮无止息者亦第一圏太極之所為也則太極者先天地而不能探其始後天地而不能測其終謂其有也而實无以見其形謂其无也而實有以驗其跡豈非天地萬物之本源至極而无以加之理也哉太極之理大而天地之一始終一混沌者是一大闔闢方其動而生陽以為隂之根者其氣轉旋不已久漸輕浮包裹於上下之間以含乎隂濁未凝之氣天於是乎開其静而生隂以為陽之根者其氣漸凝於中查滓堅實寓於輕清轉旋氣内地於是乎闢此太極為天地之根也陽得隂為之根又一動也陽變而㑹於隂故隂先盛則水金成質於地其氣行之於天而生人之本以立隂得陽為之根又一静也隂合而㑹於陽故陽亦盛則火木成質於地其氣亦行於天而生人之本以具其理則無極之真者也其氣則二五之精者也陽合於隂則陽之理氣凝於隂隂合於陽則隂之理氣凝於陽絪緼交宻其秀而靈者化而為人其未靈者化而為物故人物於是乎生此太極又為萬物之根也天地萬物皆根於太極則天地萬物之形太極之形而性亦太極之所性也太極之理小而一嵗一運為一屈一伸者是一小闔闢其闢而生陽於静極之後則冬至一陽左行萬物由之而出其闔而生隂於動極之後則夏至一隂右行萬物從之而入非入無以主乎出故曰藏諸用非出無以發乎入故曰顯諸仁萬物一嵗一生亦太極以為之根如此則太極非理氣之大原者耶太極之理又小而為萬物之一生一成於其始者亦一闔闢方陽之施而知大始物各資之以有氣是謂乾知大始又謂萬物資始及隂之受而作成物物各資之以有形是謂坤作成物又謂萬物資生不必於其榮枯也見之其始之一生一成亦隂陽之一闔一闢如此則太極之理豈非無物不有無時不然也哉天地之初未有人物其生皆氣化及有人物其生皆形化如走之生不以胎飛之生不以卵木之生不以核草之生不以實皆氣所化者即孔子曰天地絪縕萬物化醇是已若走之生以胎飛之生以卵木之生以核草之生以實皆形所化者即孔子曰男女構精萬物化生是已雖氣化在未有人物之前形化在既有人物之後皆太極之所在也太極之理豈天地之初而盛人物之後而窮哉未有天地之前太極生天地既有天地之後天地生萬物未有萬物之前天地生萬物既有萬物之後萬物生萬物天地固萬物中之物而人乃萬物中之靈者也此天地與人所以並立而為三才者也氣化之前固無形化形化之中實有氣化觀海島絶境無人去處生有廬亭萬年古道一廢亦生草木與木之果腐而有蟲草之根敗而有螢之類可見矣人在天地大氣中如魚在巨浸内人以氣活魚以水活人在氣中不能見其氣魚在水中不能見其水是故大氣不壞則寒暑灾祥各得其正而人道定矣大氣壞而偏跛焉不亦如巨浸壞而鱗無以托耶氣化之後有形化形化之後不復有氣化者人物既生形奪乎氣故氣不復化惟形以化形而化化無窮焉然氣亦有化者是亦小者化而大者不能化也天地絪緼是氣化妙合男女構精是形化妙合萬物化醇是氣化之凝萬物化生是形化之凝葢合則凝凝則成自然而然者周子曰無極之真二五之精妙合而凝其亦孔子之謂歟有謂妙合而凝如水滴鹽者夫水著於鹽鹽化於水固不知孰為水孰為鹽此合之妙者也鹽與水同體資之以火為用則又凝而為鹽此妙合而凝者也合而凝凝而成必如此説然後為備或曰水之味薄鹽之味厚則鑿矣所謂合與凝亦隂與陽合非理與氣合也或以理與氣合人始生而成形是隂陽分屬乎理氣也恐未安無極之真二五之精合則凝凝則成其得隂之少得陽之多者人固為男凡物之為雄為壯者亦男也得陽之少得隂之多者人固為女凡物之為雌為牝者亦女也陽之成質曰男隂之成質曰女凡有形者皆爾何獨人哉故男女者隂陽之質也太極圖下周子既曰無極而太極又曰太極本無極葢無極即太極太極即無極所謂無極而太極者猶言雖無形體實為至理所謂太極本無極者猶言理雖至極本無形體吾觀夫天地何如其大萬物何如其衆天地萬物之生何者而非太極孔子止曰易有太極周子加無極字以發之朱子又以無聲無臭發無極言其無形體也以造化樞紐品彚根柢發太極言其為天地萬物之根也然則先天地萬物而不見其始後天地萬物而不見其窮一至理而已復何形體之有無極之名不始於周子始於栁子邵子二儒其曰無極之極者栁子之言也其曰無極之前隂含陽者邵子之言也但栁子邵子主氣而言周子主理而言也周子無極固無前矣邵子之所謂前者是以卦氣自姤而坤以生復乃隂含夫陽自復而乾以生姤乃陽分乎隂隂為陽之母陽為隂之父父孕長男而為復母生長女而為姤陽起於復而盡於乾隂起於姤而盡於坤坤後有復故以復為始復前有坤故以坤為終邵子乃指復前坤後陽未生處為無極故曰無極之前隂含陽者是坤姤之隂含乾復之陽逆指坤姤乾復為前也指復後乾前陽已生處為有象故曰有象之後陽分隂者是復乾之陽分姤坤之隂順指復乾姤坤為後也邵子之無極非若周子之所謂無極者無前也是以卦氣而言之者也太極之所謂太者是無以加之義而所謂極者亦無以加之義也天下字義固無以過之者孔子取之以名此理故後世不可得而移易也周子益之以無極者不過發之而已耳豈改易之哉無極而太極是無形而有理太極本無極是有理而無形所謂有與無者非老氏之有無也老氏出無形之理入有形之氣含理以歸於氣以氣為主也吾儒無極太極之有無者以理為主也故不同爾太極非隂陽外底道理在未分隂陽之時固是太極在分隂分陽之後亦太極之流行太極是未發之隂陽隂陽是已發之太極非太極自太極隂陽自隂陽太極譬水之源隂陽譬水之流其流之水即源之水豈流之水非源之水也但曰源曰流名各不同耳太極之隂陽動静天地之體所以立動静無端隂陽無始氣至而物生氣返而物死死生相繼無終窮天地之用所以行體立用行道無止息故有以成古今之世無極之真二五之精真謂理之無雜者精謂氣之無雜者隂陽理氣純而無雜所以妙合為一凝聚而生人物葢無極之真是理之統宗者二五之精是氣之流行者統宗者固理矣未嘗無氣流行者固氣矣未嘗無理太極動静而理氣兼全如此無極之真猶言無形中之有真理朱子曰真字已包太極朱子曰木仁火義金禮水智而信則如土之旺其説甚明合之與凝皆兩者之㑹二五之氣非與無極之理各自流行葢二五流行之氣其理即無極之理一動一静於天地之間合而凝凝而成故生人物也先儒凡論理氣多分為二天地間理氣只是一事渾融而無間雜豈有理在一處氣又别在一處有彼此有先後耶若無極之真主理二五之精主氣先儒謂理與氣合故能成性氣與理合故能成形皆是别而為二以愚言之隂陽之一動一静理氣便在動静内非二五之氣先行而無極之理後到非無極之理先動而二五之氣後行無乃陽之動其理氣妙合於隂則陽凝於隂隂之静其理氣妙合於陽則隂凝於陽隂陽合㑹人物以生此隂陽之常理天地之大義謂理氣合而成性則可謂理合氣而成形恐亦未可無極之真是主太極未動之前説二五之精是主太極已動之後説太極未動之前主理已動之後主氣葢未動之前含已動之氣已動之後行未動之理理之與氣固不得分彼此亦不得分先後也先儒謂理氣之合方生人物愚恐只是隂陽之合方生人物耳且以形化者驗之乾道所成之男乃陽之質坤道所成之女乃隂之質陽之男構合於隂隂之女構合於陽然後復生男女若陽不構合於隂形固不化是謂獨陽不生隂不構合於陽形亦不化是謂獨隂不成則人物之生成乃陽與隂合非理與氣合也明矣若謂理與氣合方生人物則是氣别在一處理又别在一處待氣之動然後來合以生萬物隂陽形化固無此理氣化有此理乎必乃太極動静有二氣二氣變合有五行故其理曰無極之真其氣曰二五之精理與氣同行氣與理同具陽一動而合於隂隂一静而合於陽陽合於隂則陽與隂凝隂合於陽則隂與陽凝得陽之多者為男得隂之多者為女陽有理有氣隂亦有理有氣故曰二氣其生人物也只是二氣之合耳此生成之大義隂陽之正理由是而觀豈不為尤明乎周子曰無極之真二五之精妙合而凝而人生焉讀者以詞勢求之則理得矣人物之生形屬氣性屬理氣屬二五之精理屬無極之真形具而理亦具理具而形亦具固非先得氣而後得理亦非先得理而後得氣有先後有彼此也周子無極之真二五之精是太極流行有理有氣氣以成形理以成性陽多為男隂多為女耳非以理氣分析而言之如此也理氣不待流行之時方合而混沌之時已合為一若理與氣合成形混沌之時已合亦當成形何待生天生地之後隂陽一動一静兩相㑹合然後生人生物則萬物之生非理與氣㑹也亦明程子動静無端隂陽無始之説隂陽動静者道也道之流行籠統相續無有端始聖人於其化之流行處裁以十二月為一年三月為一季三十日為一月十二時為一日八刻為一時陽生之日為冬至隂生之日為夏至與夫周裁子商裁丑夏裁寅之為嵗首惟四時無異焉只此皆化而裁之之道雖無端始而厯可稽矣天地間千變萬化只是一箇隂陽陽主變隂主化一變一化便是鬼神神是隂化而為陽未變於隂者來而伸也觀之春夏可見鬼是陽變而為隂未化於陽者往而屈也觀之秋冬可見故孔子曰此所以成變化而行鬼神也天地萬物皆不外乎鬼神鬼神只是隂陽二字天地間無物而非隂陽故亦無物而非鬼神以流行而言冬至陽生萬物隨之而出為神夏至隂生萬物隨之而入為鬼以稟受而言氣至而生屬陽為神氣返而死屬隂為鬼以形迹而言大而天地之始終日月之顯晦寒暑之往來書夜之晦明山川之流峙草木之榮枯人物之死生小而人身之嘘吸事理之行止以祭祀而言祀氣以壇者迎乎神祀形以廟者迎乎鬼皆隂陽也皆鬼神也一物一隂陽一物一鬼神也天地間何物而非隂陽而非鬼神也哉前儒亦曰天地是舉全體而言鬼神是就其中運動變化通貫言如春夏是神秋冬是鬼晝是神夜是鬼生是神死是鬼午前是神午後是鬼息是神消是鬼呼是神吸是鬼語是神黙是鬼伸是神屈是鬼氣來是神氣反是鬼日是神月是鬼初三後是神十六後是鬼天造是神地化是鬼草木方發生是神凋落是鬼人少壯是神衰老是鬼風雷鼓動是神收斂是鬼風雨雷電初發是神風休雨過雷止電息是鬼此所謂鬼神者推擴隂陽而言之者也隂陽推擴無所不有故鬼神變化亦無乎不在太極之道此其迹也太極動静固生隂陽隂陽即太極然太極終是形而上者之道乃隂陽本然之體也隂陽終是形而下者之器乃太極動静之機也太極主理隂陽未動静之時隂陽主氣太極已動静之時當别理氣輕重而言之耳天地間皆此氣之充塞觀手之揺扇皷其氣而風自生可見佛家謂世為刼殊無義理謂世為塵略近理焉觀其日陽穿牖皆有塵飛可指實矣東溪日談録卷一
