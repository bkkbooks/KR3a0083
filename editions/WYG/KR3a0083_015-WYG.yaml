body:
  text: 東溪日談錄卷十五明周琦撰儒正談總説古之儒者惟修於内不修於外今之儒者惟修於外不修於内修於内者求以實之於已不求知之於人故無以立門户雖舉世不見知無憾焉修於外者求以知之於人不求實之於已故立門户使人知之其凡論事為政學古之儒自是一等世俗之儒自是一等學者不别而觀之其學亦訛也惟先正之學皆心學工夫非世俗之學徒事乎口辯文詞之間而已先儒各有定論日談祖之故附於此以見古儒云周濓溪之學張南軒謂濓溪始學陳希夷後來自有所見其學問如此而舉世不知為南安獄掾時惟程太中始知之可見無分毫矜誇此方是樸實頭下工夫底人南軒此說正見周子務内不務外處濓溪之地逺城郭三十餘里茂叔爲學於此何求人知惟求心得而已止舅氏鄭向知之薦授鄠縣主簿使向雖知之不爲龍圖學士則亦徒知而已至移南安又不爲其守所知惟程判知之使二子學焉故得以發太極之㫖則周子者亦不叩之洪鐘也及二子再見吟風弄月而歸不知周子有何氣象聳動於人與談何道而使之吟弄如是也自濓溪之學一鳴人心之天理以著人欲以消孔孟之統緒以𫝊故朱子曰闡太極隂陽五行之奥而天下之爲中正仁義者得以知其所自来言聖學之有要而下學者知勝私復禮之可以馴致於上達明天下之有本而言治者知誠心端緒之可以舉而措之於天下其所以上接洙泗千載之統下啟河洛百世之𫝊者脉絡分明而規模亦宏逺矣朱子是言深發周子也黄山谷謂茂叔人品甚髙胸中灑落光風霽月好讀書雅意林壑初不爲人窘束短於取名而長於求志薄於求福而厚於得民菲於奉身而惠及􅑱嫠陋於希世而尚友千古山谷善體悉先生故能知之如是也朱子序大學以二程接孟氏之𫝊而不及周子者盖二程發遺經旨趣而濓溪未有所發故朱子序大學言遺經之旨不及周子也程明道之學明道資稟極髙純粹温潤又得周茂叔爲之發性理之源故充養有道至於人所不及之地世之資稟髙者多狂狷少誠實而明道之學一出於誠能不得心學之眞而續不𫝊之緒邪伊川謂明道自年十五六時聞汝南周茂叔論道遂厭科舉之學慨然有求道之志未知其要泛濫於諸家出入於老佛者㡬十年反求諸六經而後得之明於庶物察於人倫知盡性至命必本於孝弟窮神知化由通於禮樂辨異端似是之非開百代未明之惑秦漢而下未有臻斯理也此伊川作明道行實語若求明道之學當於其行實見之明道及民之政多礙法者未嘗使大戾於法人或驚駭謂戾於法則又盡誠爲之不容而後去伊川常以此語人然則明道眞所謂抱經濟大器有開物成務之才者邪神宗重之而不能用觀其從外補之請可見大抵雖能知之不能知之盡也程伊川之學明道踰冠中進士甲第伊川乃司馬光吕公著韓絳薦於哲宗授汝州團練推官西京國子教授辭復召赴闕除祕書郎亦辭太后面諭爲崇政殿説書亦辭至後始授西監之命其薦曰程頤之爲人言必忠信動遵禮義實儒者之髙蹈聖世之逸民又曰頤道徳純備學問淵博有經天緯地之才有制禮作樂之具實天民之先覺聖代之眞儒公著又言程頤年三十四有特立之操出羣之姿洞明經術通古今治亂之要實有經世濟物之才非同拘士曲儒徒有偏長使在朝廷必爲國器伊川在當時自下與庸衆等非君實公著亦不能知盖自是一様學問也伊川授崇政殿説書有任天下之志故議論褒貶無所顧忌同朝文章名世之士疾之如讐與其黨類巧爲詆謗且論人主有疾大臣不可不知及太后不可獨坐等語大臣多有不悦遂爲諌議大夫孔文仲所劾故有西京國子之命就職請歸田極論儒者進退之道又爲御史董敦逸所劾以是觀之雖伊川之學見知於世自大臣一毁而臺諫屢劾其學已晦况後世非伊川者乎故伊川涪州之行惟爲易𫝊而已明道嘗謂伊川曰異日能使人尊嚴師道者吾弟也若接引後學隨人才而成就之則予不得讓焉明道自料與料其弟者明甚矣張横渠之學吕大臨謂横渠曰先生志氣不羣少孤自立與邠人焦寅游寅喜談兵先生悦其言當定康用兵時年十八慨然以功名自許上書謁范文正公公一見知其逺器欲成之乃責之曰儒者自有名教因勸讀中庸先生讀其書雖愛之猶未以爲足也於是又訪諸釋老之書累年盡究其説知無所得反而求之六經嘉祐初見洛陽程伯淳正叔昆弟於京師共語道學之要先生渙然自信曰吾道自足何事旁求乃盡棄異學淳如也吕藍田生同其時知其詳如此在京説周易見二程撤去虎皮歸陜西正嘉祐初年也横渠曰道自孟子之後千有餘歲若天不欲此道復明則不使今人有知者既使人有知者則必有復明之理先儒謂此爲横渠以道自任之意横渠文章只西銘一篇理醇而辭亦醇正蒙十七章論理固當而辭却太厲先儒謂横渠心統性情的當似伊川仁者天下之公善之本之説鬼神二氣之良能優似伊川鬼神造化之迹之説邵康節之學先儒謂堯夫之學與聖門之學不同盖堯夫見得天下萬物有盈虛消長之理便敢做大於聖門底事下學更不施功堯夫精易數故事物之成敗始終與人之禍福修短筭得来無毫釐差錯如指此屋起於何時便知毁於何時無不如言此又自是一家學問故謂與聖門之學不同尹和靖曰康節之學本是經世之學今人但知其明易數知未来却小了他學問如陳叙易賛云先生之學志在經綸最爲盡之和靖此言又在堯夫易數上見得有經世處故曰内聖外王之學程子門人之學程子嘗自謂吕與叔深潛縝宻吕和叔任道力勁游定夫資質温厚楊中立資亦頴悟林大節魯能躬行劉質夫篤信固守李端明才識頴悟吕進伯老而好學謝顯道切問近思而於吾道有望謝良佐記問甚博而恐玩物喪志與夫范巽之楊應之張思叔皆有志於道者也程子此言亦語以使自勵胡文定曰河南二程先生得孟子不𫝊之學於遺經以倡天下而升堂觀奥號稱髙弟在南方則廣平游定夫上蔡謝顯道龜山楊中立三人而已羅豫章之學李延平謂仲素少從吳國華學後見龜山乃知舊學之差三日驚汗浹背曰㡬枉過了一生於是謹守龜山之學後方心廣體胖又謂性明而修行全而潔充之以廣大體之以仁恕精深㣲妙多極其至羅仲素爲學有心廣體胖之效其工夫還是從格物誠意中来朱子曰羅公清介絶俗雖里人鮮克知之仲素盖亦求於内不求於外者也李延平之學李愿中之學出於羅仲素羅仲素之學出於楊龜山故朱子學之有以見其於仲素講論之餘危坐終日以驗夫喜怒哀樂未發之前氣象爲何如而求所謂中者若是者盖久之而知天下之大本眞有在於是也故理得其本而天下之理千變萬化者不外此矣李愿中從羅仲素學人有非笑之者愿中若不聞盖以仲素之學人不能知未免以爲仲素無學而愿中妄從之也朱子曰先生愛看論語亦愛看孟子更愛看春秋左𫝊有爲只用闕静坐時只驗喜怒哀樂以求其中盖其從仲素累年受春秋中庸語孟之説從容潛玩有㑹於心故盡得其所𫝊之秘也愿中既受仲素之學退居山里結茅水竹之間謝絶世故四十餘年簞瓢自適厥後羣士始從之而矜式也胡文定之學謝上蔡曰胡康候正如大冬嚴雪百草萎死而松栢挺然獨秀使其窮厄如此乃天將降大任焉耳張南軒曰文定雖不及河南之門然與游楊謝游而講論其説其自得之奥在於春秋彼遇明時執經入侍正大之論竦動當世所以扶三綱明大義抑邪説正人心亦可謂有功於斯文矣胡致堂之學胡明仲文定公之子才氣髙邁醉後更歌諸葛亮出師表陳了翁奏狀及夫忠義文字天下之事若爲之有餘但欠㸃檢故有爲不成者其在嶺表著讀史管見都是記憶並無一冊文字相隨故多牴牾耳胡五峯之學胡仁仲亦文定公子其學見於知言之作先儒謂可議者有八性無善惡一也心爲已發二也仁以用言三也心以用盡四也不事涵養五也先務知識六也氣象迫狹七也語論過髙八也凡此皆過思之矣知言論誠中仁三者先儒論之詳矣朱晦菴之學陳北溪謂先生道巍而徳尊義精而仁熟立言平正温潤清明的實徹人心洞天理達羣哲㑹百聖粹乎洙泗伊洛之緒凡曩時有發端而未竟者今悉該且備凡曩時有疑辨而未瑩者今益信且白宏綱大義如指諸掌掃千百年之陋誤爲後學一定不易之凖則辭約而理盡㫖明而味深而其心度澄朗瑩無查滓工夫縝宻渾無隙漏猶可想見於辭氣間故孔孟周程之道至先生而益明所以主盟斯世獨惟先生一人而已先生之學與功不敢涯涘惟以北溪之説嘗與學者談之吳夀昌嘗稱先生一水一石一草一木稍清隂處竟日目不瞬飲酒不兩三行又移一處大醉則趺坐髙拱經史子集之餘雖紀錄雜説舉輒成誦㣲醺則吟哦古文氣調清壯某所聞見則先生毎愛誦屈原楚騷孔明出師表歸去来辭並杜子美數詩愚嘗觀夀昌之説可見先生襟懐暢達性情之眞有超出宇宙外意義理之熟不爲窘迫非若今之立門户者於有人處辛苦拘束無人處放肆怠惰心不能誠故爲學亦失其眞先生之罪人也先生無書不讀亦無書不註其所讀之書後學固不能盡見而讀之但以書非先生之所註者愚實不敢著目至讀孝經刋誤見先生無書工夫不到皆精意所在其舊本猶未脱去俗師之手先生之用心者尚冺耳故嘗爲之釐正及其成書夢有朱姓者以竊盗訟愚於官辨論至曉乃覺詳之或釐正刋誤竊得先生大意故耳此亦可見先生精神心術之㣲萬世猶存也稱先生者曰先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法先朱子而賢者非朱子無以明後朱子而賢者非朱子無以法又曰孔子集羣聖之大成朱子集諸儒之大成又曰孟子功不在禹下朱子功不在孟子下以稱孔孟之言贊之朱子則朱子者其孔孟之儔歟張南軒之學張敬夫忠獻公之嗣子胡仁仲之門生忠獻命從仁仲學一見敬夫尚程氏之學知爲大器故告以孔門論仁親切之㫖退而書質仁仲報之曰聖門有人吾道幸矣敬夫益以古之聖賢自期遂有希賢之作以爲警策及又取友四方益求其至十有餘年後天下之理瞭然於心目之間是以决之勇行之力而守之固也南軒之學其来有自矣南軒所著書有洙泗言仁錄諸葛武侯成書詩書孟子論語太極圖等説開悟後學之功爲多吕東莱之學吕伯㳟讀史之功多於讀經所以史得詳細經反麄畧故博議之作主於春秋是讀史之功所發有人問論語是非者則曰管他是非做甚但有益於我及切於我者看之是矣並執噬嗑卦和而且治一本以治作治理亦不究於此便見讀經之功疎畧且經爲之本史爲之末祖謙讀書以本爲末如此天地間扶持綱常惟死節爲難吕伯㳟却以詩謂張巡許逺不應出来此是不謀綱常其氣甚餒後来西山眞氏稱之曰吕成公所𫝊中原之文獻也其所闡繹河洛之㣲言也扶持絶學有千載之功取育英才有數世之澤及慶元初孽臣始竊大柄大愚以一太府丞抗疏顯斥其姦孤忠凛然至死不悔迨其晚年義精仁熟有成公之風焉此必後来之學又有進也陸象山之學陸子静與胡明仲皆强執之人但胡明仲議論英發旁若無人雖强執無偏廢陸子静則執到底且又不肯説破故朱子謂之禪語觀其所論克已復禮一句謂不是専克去利欲忿􅓰之私有一念要作聖賢亦是私議論至此却是論到極偏處鑿壊正理人之爲學不以聖賢爲期却將何者爲凖的士何以希賢賢何以希聖聖何以希天九淵之學眞與朱子不合非朱子之學偏乃象山之學偏矣吳草廬曰朱子道問學功多子静尊徳性功多此草廬為子静言也朱子豈只道問學而非尊徳性者哉朱子謂子静不著言語其學正似告子吳澄所謂陸子静以尊德性爲本朱晦菴以道問學爲本所見亦非確論朱子門人朱子謂季通爲老友而季通則以師事朱子南軒亦友之可望於道者故其卒乃曰吾道益孤遂有望於勉齋黄直卿焉晚年惟尚書未𫝊故屬之仲黙而洪範之數亦屬之其餘若輔漢卿陳安卿陳才卿徐子融廖德明鄭子上闕亞夫皆善學者也真西山之學眞景元之學悉見於衍義其衍大學之義皆本諸聖賢心術以示帝王治道著前代之興亡亦後學之龜鑑其爲慮也不止在於當代而實及於萬世愚嘗以爲是書可重進上其所缺畧者格物致知二條本朝丘仲深先生詳補之矣魏鶴山之學虞邵菴謂魏華父之學起於臨邛白鶴山下倡其説於摧廢之餘極其弊於口耳之末其爲學即物以明義反身以求仁審夫小學文藝之細以推乎典禮㑹通之大本諸平居屋漏之隠而充至於鬼神之著其學誠足以繼周張程朱四君子而扶世之功亦足以尊其統而接其𫝊者邪許魯齋之學許平仲之學自謹獨之功充而至於天德王道之藴者其功始於見栁城姚樞雪齋之後也姚雪齋隠蘇門𫝊伊洛之學有伊川易𫝊晦菴論孟學庸集註章句或問及諸子小學平仲一見之後悉授之而歸焉盡變所學從之旦夕精讀篤志力行以身先之故充至於天德王道之藴及應元世祖之召對以治天下之道其要在王道其功則三年所以啟沃君心者固深矣但其仕元未免有隙之可議也許衡之學爲得正𫝊而仕元則非正矣夫學得其正者體也試之者用也謂其志在澤民不在事君則可若非君不事如伯夷者則未可方之劉因且不能及况伯夷乎故卒而囑其子曰墓不必書爵止曰許衡之墓可矣許平仲若有慚德者邪陳剛謂使天下之人皆知讀程朱之書以至於今日者魯齋之力也以予觀之魯齋之祀孔門其功在此若其事元且謀伐宋不明正統大義則當黜矣吳草廬之學許衡吳澄相繼起於元時謂北許南吳北許之學得自姚樞其𫝊以程朱爲主南吳之學當炎運垂息之時得斷簡於衆遺發新知於卓識自任以天下斯文之重亦以程朱爲主繼北許爲元祭酒其教有莫大焉者平仲生北似不得已事元而幼清生南非不得已其失猶有過於許平仲者矣草廬之學其源見於易書春秋禮記纂言其叙見於學基學統諸書劉静修之學世儒論學多棄劉因獨取許衡吳澄以愚鄙見論學問則許吳之得正𫝊爲多論出處則劉因之得其正者非許吳可及矣夫出處者學問之大節學問正則出處正而體用一原矣學問正出處不正其於學問也焉用哉先儒謂劉静修有鳯凰翔於千仞氣象其形容之也至矣劉静修文章有特出人表之意其行正其學亦正不下於許衡吳澄矣薛河東之學吾師伊洛閻先生謂薛文清公曰先生崛起於數百年之後心印濓洛神㑹洙泗學以復性為本言以明性爲先其言曰六經四書性之一字括盡又曰孟子之後道不明只是性不明至論所𫝊之事曰明此性行此性而已又曰顔子世無孔子不當在弟子之列愚於先師亦云又曰先師之處世自功名者視之則以為偏自富貴者視之則以為迂尚綺麗者則病其枯淡尚博洽者則病其拘束孰知邈象太極心遊天真而無所待於外哉又曰仕止久速充實輝光許魯齋之後僅見而已其飄然脱灑無所顧忌雖劉静修鳳凰翔於千仞之氣象又何讓焉凡此論文清公者至矣東溪日談録卷十五
