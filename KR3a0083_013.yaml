body:
  text: 東溪日談録卷十三明周琦撰史系談上唐堯堯之德詳於堯之典堯之治亦詳於堯之典故堯之典堯之史也孔子贊堯惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功煥乎其有文章孔子去堯之世如此之逺贊堯之德如此之詳其必有所據也治天下五十年不知天下治與不治古人為政誠篤如此安得不成盛治顧豈後世不治言治者比哉無怪乎其不治也茅茨土階朝天下諸侯七十餘年視秦九步一樓十步一閣一阿房宫如此况朝會天下諸侯之所乎觀瞻愈大治效愈促是故有堯之德致堯之治雖茅茨土階不為約也十日並出羿射其九其説與斷鰲立四極聚灰止水煉石補天者等耳不經孰甚於此天子之位聖人之器非不肖之才可履丹朱不足以履天位堯知之久矣故薦巢由不就復薦大舜舜若不就必及之禹亦不復在丹朱也堯為天下憂不為家憂為百姓憂不為丹朱憂聖人為公不為私於此極矣堯薦舜既以九男觀其外二女觀其內又使攝位二十八年然後禪之於天堯非不茍也不敢茍也敬天愛民也如此孰甚焉堯都平陽舊封唐侯之地其地曰陶故號陶唐氏虞舜舜之德詳於舜之典舜之治亦詳於舜之典故舜之典亦舜之史也耕歷山民皆讓畔漁雷澤人皆讓居陶河濱器不苦窳所居成聚二年成邑三年成都亦人歸之徴也舉元凱揚善也誅四凶遏惡也元凱果善也則揚之四凶果惡矣則遏之皆順天之休命也天子一日萬幾舜鼓南薰之絃或妨政乎蓋舜之事功已見於攝政之年至是無他所為故曰無為而治惟恭已正南面垂衣裳而已鼓絃也何妨於政乎舜攝堯行天子事二十八年至遜以位堯崩三年之喪畢避位於河南豫州之陽天下朝會不之平陽之丹朱而之豫州之舜人心之歸固無阻也其都蒲陽即平陽解州之蒲坂而不敢復平陽之舊都者克讓之德也豈後世之雌雄相競哉禹有治水之功而商均無績也故舜傳禹而不傳商均非故薄其子而法堯也三代三代之代其亦相代之義周代商商代夏取義也有謂矣夏大禹之德詳於大禹謨而其事功亦詳於禹謨也故禹之謨亦禹之史也盡力溝洫治民也致孝鬼神事神也卑宫室處已也美黻冕蒞人也禹於治民事神處已蒞人皆適其宜矣何議於聖哉三過其門而不入以傷父不成罰已之才智也孝也豈損孝以成忠邪禹泣罪人曰堯舜之人以堯舜之心為心寡人為君百姓各自以其心為心是禹以堯舜自期故禹之治不在堯舜下黃龍負舟而與之誓俯首低尾而逝者誠之感也啓能承繼禹道故天下朝會歸之也有扈之不來者與賢之風未釋於夷俗也天下家傳自啓始也禹不傳子亦傳之賢聖人之不貪也天下歸啓不歸之益非益之不足啓異於丹朱也少康本遺腹之子母奔有仍舅氏之國而生焉遺臣靡迎立於夏道四十年中絶之後而能恢復之靡之功其大矣夫桀治天下其性貪其政虐其力足以伸鐵鈎其寵妹喜而忘返者蓋亦貪虐與力血氣之私所使也夏安得而不亡邪禹都安邑亦平陽解州之地先避位於河南嵩山之陽而啓亦避益於釣臺以享諸侯禹傳啓太康仲康相遷商少康復國中興杼槐芒泄不降扄厪孔甲臯發履癸共十七主四百五十八年而亡嗚呼禹得之以道桀失之以非道君人者其可以無道乎商湯有慚德不嫌於聖以有道也桀無道也以有道而放無道也故無嫌焉肇修人紀能修已也幣聘伊尹能用人也祝網而去其三能愛物也禱旱而致大霖能格天也湯之世安得而不治邪伊尹之放太甲非放也不屑之教也太甲不明厥德顛覆典刑居桐宫三年復遷仁義伊尹奉歸於亳遂成賢君非不屑之教所致乎中宗修先王之政明養老之禮重譯來朝七十六國而商道之復興者傷兄雍已之廢其政也惜乎厥子仲丁遷囂而復衰矣盤庚傷前屢遷復都於亳改商曰殷行商之政商道復興而為之衰其政者厥弟小辛也小乙繼之雖知民事之艱難而時又不競耳小乙之子髙宗恭默思道傅説佐之君臣道合中外人歸殷道為之復興若髙宗其亦中興之賢主乎紂之才資辨捷疾手格猛獸智足以拒諫言足以飾非不幸而居君人之位則無所不至故其政暴於商民寵加於妲己天下怨之惡與桀並商安得而不亡乎湯有天下而都於亳傳位於太甲伊尹放太甲於桐宫湯墓之側居太甲憂三年復迎於亳伊尹攝政則亦無嫌沃丁太庚小甲而雍已商道寖衰太戊曰中宗者得伊陟以為之佐仲丁之世亳有河決之害遷都於囂外壬河亶甲而囂又河決以遷相祖乙相河又決以遷耿歷祖辛沃甲祖丁南庚陽甲盤庚耿河又決遷都於亳改商曰殷其道復興小辛壞之小乙時又不競武丁曰髙宗者得傅説輔之殷道復興歷祖庚祖甲廪辛庚丁武乙太丁帝乙至紂傳二十八主共六百四十四年而亡紂無道武王伐之紂衣寶玉自焚嗚呼酒池肉林糟堤十里妲己之樂復可得於是乎周武王承文王三分有二之天下以取文王之不取者周之德至是而極紂之惡至是而稔武王之身未嘗親臣於紂不失天下之顯名故武王之征伐也雖不得如堯舜之禪授則亦不失其令名矣武王夀九十三在位七年成王即位之年始七歲耳以時考之則武王伐紂之年八十六矣八十七而生成王故武王九十三崩而成王是年即位始七歲周公安得不為之攝政乎是故作無逸以戒其勤制禮樂以文其治誅武庚放蔡叔以保其亂於內遷多士定多方以防其亂於外與夫封魯留洛誥酒監殷周公之用心密矣賜魯重祭不亦宜乎洛為天下之中均四方貢賦之道里成王承武王之志而營之故以鎬為西都洛為東都王居則在西都而朝會諸侯則東都焉成王留周公於洛者以召公之言也周公承其留而遂不去者周公為成王慮也肯自逸於魯哉周公召公相成王為左右自陜以西召公主之自陕以東周公主之自古用賢則興不用賢則亡成王雖幼而有賢其成不拔之業也能無自乎宣王承厲王暴虐出奔之後能任賢使能王化復行為周室中興之主惜乎幽王為犬戎所斃西周之業亡焉故自武王至幽王共十二主為西周而平王繼之則東遷而都於洛也宣王中興之主召穆公方叔尹吉甫仲山甫皆中興之臣故王化復行而文武之烈又自是一振矣成王以幼沖嗣位得共輔者周召也厲王以暴虐出奔得共和者亦周召也故幼沖者以成治暴虐者以不墜亦周積功纍仁之深先後濟弱扶傾之臣同一姓氏以兆八百餘年之厯也平王東遷於洛王室漸微齊楚秦晉漸大孔子為周憂也故作春秋於平王之末年春秋非天子之事乎威烈王之世王室愈微而諸侯兵爭時號戰國故司馬之作通鑑朱子之修綱目皆始於此也赧王初與諸侯約從攻秦秦使吕不韋帥師滅之周遂不祀赧承王室久微之後列國方強之日其不祀也非桀紂比矣西周都鎬歷武成康昭穆共懿孝夷厲宣幽共十二主東周都洛歷平桓莊釐惠襄頃匡定簡靈景悼敬元貞定哀思考威烈安烈顯慎靚赧共二十五主通八百七十三年而春秋之後孟子者出時尚爭戰故號焉又平王以後通稱列國也夫帝王享國長永固莫如周况有孔孟諸聖賢生於其間乎此周所以為三代之最隆非他朝代之可及也春秋列國五等之爵起於周武王大封宗族及其功臣先朝之後至平王遷洛之日王室益衰侯國愈強天下不復尊周故孔子作春秋以正王法是為春秋其與周同姓者曰魯曰衛曰晉曰鄭曰曹曰蔡曰燕曰吳與周異姓者曰齊曰宋曰陳曰楚曰秦凡此皆大國也其具爵姓者杞許滕薛邾莒越虞虢郕凡霍息鄧紀徐隨巴鄫小邾芮胡州南燕梁荀賈宿鄅原夔滑郯舒鳩凡此則三十四國也其有姓無爵者黃羅魏耿郜韓焦楊夷向申密謝鄋舒庸逼陽凡此則十七國也其有爵無姓者萊弦潞頓沈談宗鄖賴肥戎蠻鼓穀唐白狄麇舒凡此亦十八國也其無爵姓者二軫絞蓼六江鄖權道柏遂崇戴冀溫厲項巢庸根牟介邿房桐鄀陽無終蓐狄英氏鮮虞陸渾於餘丘凡此又三十二國也其為附庸者顓臾須句葛任牟極蕭鄟鄣凡此又九國也夫春秋列國其大者則今之府其小者今之州又小者今之縣耳附庸之國則宣慰州縣附省之下者也皆自平王以後始也齊桓晉文宋襄秦穆楚莊五國又霸乎當時者也故謂之五霸視他國為尤強焉戰國世自晉大夫魏斯趙籍韓虔借周威烈王之命共分晉地立為諸侯是後七雄並起而各兵爭所謂七雄者秦楚燕齊趙魏韓是也於是善戰者孫臏龎涓之徒出焉善説者蘇秦張儀之徒出焉開阡陌者商鞅之徒出焉縱橫於七國之間豈不為兵戎之世乎然孔孟者春秋戰國之大儒懼亂臣賊子壞萬世之王綱富國強兵滅當時之王道故春秋之筆不得以不作仁義之説不得以不辨也豈得已哉秦秦始滅六國并天下北築長城南開五嶺自謂德兼三皇功過五帝以一世至二世至於萬萬世其為志也不小矣卒至二世而亡者何哉蓋悉變前制而法古之志無焚書坑儒而扶世之功缺與夫始皇之相李斯而寵任之權失二世之用趙髙而聽信之私訛烏得而不喪邪秦雖無道能定天下於一非法軻也暗合軻耳自咸陽以至交廣六千餘里交廣之民古雜於夷南開五嶺押發逋逃贅壻五十萬人以取南越陸梁之後開桂州南海象三郡得用夏變夷之道矣夫秦開五嶺者非秦為秦也秦為萬世也秦豈有心於萬世哉其利至今資之非一日者暗合聖人之道也後世可不乘其利而為國家計哉秦都咸陽歷始皇帝二世皇帝至子嬰為三世傳三主共四十一年而亡西漢漢髙祖起於沛其遇張良於陳留者天也韓信蕭何亡楚而歸漢者亦天也其不死鴻門之會者天也不死雎水之圍者亦天也死烏江之羽者亦天也故不王者死而王者不死矣三傑佐之安得不成帝業乎但不能保全功臣漢祖之失於此亦天焉始皇併六國不為秦併為漢併也項羽滅秦不為楚滅為漢滅也向使六國未併而漢難於前矣羽未滅秦而漢難於後矣漢有秦併其國於前羽滅其秦於後既而天又亡羽故漢之得天下也亦天與之也人歸之也女主之王天下起自女媧女媧在始立君之時人道未明之日今吕氏稱制在彛倫明正之日非女媧時比也變也不有王陵周勃之儔幾何而不危劉乎惠帝之恭已寬仁文帝之幾致刑措景帝之節儉守成武帝之雄才大略宣帝之中興漢室西漢傳十三主髙祖之後推數君而已然雖未能盡善亦不失為賢主也西漢之壞於前者諸吕也壞於後者王莽也諸吕之亂起於吕后王莽之亂起於王太后皆外戚也天下後世壞國家者婦人也茍二后不臨朝外戚不專政亂何自而生乎西漢都長安歷髙惠吕文景武昭宣元成哀平孺子十三主共二百二十五年壞之新莽不有長沙定王之子劉秀以恢復之都於洛陽漢幾墮矣東漢光武起於新莽篡亂之餘郡國僭竊之日芟刈羣雄克復舊物行仁義務儒術興學校以中興漢室髙祖之後一人而已雖文景武宣不讓也惟吏事深刻未盡善耳蓋少在舂陵與民間人伍天下之事無不周知故不任三公事歸臺閣如是也視後世事屬於人權移於下則又大徑庭矣孔子曰舜禹之有天下也而不與焉言不以富貴為樂也後世人君不以富貴為樂而能成大事功者光武亦其人焉光武少與嚴陵學亦常士等耳及其為天子也嚴陵不盱豫於富貴而茍仕光武不瞑眩於富貴而自髙故至同榻是嚴陵能髙其節而成就乎光武之美光武能下於賢而成就乎嚴陵之髙故東漢多清節之士實嚴陵為之開先而光武為之作始也明帝雖苛察而度量不宏然能遵奉建武制度則吏得其人民安其業章帝雖寬厚而平徭薄賦然寵任竇憲以啓外戚専權東漢之禍在外戚宦官者此其漸也章帝後和帝之世竇后臨朝宦官外戚迭為消長殤帝之世鄧后臨朝帝立八月而崩安帝之世亦鄧后臨朝后崩而後親嗣順帝為宦官迎立實閻后為之作俑故宦官外戚倚此而強賢人君子不能以救漢祚之衰也沖帝之世梁后臨朝有外戚梁冀之秉政質帝為梁后所立梁冀惡其聰慧而鴆殺桓帝之世亦梁后臨朝后崩冀暴故帝與宦官謀誅之則宦官逞惡而黨錮之禍起矣靈帝之世竇后臨朝宦官權盛致殺陳蕃諸人數百召外兵以滌內難則壞垣入室而董卓之亂興矣故獻帝之時卓廢皇子而立之天下討卓卓脅遷長安卓死曹操迎於許曹丕廢為公天下於是乎三分焉然則女主臨朝外戚専政宦官弄權此三者致亂之端也漢之祚安得而不傾乎東漢都洛陽不為外戚宦官所制者惟光武明帝而已章帝其漸和帝以後其禍迭興至獻帝而亡傳十二主共一百九十五年雖劉備起於蜀終不能大恢復也三國愚嘗以大義裁之蜀漢當為正統吳魏皆漢之賊不當有三國之分西晉得於魏主之手是誅漢賊而得之非篡漢而壞其正統者也蜀漢蜀漢昭烈帝劉備乃東漢景帝之子中山靖王之後徙封於涿備因家涿漢末羣雄並起備起兵於涿素與關羽張飛善故以為將圖復漢業後受密詔討曹操不克奔荆州依劉表於是訪士聞諸葛孔明三顧而起之相與謀畫始定巴蜀王漢中結好孫權破曹操兵於赤壁備之功大矣未幾漢帝遇害即位成都以孔明為相三年而崩是為先主後主劉禪乃昭烈帝之子先主崩遺命孔明輔政孔明乃勸農積榖講武練兵出師伐魏中原恐懼建興十二年亮薨國內無人薑維伐魏魏復遣將鄧艾等伐蜀至成都帝出降是為後主蜀漢二主皆都成都先主三年後主四十一年通四十四年先漢業未復而先主崩後漢業將復而孔明薨是天不祚漢也豈人力之不至哉魏漢魏王曹操之子丕廢漢獻帝為山陽公自稱帝丕之為魏文帝者其志始於操也猶唐李淵之取天下其志則世民焉夫父取天下將得而留之子子取天下將得而付之父父子不臣魏與唐有矣丕既稱帝矣即封操為武皇帝是時吳蜀鼎分各保疆場丕惟深謀極詐竊比聖禪而無伐蜀之舉丕生其子睿之為明帝者始以司馬懿為將與蜀連年用兵睿之養子芳為廢帝者大臣攬政太阿之柄倒持遂為司馬師所廢文帝之孫髦立為髙貴鄉公者又司馬昭秉政卒兵被弒懿死而髦亦薨亦無伐蜀之舉為元帝者奂也操之孫髦薨矣司馬昭稱為晉公遣鄧艾鍾會伐蜀漢遂亡焉則魏非漢之賊乎魏都洛陽歷文明廢髙元傳五主共四十五年亡於司馬氏之手吳漢吳王孫權之為吳大帝者堅之子也堅為漢太守漢末起兵討董卓其子策亦相繼為漢太守遂有江東之地策卒而權代之封為吳王曹丕篡蜀主即位權亦稱帝即位武昌遷建業任用周瑜魯肅張昭雄江東國內富庶先是敗曹操於赤壁其敗操者非為漢也為吳也故吕蒙陸遜襲定荆州至漢王即位於蜀而權亦稱帝武昌可見矣權在江東之時魏司馬懿雖有伐蜀之師而伐吳之志未舉權之子亮為會稽王是時懿死其子司馬師雖有廢帝之志而征伐之心未興至權之子休曰景帝及休之兄之子皓曰歸命侯繼位之時師死而昭襲爵司馬氏大焉故至於炎稱帝號晉之後遣王濬伐吳於石頭城遂降皓是則蜀亡於魏魏亡於晉而吳亦亡於晉吾故以為晉非取漢天下取漢賊之天下也晉之繼漢宜若無嫌矣吳都建業即位武昌亦徙建業傳四主共五十九年通策定江東之後共八十餘年東溪日談録卷十三
