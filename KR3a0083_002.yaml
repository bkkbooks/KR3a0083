body:
  text: 東溪日談録卷二明周琦撰性道談下太極之性分見於天人曰元亨利貞曰剛健中正此天之道曰仁義禮智曰仁義中正此人之道剛健中正其統體而元亨利貞其流行也仁義禮智其稟受而中正亦禮智也人之仁義禮智即天之元亨利貞其實一理而已皆太極也太極之理只是一誠故資始者誠之源各正性命者誠之立元亨者誠之通利貞者誠之復一誠流行而有隂陽動靜之機與易之天下雷行物與無妄詩之維天之命於穆不已中庸之天地之道可一言而盡及微之顯誠之不可掩者孰非太極之誠矣乎天地人物中之一物而人則物中之一物人傑於物聖人傑於人聖人與人與物一太極之性也太極流行有理有氣其理曰無極之真其氣曰二五之精其理與氣流行人得之而為人物得之而為物惟人得之最靈於物故人之生能得其性之全其形既生其神發知其心之靈仁義禮智信之五性而不失者於是乎用事焉是故性焉安焉之謂聖復焉執焉之謂賢發微不可見充周不可窮之謂神逹而充之謂堯舜禹湯文武臯䕫稷益伊傅周召之治窮而充之為孔孟顔曽周張程朱之學其壞則朱均桀紂幽厲秦政李斯以及蘇張孫商楊墨荀揚之儔不可數也太極之道無預焉壞之者人也是故修其全則懼其壞懼其壞則得其全太極之性其成於道矣夫孔子曰繼之者善也成之者性也又曰乾道變化各正性命保合太和孟子曰性善此指本然之性出之於天者也無氣質之染也孔子曰性相近也習相逺也又曰上知與下愚不移此指氣質之性具之於人者也非本然之真也是故三代之時道雖不行其道明者性明也有孔孟為之維持也荀子曰人之性惡其善者僞也至曰生而好利順是故豫奪生而辭讓亡生而疾惡順是故戕賊生而忠信亡此指本然之性為有僞指有生之性為本然也揚子曰人之性也善惡混修其善則為善人修其惡則為惡人氣也者所適善惡之馬也此亦指有生之後性為本然是不知理氣一轍謂氣能使理為善而為惡也韓子曰性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而已矣其所以為性者五曰仁曰禮曰信曰義曰智上焉者之於五也主於一而行於四中焉者之於五也一不少有焉則少反焉其於四也混下焉者之於五也反於一而悖於四此亦指有生之後性為本然且亦不知五性一理謂主一而行四一少而四混反一而悖四也是故三代之後道之不行不明者性不明也有孔孟之言無孔孟之人荀揚之輩不惟不能為之維持且又為之訛言也孟子曰天下之言性也則故而已矣故者以利為本噫不求其故性何可識歟近世言性如程子所謂性即理也天下之理原其所自未有不善喜怒哀樂未發何嘗不善發而中節無往而不善其得孔孟之㫖者歟孟子才無不善之說是言才之發於性者無有不善蓋性善故才亦善也程子才有善不善之說是言才之原於氣者蓋人之氣質有美惡美則善惡則不善二說各有所指理氣之别耳許氏說文曰人之陽氣性善者也從心生聲通論曰人因五方之風山川之氣以生故曰性者生也既生有稟曰性故於文心生為性世謂性以善從心生取義與前二說不同以豫言之心本有性非從心生其從心生者情也非性也故以說文通論為是漢唐之儒不識性字故性不明耳心即性性善心豈惡耶其惡者氣質也習染也氣質梏而習染誘不壞於其初者鮮矣心主於身四體皆聽命焉心豈徒血肉哉其不徒為血肉者以有性耳性統乎萬物體之逹於用萬物原於性用之根於體大本逹道也指血肉而曰心槁木死灰也豈能㑹發生耶是不知心之為性者也性不外道道不外性性在心是道之未發者道在事是性之已發者孔孟之時道雖不行而亦明者性明也是故言性以告萬世者子思也子思得孔子之家法也其曰率性之謂道者如仁率於父子義率於君臣禮率於長幼智率於夫婦是已言性以告當時者孟子也孟子得子思之心法也其告世子以性善者仁得於天之元義得於天之利禮得於天之亨智得於天之貞是已此言性道之得者也孔孟之後道之不明性之不明也性明焉道豈不明哉故四百年漢一董子而已論道明曰道之大原出於天則於道為天地之本己背正心以至於正萬民則於格物致知之功已缺三百年唐一韓子而已仁曰博愛則仁之本體已失性曰三品則性之本體不明此言性道之失者也孔子之不言性與天道者豈吝哉不輕以告人也若漢唐之儒便不易知直有以俟乎五星聚奎之宋也性則心之苗蘖心則性之根種故君臣父子賔主是非方其未接則苗蘖未生根種在心立天下之大本矣萬物統體一太極之時初無仁義禮智之别蓋渾然者耳及君臣父子賔主是非接焉則苗蘖生而仁義禮智各應於事行天下之逹道矣一物一太極之時性率而為道也是故極在心為本然之體在事為本然之量本然之體或壞於稟受極非其極矣不得謂之統體本然之量或壞於不充其量亦不得謂之各一太極皆非所謂本然者矣是故天下之道在吾心而吾心之性在天下也天下之物自君臣父子以至昆蟲草木天下之事自忠信孝弟以至動靜食息君臣父子有父子君臣之極昆蟲草木有昆蟲草木之極忠信孝弟有忠信孝弟之極動靜食息有動靜食息之極自太極而觀萬物萬物之理皆原於太極故曰萬物統體一太極萬殊而一本也自萬物而觀太極太極之理散見於萬物故曰一物各具一太極一本而萬殊也則亦莫非性也莫非道也孔子曰在明明德在親民在止於至善仁義禮智本至明也本至善也即所謂極也不能明之何以止之故未善也况至善乎是自失其極者也失其極者人也豈天之與我者無是極哉故君子當無所不用其極君止仁臣止敬父止慈子止孝國人止信一物一太極也其未仁未敬未慈未孝未信者極未止也其不仁不敬不孝不慈不信者極之壞也極未止而且壞者人也豈天乎哉鳥止飛獸止走草止花亦實木止實亦花一物一太極也其不能止於飛於走於花於實者非天也氣不實也失其極也物之極天之性也失其極失其性也物失其性與人失其性等耳豈得為全物哉張子心統性情之說性是心之未發者情是心之已發者性無有不善其不善者情也譬諸水焉泉心也止而不流者性也流而洋溢者情也流之不汩泥沙而清斯濯纓者情之善也汩泥沙而濁斯濯足者情之惡也故濁者流也非泉也濁乃流之所自為也豈泉之罪哉是故不善者情也非心與性也心與性豈不善哉心統性情之統非籠統總統之統乃統馭之統如將統乎卒者也性非心以統馭則靜無存養情非心以統馭則動無省察是故用統御之說則詞嚴矣天之生才性固無不善雜乎氣質始有善不善之分善則君子之才不善則小人之才是故君子之才剛而正小人之才柔而邪氣使之也豈君子有才而小人無其才哉但小人之才用事邪也不能如君子之正也人心不同如其面所謂心者人心也非道心也道心乃仁義禮智之心無有不同若人心則耳目口鼻之私故不同如其面仁義不自生而生之者心也孺子入井不忍不忍便是仁餔啜不食不食便是義仁義皆生於心則心非槁木死灰可見矣終日對越在天所謂天者理而已理無時而不在故君子無時而不敬終日對越在天只是不喪其敬而已耳先儒謂心本善發於思慮則有善有不善既發則可謂之情不可謂之心觀此則人之為不善者情也非心之罪也聖賢言性之善不是據理言之是有所指實明驗而真見之如入井孺子勃然惻隱餔啜飲食咈然羞愧出門大賔率然恭敬議論是非瞭然明白倉卒之間便如此發見出來初非安排而應之則仁義禮智之性在中可知若非本有性善在中如何倉卒便能發見此便是性善指實明驗處董子曰道之大原出於天與孔子所謂太極兩儀邵子所謂道為天地之本者實相背蓋太極者道也兩儀者天地也太極生兩儀故道生天地非天地生道而道豈原於天邪況大原非小原而大原即太極若太極出於天而天何所出邪是未知孔子之㫖者矣故邵子為得孔子之遺意者此邵子之學所以非董子之所能及也天地之性一誠而已故聖賢之學在先知性然後求實之仁義禮智性也實仁實義實禮實智誠也聖人自無不實賢人則欲其實故曰信焉安焉之謂聖復焉執焉之謂賢性焉安焉其性不思而得不勉而中自誠也復焉執焉其性思而後得勉而後中誠之者也聖賢之性天地之性聖賢之誠天地之誠自是而入豈非與天地同流者哉兩間之物惟人最貴鳥獸次之草木又次之此皆太極理氣之所賦豫者也謂有貴賤髙下則可謂無太極之性則不可故曰天下無性外之物兩間之物與理皆以偶立物之獨陽不生理之德不孤立皆以兩對物與理皆然耳程子止以理言未及乎物其謂天地日月隂陽剛柔風雨雷電水火山川鳥獸草木君臣父子兄弟夫婦君子小人覆載清濁仁義善惡性情中和才德爵祿賢否公私邪正是非得失窮通榮辱動靜屈伸消長吉凶休咎尊卑上下長幼左右前後東西南北凡物與理皆以兩對非但理也程子専以理言愚復兼物與理推之如此兩間物數各以四成者天有四獸地有四方天有四德四時人有四性四體字有四聲物有四隅皆以四成亦天地自然之數邵子嘗言矣愚因而推廣之元亨利貞在一嵗要一嵗之始終在一世要一世之始終在一事要一事之始終在一物要一物之始終此本要理而言之推之以要事物亦無不合東溪日談録卷二
