body:
  text: 東溪日談録卷十七明周琦撰異端談墨氏學仁失之兼愛流至於無父楊氏學義失之為我流至於無君無父無君豈止於仁義之差初非有意而為之其差小其失大可不畏哉墨翟曰摩頂至頸一身之間凡可以利天下者皆不惜也楊朱曰伯子髙不以一毫利物舍國而隱耕大禹不以一身自利不以一體偏枯古之人損一毫利天下不與也悉天下奉一人不取也不損一毫人人不利天下治矣楊墨非不欲恝然於聖賢之道以垂一世之教也其學謬而不自知矣孟子以亞聖之才起而有見於是焉得不辭而闢之乎孔子謂師也過商也不及過而不抑之以復於中至於兼愛則易也不及者不引之以歸於中至於為我亦易也聖人中道而立以為此中之主宰其示人也亦至矣人之死生關乎精氣之聚散氣聚則生氣散則死導氣者使氣不散固亦得不死矣久之氣散亦死終非自然之理故老聃之術别為一端程子謂爐火在有風處易過在無風處難過以此見山林之人不為功名富貴所役精氣含蓄難散故人多夀此其正德與導氣術者不同佛氏以地水風火為四大曰幻人假此以成身故寂滅幻根斷除一切去四大而毁人倫也夫四大者物也人倫者道也天下固無物外之道亦無道外之物佛氏亂道甚矣佛氏惺惺法即吾儒提撕警覺之意但佛氏之提撕警覺不在仁義上用功故其道非仁義也老聃莊周别是一種道理自是一家後來漢人魏伯陽張道陵之儔大宗其學故老莊之道大行於世老聃之學一變而為導引再變而為燒煉又再變而為醮天朝斗之淫祀皆漢張道陵唐杜光庭宋徽宗王欽若撰為諸家經呪以倡之也瞿曇之學一變而為寂滅再變而為輪回又再變而為薦亡禮懴之隆祀乃漢明帝所藏官庫佛書四十二章晉安帝時姚興大集胡僧翻譯佛經梁武帝時又自作為懴呪等書以倡之也非聖人之道而别為一端者至此亦盛行矣楊氏為我墨氏兼愛老氏導引佛氏寂滅老佛之為異端人易識之楊墨之為異端似是而非為害最深今之人固有名不楊墨而論理似楊墨者亦有名不老佛而制行似老佛者識道之不真也故論理制行皆訛其學之差而不悟矣學老氏者有內丹外丹之說學之可以長生學佛氏者有禪學打坐之說學之亦可以長生老佛於今存乎否乎而學之者亦存乎否乎茍存焉吾不從之是不欲長生是自棄也茍不存焉吾從之是妄求也自欺也吾於是惟從其所好而已異端之說為今之世惟輪回之說最盛夫人稟天地山川之氣以生有氣有形及其死也氣還天地山川而形則歸之重壤是形與氣皆泯滅於世矣復有何形以罪地獄何氣以俟輪回若以氣有輪回也氣還天地山川方之溝澮之水流於滄海之內可尋溝澮之水乎辭唇之髯收於髮笥髮笥之內可尋辭唇之原髯乎人之死也氣散而還其原漫然兩間未嘗各凝一處如珠相貫可輪回而數始而終終而始邪天地間决無是理佛氏妄為是說以惑人也罵鬼者曰你是已死我我是未死你此主氣說非主輪回說漢明帝時有佛經四十二章藏於官寺其後胡僧安靜夫懴康㑹俱譯佛書以𫝊諸中國至東晉安帝之時義熙四年姚興又大集胡僧命鳩摩羅什翻譯佛書大𫝊中國中國從夷狄教者非夷狄人教之也皆中國人所自為者也道經之初止老子道德經五千言而已安得有齊醮科儀符録召神服氣辟穀調食玉屑燒煉金丹之術哉其法起於漢之張道陵魏之冦謙之梁之陶𢎞景葛稚川大行而莫止也然亦上之人所召也使漢主不信張道陵魏主不信冦謙之立天師用符録行道場其術何自而大哉宋太祖開寶五年始禁方士蓄妻孥比漢武帝以方士尚公主者異矣東溪日談録卷十七
