body:
  text: 東溪日談録儒家類提要臣等謹案東溪日談録十八卷明周琦撰琦字廷璽馬平人成化辛丑進士官至南京户部員外郎琦之學出自河東薛瑄是編記所心得分十三類凡性道談二卷理氣談一卷祭祀談二卷學術談一卷出處談一卷物理談一卷經傳談三卷著述談一卷史系談二卷儒正談一卷文詞談一卷異端談一卷闢異談一卷廣西通志載其著日談録十八卷又著儒正篇論薛河東之學今考儒正即此書之第十五卷非別有儒正篇也前有吕景䝉序謂書刻于嘉靖丁酉而此本乃係傳寫或其板已佚後人録存之歟琦為人以端直謹厚見重鄉里其書亦一本濂洛之說不失醇正蓋河東之學雖或失之拘謹而篤實近理故數傳之後尚能篤守師傳不至放言無忌也乾隆四十四年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東溪日談録序夫道先聖人未名也惟吾夫子始名之曾子子思能述之周程能發之吾儒之學惟求乎此而已夫以堯舜禹湯文武先夫子而聖者也其相授受之中天下之正道也而夫子易𫝊乃曰形而上者謂之道何也蓋未有形器之先無聲無臭渾渾噩噩此太極本然之理道之全體也及夫隂陽迭運萬物化生上而日月星辰之著明下而山川草木之森列大而君臣父子之倫小而三百三千之儀皆形而下之器而理之所以寓乎其內者則道也故曰形而上者謂之道形而下者謂之器大學之格致誠正示君子以造道之方也中庸之戒懼慎獨示君子以體道之要也若夫潔矩之道功化之極即所謂舉而措諸天下之民之事業也千載而下有周子發明太極之㫖亦欲君子修之而吉也有程子發明斯道之㫖亦欲君子當終日對越在天也夫以人而不知學學而不知道豈吾儒之所謂學哉吾鄉周東溪先生自居鄉以至居官垂五十年非儒不接非道不談惟體驗天地萬物之性以㑹經𫝊之㫖根聖賢據儒正之說而談於人者悉録焉是故有性道有理氣有祭祀有學術有出處有物理有經𫝊有著述有史系有儒正有文詞有異端有闢異諸談凡此無適而非道也而先生乃日談焉者所謂審視其羽鏃求其凖的而造之者也昔人謂吾栁人不知學而知學則自栁子厚始夫子厚之學詞章之學也至今栁人詞章往往有足稱焉豈知東溪日所談者為儒者之學乎使吾栁人以學子厚之功而學東溪之學持之以往則箭箭當中鴻心矣又何聖賢之不可至何事業之不可成哉先生之學得之洛陽閻先生閻與劉晦菴先生得之薛文清公非無本者是書之成豫甫十歲既而先生卒享年近六十耳豫年五十始得抄本於湛甘泉先生之門中間錯誤甚多及謫判潁州得以肆刀讐校用壽諸梓嘗慨海內士夫微有一言近道者亦能不泯蓋以表揚者有人也先生史異諸書豫不可得而見矣今是書幸賴泉翁存之豫幸得而見之豈斯道所繫當不終晦必待豫知命之年而其所以寄於泉翁者始能行於世哉不然何世之相後而出也敬用書之簡端以為吾鄉同志者告因請擇所學於斯云嘉靖丁酉夏五月庚寅鄉後學吕景蒙序
