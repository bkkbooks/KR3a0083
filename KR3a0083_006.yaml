body:
  text: 東溪日談録卷六明周琦撰學術談世謂讀書為為學然為學有致知力行工夫讀書只致知中之一事耳為學尚有許多致知處如體認天地萬物之性是致知緊要處何止在書書只明此天地萬物之性與聖賢復性之切至於體認性善與工夫處却又在人而不在書故三代以前無書可讀人皆求道之切而聖賢迭出三代以後有書可讀雖汗牛充棟人反為書所病一生理會書且不能何暇體認性道而求之身心故聖賢反不多見若人能不為書所病體認聖賢復性工夫效其所以為仁為義者而求之身心見之事業以造聖賢之域方是為學故朱子曰人性皆善而覺有先後後覺者必效先覺之所為何嘗説書己自明白今人自錯認了世俗之學其病只在誤以讀書一事謂為學更不别去體認性理求之於心踐之於己惟其粗通章句者便謂有學善用章句組織成文以得科目者便謂有學之驗若沉潛篤厚之士由此而進縱未得所養亦不失為君子若機巧姦佞之士由此而進失其所養能不流為小人幸而以致重祿重權且謂讀書大驗上無正道以輔其主下無實惠以及於民不過務虛名要虛功而已應世之才無實學見用故世所以不治孔子萬世學者之標凖故動靜語默不特當世師之後世實師之故如公西華學仁聖孟子學聖之時橫渠學恭而安之類皆師動靜語默也何止於讀其書哉聖賢之學求於內不求於外求於本不求於末程子所謂外者文也末者考詳略異同也而本之與內未言焉且今世俗專務文字是求於外專務考索是求於末師儒以此教父兄以此養長上以此稱科目以此取當道以此重其風有不得而阻遏之者其本與內莫如之何然則本之與內將奚求耶吾能明乎吾之性不外乎天地萬物之性明乎天地萬物之性以實乎吾之性則程子之所謂內與本者蓋如是乎而得之矣雖世以為無文章無考索不吾伍也然而務文章者文士耳務考索者記誦耳非聖賢之學也彼不吾伍猶吾不彼伍一而已矣君子之學在求道之正脈或因俗學排議而變其正焉見未真也若姚樞講程朱學於蘇門尚能變許衡之學而從己豈變正學而歸俗學乎夫變俗學以歸正學猶用夏以變夷正也變正學以歸俗學猶用夷以變夏逃孔孟而歸楊墨也變也何止於見未真乎孔門之學日用工夫甚是淺近然於理無所不包仁無不貫推而極之可與天地同其體用朱子嘗以此語人與今世俗之學大有不同聖門之學其初甚淺近其終甚髙大世俗之學其初甚夸大其終甚卑陋其初淺近者為己也不為人也故其終也極高大焉其初高大者為人也不為己也故其終也極卑陋焉一誠偽之間耳世俗先自上學竟至下達聖賢先自下學竟能上達故中庸末言下學立心之始推至於無聲無臭豈世俗先立上學門戶而竟至於下流者哉古人為學惟安靜篤實所以承載得許多道理今人於安靜者不謂之無用便謂之迂踈志不堅者未有不為之搖動矣夫安靜者凝道之器也聖賢之學存乎心世俗之學存乎言存乎心者求其心之自得而無事乎言語存乎言者事乎言語而心實無所得故茂叔之學當世無人識得能識之者惟河南程大中而已安石之學驚動一世當時稱為聖人至用青苖病世及食既釣餌人方知其為非聖賢耳然則茂叔之學其存乎心而安石之學其存於言者乎聖賢世俗其學之别可見矣朱子曰為學不厭卑近愈卑近則工夫愈切實所至愈高遠此為學之大法也古人為學先自小學然後至於大學蓋小學有灑掃應對禮樂射御書數許多條件必先用力於此方脫去狂妄粗鄙之氣然後進大學以修格致誠正修齊治平之功則聖賢大學之道成於已矣儒者學識不可不大而事業不可不漸若學識不大其失如蘇秦事業不漸其失如王通蘇秦於七國爭雄之日以楚燕趙魏韓齊六國為縱以秦一國為衡縱橫其説人無不從知圖功利而不知仁義其學識大乎王通一見隋帝獻太平十二策即以臯夔稷契事業自期及其不用教授汾河又即以孔曾思孟事業自期事業漸乎學識不大則失之小事業不漸則失之驟畢竟皆無所成就矣堯舜禹湯文武周公孔子是聖賢心學之準的周程張朱是聖賢心學之羽鏃後儒於周程張朱之羽鏃且不能審視正固况求堯舜禹湯文武周公之凖的而至之乎故茫乎無所執持以求歸宿惟立門户以要譽而已聖賢心學何自而明乎允執厥中四字是聖賢心學之法人心惟危道心惟微惟精惟一十二字是維持心學之法前古人才不養於學校惟自養於山林薦之者以躬行為學如伊吕傅葛養於山林一旦受聘而起皆立實功於世後世人才養於學校薦之者以文字為學故才反不及古豈所養之地不足以養才耶蓋有所養即有所望世之急功名竊富貴者多驟進其失所養者才與市人等耳復何以實功責之哉故曰科目不足以得人豪傑之士由之而出伊川曰少年登髙科一不幸藉父兄之勢為美官二不幸有髙才能文章三不幸伊川此言皆世之所求必得者孰肯退一步以求必不得哉張南軒既曰天下之事皆人之所當為君臣父子夫婦兄弟朋友之際人事之大者也以至於視聽言動周旋食息至纎至微莫非事者一事之不貫則天性以之陷溺也然則講學其可不汲汲乎學所以明萬事而奉天職也又曰嘗怪今世之學者其所從事往往異乎是鼓篋入學抑以思吾所學者果何事乎聖人之立教者果何在乎而朝廷建學羣聚而教養者又果何為乎嗟夫此獨未之思而已矣使其知所思則必竦然動於中而其朝夕所接君臣父子兄弟夫婦朋友之際視聽言動之間必有不得而遏者庶幾可以知入德之門矣此説最切於時為學第一要識得性善求以復之便有著實功夫濳室陳氏曰謂明道以記誦博識為玩物喪志是徒記誦該博而理學不明不造融會貫通處是逐其小者忘其大者反以無用之物纍其空明之心是為玩物喪志為學要正與實循流俗者多不正立門户者多不實茍正與實雖世俗有毁譽身計有通塞皆不必顧其學自成矣建陽蔡發子孫為學三世不仕發之博學強記髙簡廓落不能與世俗相俯仰出逰四方聞見益廣凡天文地理易象等書無所不通厥子季通十歲即與讀張子西銘既長即與讀程子語録邵子經世張子正蒙且曰此孔孟正脈故季通著律吕等書通之子三嘗示之曰淵宜學吾易學沉宜演吾皇極春秋以屬之方仲蔡氏三代皆務實學不干利祿沉之子抗始舉進士蔡氏其髙出於世者哉今人不知古人之學惟以心得為主無事乎言語之間故惟事乎言語其於心得乎何有性在心理在書求其學於書不求其學於心則心之性將蝕學蔽於粗迹也求其學於心不求其學於書則心之性無所據學蔽於想像也要之以心為主取法於書始可天地之性具於人心即所以為人之理故人之性天地之性也是人之性通乎天地之妙達乎萬物之情天地之妙通則無乎而不通萬物之情達則無乎而不達兩間妙用由此而極萬世功烈由此而豐何嘗外於性哉性者小學之本源敬者心學之功夫天下之道孰能外性外性則非吾之所謂道天下之學孰能外敬外敬則非吾之所謂學性有仁義禮智存得仁義之心則仁義之性不喪於腔子存得禮智之心則禮智之性不喪於腔子敬則心存不敬則心不存故明道論心曰敬以直內伊川論心曰間邪存誠以直內橫渠論心曰當以己心為嚴師即孟子存心養性求其放心之説此非心學之謂歟嚴之以敬則邪僻不生邪僻不生則仁實仁義實義禮實禮智實智而吾之性不壞矣人之一身心為大體耳目口鼻為小體大體之性不壞於初發而應於小體則得其正小體之性不壞於欲推而本於大體則全其理是故根於大體者性也發於小體者情也故小體之壞於欲情也非性之罪也所謂心學者是學之於心非學之於口其學得之於心然後應之於身故睟於面盎於背頭容直手容恭足容重也心惟性而已矣故曰仁義禮智根於心心雖大體耳目口鼻雖小體皆性而已人皆充其大體之性則小體各順其性不能亂其心之大體若不能充其大體之性則小體各縱其欲大體之性反為小體所亂故養心之學愚曰當制其小體使不亂其大體孔子告顔子四勿此即制其小體使不亂其大體心學之功其本在性其功在敬其弊在耳目口鼻之私故舜之告禹曰人心惟危道心惟微惟精惟一允執厥中赤子耳目口鼻之私猶未縱其欲者性未失其真也及其少壯為耳目口鼻之私所亂者性失其真也惟大人者然後耳目口鼻之私無以亂其性舜益三言以告禹蓋憂人心之亂道心也孟子曰學問之道無他求其放心而已軻之此言其心學之謂歟君子必愼其獨君子之所不可及者其惟人之所不見乎動時敬也君子戒愼乎其所不覩恐懼乎其所不聞君子不動而敬不言而信靜時敬也中庸為聖學工夫故要動靜於始末而言之靜而存養是存養其性動而省察是省察其性三代以前無書可讀有堯舜禹湯文武臯夔稷契伊傅周召之君臣有孔曾思孟之師弟皆得心法之傳三代以後有書可讀四百年漢特出於穿鑿之中者祗一仲舒三百年唐特出於詞章之表者止一退之皆無書不讀而心法尚未真也惟宋之周張朱程然後讀其書得其心法豈周張程朱之書外董韓之所讀者哉蓋先得乎吾心之性然後實之於書與先得乎書之理然後實乎吾心之性故有以會乎心法而得千載不傳之緒也周子之學不由師傳默契道體觀此便可見不事紙上語耳李挺之嘗造邵堯夫廬曰學其科舉之學乎曰科舉之外有義理之學子知之乎曰未也願受教曰義理之外有物理之學子知之乎曰未也願受教曰物理之外有性命之學子知之乎曰未也願受教於是受性命之學所謂性命之學者心學也故學不可以不擇臨川王氏嘗以詩刺韓愈曰紛紛易盡百年身舉世無人識道真力去陳言誇末俗可憐無補費精神當世無人取此至朱子方系此於韓文考異之末後人謂朱子素愛韓愈為人及其文章復系此者以韓愈詩酒浮華志在利祿故耳愚謂不特此也朱子之意多取在不識道真一句觀原道原性篇見矣漢之董仲舒唐之韓愈二子之學冠一代之雄者也其於聖賢心學之法則不能得其真矣邵子曰身在天地後心在天地先其學在心不在書也亦可知矣司馬君實曰吾生平行己未嘗須臾敢欺故立朝行己俯仰無愧耳世稱三代以下有宰相學術者溫公一人而已君子之學其體在窮理修身其用在致君澤民其弊在務為文字捷科目竊功名以圖富貴世俗之學務其弊失其體訛其用天下何有真才伊川三不幸者冦準年十九登科宋厭年少凖不為之增年冦不為一不幸也范魯公從子杲公不為奏秩且示以速成不堅牢亟走多顛躓之句范魯公不為二不幸也胡安定最厭隋唐以來仕進尚文詞棄經業茍趨利祿胡安定不為三不幸也伊川是言乃通世之言非一己之見者也先師閻伊洛嘗稱薛河東曰自功名者視之則以為偏自富貴者視之則以為迂尚綺麗者則病其枯淡尚博洽者則病其拘束世俗之學專事乎功名富貴其視道德為何物專事乎綺麗博洽其視性理為何事無怪乎其病薛河東也時以經術取士最為正當滌隋唐以來之陋但士用經術而進不用經術而仕多奔走形勢伺候公卿要功名覓富貴不自以為非但丈夫氣喪而國家取士之意亦負焉此無實志於經術竊經術以進者耳盱豫之士蓋不學聖賢之道以進者當不以聖賢之道責之矣若吾儕之人學聖賢之道以進而日干於人以覓功名富貴此乃天地間何等人功名富貴乃何等物害聖賢之道以覓之一旦去功名富貴之場在水邉林下回頭一望能不有慚色也耶大貴自勢利而得之故小貴復自勢利而趨之大貴又自勢利而進小貴小貴又自勢利而得大貴故勢利滿天下而道義喪學問安用哉天下循道義轍者十一循勢利轍者十九一不能勝九故九者肆一者遁是以天下之勢多暴寡寡不能暴多道義日衰也夫何足怪今人用才以貌不以心以言不以行以習於容止不以習於誠朴以熟於人事不以熟於世故以善於成己不以善於成物是于其末不于其本于其外不于其內天下安得有真才世之不治也宜矣論道須要識道體不識道體則見道不真論治須要識治體不識治體則為治不實論事須要識事體不識事體則處事不正失此三者烏足以言學哉東溪日談録卷六
