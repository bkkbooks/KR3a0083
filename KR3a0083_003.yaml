body:
  text: 東溪日談録卷三明周琦撰理氣談理氣只是一事理不外氣氣不外理先儒多説成兩事却不可曉且隂陽氣也一隂一陽理也氣固此之隂陽理亦此之隂陽固非氣乃此之隂陽而理又出此隂陽之外亦非理乃此之隂陽而氣又雜乎隂陽之中如天地之始物成物者氣也其所以主始物而成物者理也皆不相離也與上而日月星辰風雲雷電下而山川草木羽毛鱗介中而生齒戴髮之人其成形成象成聲者氣也所以成此形此象此聲而各有其性者理也有氣便有理有理便有氣天下未有無理之氣亦未有無氣之理是故氣賦萬物之形理賦萬物之性氣以形驗理以性驗非一事也先儒曰若氣不結聚時理亦無所依著是先有氣後有理又曰先有理後有氣又曰氣傍是理行此氣之聚則理亦在又曰要之先有理只不可説是今日有理明日有氣又曰理與氣決是二物也凡此似説得理氣支離某甚疑焉粗讀似可細推却又多有不通太極包涵理氣方其未動見理不見氣而氣實在內及動而為陽靜而為隂却又見氣不見理而理亦在中固無彼此亦無先後也豈太極包涵理氣理且不施而先施其氣必欲以理氣分彼此先後者則是太極所涵理在一邊氣在一邊太極是形而下者之器非形而上者之道也太極只是理理便自然有氣動而為陽靜而為隂是理之流行行便是氣及生萬物氣到而理亦到理到而氣亦到氣便成形理便成性豈有彼此先後也若有彼此先後理氣便為二物則非所以為太極矣人能識得太極是理氣之本原便能識得天地萬物皆理氣之所在天地萬物既有理氣皆自太極而生則太極非理氣之本原乎是故上而日月之運行星辰之森列風雷之鼓舞雨露之霑濡雲霧之滃集雪霜之凝沍節候之推遷寒暑之往來皆此理此氣也下而山川之流峙鳥獸之飛走草木之花實鱗介之遨潛胎卵之生育形氣之變化亦此理此氣也中而人類手足之運動聲氣之吹噓出入之作息酬酢之往來語默之異宜與凡動靜進退仕止久速吐詞為經作事為文則亦莫非此理此氣之所為也則又何物而非理氣也哉天是輕清之氣包裹著地地是重濁之氣結成塊子在天之中天氣緊附著地地如桴筏緊附著天天氣轉旋不已所以承載得地地之形為天之氣所裹故不墜不壞或天陽不足地隂有餘以不足者而載有餘則有餘者有時而動不足者有時而裂天氣包在地下其氣上行故萬物之生皆自下逹上便可見地是天之氣包裹承載方天之未開地之未闢人之未生隂陽混沌只此氣耳及隂陽既定氣之清者上浮名之曰天氣之濁者下凝名之曰地氣之精者結聚大而為日為月小而為星為宿日月星宿與天之氣同浮亦同轉旋不已是天地之氣自相依附而日月星宿又自依附於天之氣中成文章以懸象著明也天以日運而成晝月運而成夜其成晝成夜者皆日也月無預焉方日自暘谷而升於天是日行於天其光在地之上照耀四方至入咸池然後光晦故指照耀之日而名晝也是日之為晝者以日之光在地之上也及自咸池而入於地則日繞地下其光在地之下而地之上晦焉故因日之晦地上無光而謂之夜是亦指日之晦而名之也則晝夜者以日之光晦而各名月固無所預也天地之氣籠統相續本無分别然有春夏秋冬之分者聖人化而裁之之道也因生物而曰春長物而曰夏斂物而曰秋藏物而曰冬别為四時者以要一嵗之始終聖人敬天之道也天之緯星角亢氐房心尾箕奎婁胃昴畢觜參井鬼栁星張翼軫斗牛女虛危室壁二十八宿者陽其本體也故閃爍開合其光不定經星之金木水火土者隂其本體也故本體之光不動觀朱子曰經星是隂中之陽緯星是陽中之隂可見星非晝無而夜有但晝有日之光不能顯耳夜則日行地下亦如月之受光於日而與月同明也故朱子曰星光亦受於日但其體微耳春秋傳二十八宿分在四方方有七宿共成一象蟲獸出地其象在天東蒼龍西白虎皆南首北尾南朱雀北玄武皆西首東尾從角而西左旋此亦人以象獸非天布置而為是象也後世術家以指在地山川名為四獸占地宅禍福也謬哉東西南三方之獸皆以一名惟北方之獸曰玄武者則以兩名非特北方之物為然而北方之理曰貞者亦信智也萬物形成於地象皆見之於天故占天以見萬物如木氣在東其色青上干於天故星之色亦青金氣在西其色白上干於天故星之色亦白火氣在南其色赤上干於天故星之色亦赤水氣在北其色黑上干於天故星之色亦黑土氣在中其色黃上干於天故星之色亦黃此五行之氣各以方成色者五緯星也蒼龍之宿七共三十一星角二星亢四星氐四星房四星心三星尾九星箕四星合成一獸占天七十五度白虎之宿七共五十星奎十六星婁三星胃三星昴七星畢八星觜三星參十星合成一獸占天八十五度朱雀之宿七共六十星井八星鬼五星栁八星星七星張六星翼二十二星軫四星合成一獸占天一百二十度玄武之宿七共二十五星斗六星牛六星女四星虛二星危三星室二星壁二星合成一獸占天九十八度四獸之象占天度數甚濶而成象甚大在地之形豈有如是之大也蓋輳集星宿強而名之使人易識四方之宿非若五行之有實形也春秋傳略取以言天耳日月之食日君象月后象臣象然雖日月之行上下適然相掩而食其實應其象者當之故春秋書日食不書月食厯家以纒度推之亦多驗矣日食朔者日月之合東西同度南北同道則月掩日而日食矣月食望者日月相對月光正滿故日月相對同道同度則日亢月而月食矣所謂同度者如日在午月在子子午同度所以食人見日月之食不見黃赤二道厯家因天有此路數名此二道以别天之度分記日月之行先儒亦多據此説理惟沈存中辨之當矣有分黃道居中青道居東白道居西赤道居南黑道居北者與厯家不同與儒者所論者亦不同皆不敢據之以為實也邵子曰日月之相食數之交也日望月則月食月掩日則日食猶水火之相尅也朱子曰日月之食皆非常也而以月食為常日食為不常者以隂勝陽而掩之不可言常也故春秋日食必書而月食無紀焉邵子是論其食之體朱子是論其食之用必兼此則其義備矣隂陽之氣合而為雲散而為雨觀小畜密雲不雨與既雨既處可見矣天一生水地六成之故水居五行之首天地間惟水為多耳有謂雲氣合而成雨故雲散則雨地氣合而成水地常凝聚故水無窮謂雨為雲氣之合水為地氣之合恐非論其原也五行惟水為多觀孔子曰天一生水地六成之而居五行之首周子太極圖陽動之後盛隂之合亦先生水則水之多可見隂陽會合其氣相薄升而為雲降而為雨若氣升緩矣降而為雨亦緩必無激薄之聲不能成雷也若氣升急矣降而為雨亦急必騰而為雲鼓而為風裂而為電震而為雷施而為雨皆所謂隂氣包裹陽氣於內陽受隂裹不能得出故衝突而出之其破裂者電也其破而成聲者雷也雷與電皆陽氣在內衝發於外者也觀神機火器必煙光先發而聲震隨之其電先掣而雷聲始震者其理一也雷之殺人壞物非假外物也氣衝激耳邪巫之説雷之運而有車響而有鼓裂而有火殺人壞物而有斧曰車曰鼓曰火曰斧皆器也非氣也若器則必有造而與之者雨散雲收貯之者何處也持之而為雷者何人也邪巫之謬世之不識理而信俗者從之邪巫之亂吾道也孰甚焉星之與雷同一隂陽之氣故星之隕則化為石其形如狗雷之衝突於物墜而亦化為石其形似斧與星隕化而為石其形似狗者一類矣雷之殺人其烙於皮膚者非字也雷之奮迅其氣衝裂其人腑臟血氣奔走皮膚狀似龍蛇故人見而謂之字豈真有字以書於上哉雷激物之激恐亦不當作擊若擊乃攻擊之擊主物而言謂雷激則激薄之激主氣而言隂陽之義也恐只當言激而不當言擊也世謂雷殺人以罪壞物以怪然無罪者亦殺無怪者亦壞觀此可見乃隂陽之氣激薄衝突而殺人壞物非有所擇不假私意於其間也惟人不能操存涵養適然遇之神明為之失守心志為之驚喪故血氣蕩散而死矣其雷雨弗迷不喪匕鬯者豈有是哉老幹中虛激薄之聲自下而發者易入衝突之力自內而外者易破其中虛之所藏者蟲獸百怪死焉雷豈為是霹靂哉其非中虛者其體內實其無蟲獸百怪則衝突之氣裂中而破外何怪之有哉月中影子世説謂之桂兔淮南子謂之山河影桂兔之説固謬山河影之説恐亦非確論矣且山河皆地類與地同氣者也日月相對何止山河有影地無影也月中既有山河之影如五嶽在五方四海在四方月中明而有空缺處當在四方其黑而有影處當在五方今月中却有一小方之有影子大方之有空缺與地山河不對況山河非移動之物非若月之流行有移動自東及西上下顛倒不一其中影子何一定而不移不隨月與山河而為顛倒移動邪此必隂氣凝而為月微有查滓凝結在內故成此影子也亦如日有纎查不顯人或見之而謂之烏耳大抵只隂氣重濁有查滓而陽氣輕清無查滓也觀隂氣凝而為地其查滓大而為山小而為石又小而為地中許多物也可見矣東溪日談録卷三
