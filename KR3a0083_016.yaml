body:
  text: 東溪日談録卷十六明周琦撰文詞談今人作文字何必直學老莊尚其詞之老蒼尚其詞者必害理故老莊不入聖賢之道何不學之經傳經若檀弓傳若孟子詞理皆勝可觀又何必直學韓柳韓之與柳詞客而已何不學之周張程朱其皆理學文章縱不能及亦不害理若學韓柳不能及之其理既害其詞亦失卒至於韓不韓柳不柳詞理胥失矣文章以氣為主所謂氣者乃道義之氣非血氣之氣若血氣之氣發而為文其詞多呼號叱吒雕琢巧媚識道者之所不取若道義之氣發而為文其詞多正大和平不過髙無實雕刻巧媚之言必不吐之筆舌矣今之人少有喜慶便序以和之少有興作便記以志之喜褒譽厭針規喜期望厭沮抑一凶字不用一貶詞不贅雖韓柳歐蘇無不如此何望其學經術乎韓子之文固朱子所愛嘗為之考異復系荆公譏韓文詩於其末曰紛紛易盡百年身舉世無人識道真力去陳言誇末俗可憐無補費精神何邪蓋亦詞章而已不能識道無補於世故也彼以朱子敬其人愛其文獨以詩酒浮華志在利祿輒有嘆息之詞者此豈知朱子者哉朱子生於荆公之後而東溪乃謂彼以朱子敬其人云云者蓋橫説也三百篇之體製停當殊甚後來喫離騷漢魏之詞變而壞之其變猶不大離三百篇下至唐沈宋近律之變則三百篇旨始大壞矣宋儒亦不能挽回此文氣也朱子嘗謂自唐初以前其為詩者固有髙下而法猶未變至律詩出而後詩之與法始皆大變以至今日益巧益密而無復古人之風矣故嘗妄欲抄取經史詩書所載韻語下及文選漢魏古詞以盡乎郭景純陶淵明之所作自為一編而附於三百篇楚詞之後以為詩之根本凖則又於其下一等近於古者各為一編以為之羽翼權輿朱子此言其欲救詩之壞也意有在矣詩自沈約一變之後有許多體製出來故三百篇旨大壞於此其體製如江左體蜂要體轆轤體隔句體回文體偷春體折腰體絶絃體五仄體五平體拗體變體離合體人名體藥名體蹉對體扇對體雙聲疊韻體平仄各押韻體八句仄入體第三句失黏體促句换韻體平頭换韻體六句體促句體五句體奪胎换骨法點化古語法抑拗物闕案法有許多變態三百篇安得而不壞乎愚少時亦嘗編有詩家體製一書其體有百樣後來見得初為學詩者約歸三百篇旨恐反為三百篇纍遂火之併今詩亦因其不工皆厭作矣少時嘗事上饒李大參先生見其稱栁子厚詩到栁州始工甚疑之未嘗請問後思鼓吹以子厚栁州詩為首其必據是言焉蓋自謫居永州有十二年窮困詩窮則工故至栁州開暢始發其工耳今人學問馳騁處全在吟咏上露之故以吟咏為第一件事不知練一字之巧費盡許多神思無補於身心一分世俗之學因而失其根本矣世之稱文詞者曰揚雄作太玄以凖易法言以凖論語作賦針皆有所凖班孟堅作二京賦擬上林子虛左太沖作三都賦擬二京屈原作九章而宋玉述九辨枚乘作七發而曹子建述七啓張衡作四愁而王仲宣述七哀陸士衡作擬古而江文通述雜體華藻隨時而體律相倣李唐羣英唯韓文公之文李太白之詩務去陳言多出新意至於盧同賈島輩效其顰張籍皇甫湜輩學其步則怪且醜僵且仆矣然退之南山詩乃類杜甫之北征進學解乃同子雲之解嘲鄆州溪堂之什依於國風平淮西碑之文近於小雅則知其所本矣近代歐公醉翁亭記步驟類阿房賦晝錦堂記議論似盤谷序東坡黃鶴樓賦氣力同乎晉問赤壁賦卓絶近於雄風則知有自來矣而韓文公廟記鍾子翼哀詞時出險怪蓋遊戲三昧間一作之也夫以文詞比論文詞猶以枝葉較枝葉之榮瘁根本不問也則亦荆公譏昌黎詩之謂矣人之性情托之於詩或窮困拂鬱而鳴其苦或化新俗美而鳴其盛寓事於言可矣若或外此引以自髙且不發我性情乃撰為一等綺麗巧怪之言過髙而無實是不情也何益之有文章不關世教不發義理道無補焉必關世教發義理則能羽翼乎道有用之言也詩若只於風情月態如白樂天韋應物韓愈杜牧蘇軾秦少遊輩所作戲妓之吟王安石梅聖俞陳后山文與可輩所作嘲友嘲僧之吟豈聖賢文字乎今人學唐沈宋所制取士近體皆用唐韻以豫觀之居今之世為今制作洪武以來自有韻矣其欲鳴國家之盛與達已不得伸者當依孔子所刪之詩為體洪武所定四方之聲者為韻則三百篇體庶乎可復乎唐宋元皆以詞章取士故嚴於韻我國家黜詞章為末學而其崇正學不尚夫小技也無踰於是時矣詩不可廢人性情所寓也若詩可廢孔子不刪今不讀之為經乎但近體則壞三百篇旨傷吾道矣人有窮苦非詩無以達人有忠良非詩無以顯使可廢焉孟郊賈島之窮苦杜甫之忠愛天祥之氣節殆將何托詩固不可以不作也作而從沈約近律之體制莫若從孔子三百篇之體制也東溪日談録卷十六
