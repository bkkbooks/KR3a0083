body:
  text: 東溪日談録卷十一明周琦撰經傳談下大學大學中庸自成書之後無人識是論治論道之書至經秦火繫在禮記中大學在儒行篇下冠義篇上為第四十二篇中庸在坊記篇下表記篇上為第三十一篇漢儒亦只混與禮樂二經同行不識其間有許大道理豈禮樂二記比哉不有程子提出殆湮晦矣雖孟子亦謂天下之本在國國之本在家家之本在身孔子則自格物致知誠意正心說來此所以聖賢之别我之與民同是一箇明德我學大人之道則能明此明德民不能明此德者我所以明之使自新焉故我之德與民之德不至其極不止也極是德之至明處即所謂太極格物之物即君臣父子長幼夫婦朋友之物也格物之格即推致君臣父子長幼夫婦朋友之理也誠意亦是誠此君臣父子長幼夫婦朋友之道而發之於意也正心亦不過正此君臣父子長幼夫婦朋友之道而間其邪心也豈獨修齊治平有君臣父子長幼夫婦朋友之道哉此謂體用一原格物致知此是始學工夫人之所易忽者朱子因傳之脫簡用程子之意補之使始學用工有下手處而身如君臣有君臣之身父子有父子之身修此於大學之年乃是未為君未為臣未為父時將以立其體而兾其用故朱子曰自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心修已治人之道其如是矣一家之內有父子長幼夫婦之倫而君臣朋友若缺焉然我盡其所以事君者一家之人皆知事君之道而無不臣之心我盡其所以交友者一家之人皆知交友之道而無不信之心教之於家者也豈直有君有友而後盡其忠與信哉聖賢體用之學莫詳於大學故修身以上為體以下為用自格物致知至於平天下只是一理貫通體用相須不是兩截事大而天地萬物小而一身耳目口鼻皆物也皆所當格者也是故天地萬物吾性之所同耳目口鼻吾性之所用於此乎格之便能知性充而至於無所不知知性便能盡性故格物致知功效甚大大學中庸只是一箇道理明德是盡已之性新民是盡人之性人已之性盡便是止於至善人之善惡全在誠意上分别周子幾善惡之說正是誠意界上誠意是修身緊關處幾之一字是誠意謹守去處偏之一字是修身為害的物件潔矩是平天下之繩墨故曽子論平天下之道節節不敢外潔矩說聚人心在義故上好義則下亦好義散人心在利故上好利則下亦好利義不可失失則人心不聚利不可奪奪則人心散矣是故平天下之道莫大乎謹義利修身之前在謹善惡故誠意傳內專言善惡治平之後在謹義利故平天下傳內深辨義利曽子之學謹慤而傳得心法也如是哉義利之别與善惡之别只在毫髮間各有其幾但善惡之幾較密義利之幾較粗天地萬物只是一箇性中庸言道道固此性大學言德德亦此性修身以上是明已德明已之德即明已之性齊家以下是明人德明人之德即明人之性格物致知是求其性之所自誠意正心是謹其性之所發修身是性率而為道者也齊家則又以一已之性明一家之性治國平天下又以一人之性明千萬人之性參天地贊化育其功不外是矣論語漢儒專以論語名門或曰魯論或曰齊論北宋之時趙普猶以半部論語治天下南宋以後始以學庸論孟為四書而破漢儒之陋也故訓詁穿鑿壞論語文氣者亦漢儒也三不亦皆論學故朱子以明善復初言之首不亦是後覺之人效先覺者明吾性本然之善以復其初習熟於已故說次不亦是後覺者性得於已同類之人同有此性者皆從之以見吾性與先覺者等故樂終不亦是同類者違之而吾之性亦無以撓其情故德成焉孔子言人為學如此故以為首冠入則孝出則弟謹而信泛愛衆而親仁此四句皆小學之事為政以德是讀至北辰是句居其所以下是發上取譬北辰之意先行其言之言是未出口之言言在口而未發於聲不言猶言也故孔子曰言朱子釋之曰未言古人不止祭宗廟設主迎尸祭五祀亦設主迎尸但五祀之禮廢而尸不可考朱子膳夫之說亦是臆度之耳然祭五祀何必用尸也孔子告曽子一貫曽子告門人忠恕略如舜益三言以告禹者但一貫忠恕是互換說三言是增益說四代禮樂是春秋大義孔子非顔子不告師有師之仁我有我之仁師不得讓之於我我不得讓之於師蓋非外物也有教無類須玩有無二字方見人皆有仁非我有而彼無者故當任之於已不當讓之於人而為之亦由乎已於人何預哉當仁不讓於師仁以為己任不亦重乎為人由已而由人乎哉我欲仁斯仁至矣同是一樣說話孔門教人只在仁字上用功蓋仁乃四德之首人而能仁則本心不壞無適而非天理矣孔氏之後有録孔門問仁等語自為一篇可見孔子以此教而弟子以此學孔子既沒猶不忘仁之為教也觀此則學重在為仁可見人之生也直罔之生也幸而免朝聞道夕死可矣孔子之言說得痛切處無踰於此人不可以不猛省仁者之人以其先難後獲故謂之仁仁者已欲立而立人已欲達而達人是因上文何事於仁說來解仁字之義取譬在立人達人上見之束修以上無不誨者孔子見其性之同而不見其禮之薄也以富貴為心者以用舍為榮辱見物而不見道也不以富貴為心者用舍無預於已於榮辱乎何有見道而不見物也惟有道者能之孔子不是說蔬食曲肱可憂之日可樂是說雖蔬食曲肱亦樂無不在只爭些子轉換便見聖人氣象之别不知老之將至不知二字當細玩仁之不逺以其在我故不逺然既在我何逺之有民可使由之不可使知之非不欲使之知也不能使之知也使民由之則易使民知之則難鄉黨一篇見孔子弟子學孔子之用心處若非用心何體驗如此之實孔子初以道之所託者顔子也顔子存則道存若孔子存也顔子死道無託焉故曰天喪豫天喪豫周公以王室至親歷仕兩朝有大勳勞成王錫豫又厚故富耳非若後世橫取之所致者則無嫌焉周公乃天子之卿季氏特諸侯卿耳其富過之故用比擬夫子許㸃非特許其言志之高併其動靜從容皆許之如騫仍舊貫何必改作之說皆然克已之已是已私復禮之禮是天理天理復在克私之後若止說克得一分私復得一分禮非顔子之克復也質直以下是言達字之義色取人以下是言聞字之義孔子言為政有近恱逺來之效無非發葉公之問然後告其政使行之之力也惜乎葉公不能再問故但知其效而不能知其所以得是效者修何政以致之也惟易事難恱方見其為君子剛毅木訥非惟近仁而已古之學者為已今之學者為人三代之時尚爾況後世乎為人之學恐人不知亦如為人之亷恐人之不知也學與亷皆吾分內事耳人之知不知何預哉學與亷皆當為已不當為人故無預於人也天下有道則禮樂征伐自天子出章是孔子作春秋之初意四代禮樂章是孔子作春秋之筆法孔子作春秋之志亦先見之矣隱居以求其志行義以達其道用之則行舍之則藏君子出處體用相須於此可見陽貨饋孔子豚小人致君子之奸也孔子時其亡而往拜君子待小人之法也孔子之於陽貨亦壯於頄之意堅之磨而不磷白之涅而不緇非聖人不能吾豈匏瓜也哉焉能繫而不食是孔子見佛肸之召有欲往之意非以佛肸可仕則仕可止則止也君子之仕行其義之義是於可否去就處見之非行義逹道之義也君子三變是望之即之聽之有此三者不同非一見之間有此三者之變態也得其情勿喜聖賢閔世之言大禹泣罪人之意也賜以夫子之不可及方之天不可階且天固難階而聖人則可階矣賜以難階者方亦以見賜之學能為其大不能為其化自止而不進也與顔子之卓爾孟子之躍如者異矣故顔孟皆亞於聖賜止於賢而已不知命之命與樂天知命之命同非五十而知天命之命也孟子孟子七篇秦漢以來無人識為聖賢之言皆以子書視之與老子莊子荀子列子揚子之書等耳獨韓子一人能識是書稱其醇而又醇及功不在禹下軻之死不得其傳等語亦未嘗表白之也雖宋儒猶有繫於揚子法言之末者神宗以後程子始表章之以發其意朱子復為集注而大義微㫖始明焉孟子在戰國之時人固知其為賢然亦不過視與常賢等耳惠王以東敗於齊龎涓太子申死南敗於楚西喪地於秦故三十五年大召賢者其意在富國强兵以雪齊與秦楚之恥非行王道之意故孟子至梁一見惠王備言求利之害與不賢者有此不樂等語非惠王召賢初意是以為迂逺不用當時之人安知其為亞聖之才也未有仁而遺其親是仁有自然之利未有義而後其君是義有自然之利惠王欲求富國强兵之利與此利不同所期者利在目前以雪齊與秦楚之恥豈求仁義自然之利為王道謀哉古者男子三十而娶女子二十而嫁一夫一婦受田百畝故朱子曰無不受田之家男子有家則授之以田故不當奪其受田之時矣老吾老幼吾幼是舉一家之老幼而言之以及人之老以及人之幼是舉天下之老幼而言之故曰天下可運於掌諸候本無明堂惟天子有明堂然齊有明堂者周天子巡守東方朝諸侯之所也宣王之時天子不復巡守故宣王毁之孟子勸之不毁者存王政之意耳非欲諸侯僣天子行在而行其事也抑以發王政之問焉孟子性理之言惟養氣與性善等語且理氣只是一事不是兩事動靜是氣其動靜的骨子是理有理即有氣有氣即有理氣在而理亦在理在而氣亦在李延平所謂一滚出來是已孟子氣配義理之說不可以理氣說得支離其實氣與道義非各為一事故此章訓義難在配字上朱子解配字作合而有助之意雲峯謂集注合字本延平一滚出來意說助字本延平襯貼起來意說此語固有所授初看一滚出來固好及看襯貼起來却似又為二事看之良久然後無弊理氣說到此等去處只宜心悟用言語便難形容若言語形容却又支離了氣本集義以生方見效驗却又不可預期其效但于氣未充時只可不忘集義之事不可有所作為助長方得養氣節度黃氏以煉丹文武火譬之極得節度之意孟子為學全在養氣上做工夫觀此便可見為學是求於內而無所事於口耳記誦之功何止曰讀書而已孟子論不忍人之心因說仁義禮智四端孔子亦說四端但各因一事而發未嘗合而言之至孟子方才合說則孟子體認性情親切得洙泗正傳於此可見功利之世仁義道蕪故孟子塞功利之門開仁義之源與齊王言者必以仁義齊人安知為敬王哉孟子於此不得不自言也滕世子未陟位之時宜其心未盡喪孟子與言性善必引堯舜以實其說心茍未喪能自堯舜之道以充其性何為而不可奈何位未陟而功利先昏其心不復知有性善惜哉逮致疑而復問焉孟子又以成覸顔淵之言曉之畢竟不知堯舜可學而至只有為國井田之問性善何及哉滕世子聘孟子問為國之道乃陟位之後孟子既以三代之養民教民者告之及其去滕又使畢戰問井地之法孟子又以分田制祿之常法及常法之外與周之助法井田形體之制告之滕公之問固至而孟子之答亦詳蓋滕公為世子時有所起發而然也惜乎不能從事於性善有王政之心無王政之本滕止於滕何怪哉子夏子張子游以有若似聖人欲以事孔子之禮事之然雖非禮亦可見古人慕道之切公孫衍張儀乃蘇秦之儔戰國之賢惟是取耳故一怒而諸侯懼安居而天下熄破六國之從以為衡沽大丈夫之名也安知孟子之所謂大丈夫者三子不得而躋歟去孔子未逺大義已乖故孟子之時楊墨益縱是以辭而闢之然所闢於楊墨者陰以孔子作春秋自況也讀養氣章見孟子為學之工夫讀好辨章見孟子處世之事功其剛大之氣塞乎天地而邪僻之說自不容於心目誠可謂得孔子之真傳而功不在禹下也王政仁政仁心仁聞與不忍人之政古無是言惟孟子始倡此說蓋列國兵爭世亂民疲非有仁政固不足以收人心非有仁心又何足以行仁政故孟子於此之時用仁之一字以醫當世之不仁也堯舜之道不以仁政不能平治天下蓋言平治天下必以仁政不以仁政必不能平治也天下之事皆有法度無法度則不能成其事故曰規矩者方圓之法度明莫過於離婁巧莫過於公輸子而能成方圓者不能外規矩也六律者正五音之法度聰莫過於師曠而能正五音者不能外六律也仁政者治天下之法度道莫大於堯舜而能平治天下者奚能外仁政哉孟子以離婁公輸子師曠堯舜之規矩六律仁政並言者非為規矩六律也為仁政平治天下發也人人親其親長其長者人人是盡天下之人而言天下之人各親其親各長其長便自平了其道只在各人之身何近也為人亦各人之所自為何易也天下之平不難矣此言天下平非平天下南軒似說平天下未詳善戰者服上刑連諸侯者次之辟草萊任土地者次之戰國所尚之人才如此孟子安與之儔邪不遇於時宜矣孫臏吳起蘇秦張儀李悝商鞅凡此皆戰國之士孟子肯為是哉古井田之制中界井字有阡陌一縱一橫為之界限阡陌乃耕夫饁婦牛具往來之道戰國之時商鞅闢而為田世謂井田之制廢於秦而不知實廢於戰國始也五世而斬之世乃父子相繼之世非三十年一世之世故自高祖以至元孫乃五世也高祖以上元孫以下皆無服焉而澤亦微矣故曰斬朱子謂天下言性之性乃人物所得以生之理其理即性人之性本善也而惡則非性矣水之性本下也而逆亦非性矣故善言性者於人而指其本善之故迹於水而指其順下之故迹豈不為易明哉人以善為利水以下為利故迹皆以利為本自然之勢也豈矯揉為哉非智者不能也天下言性章首節言人物之性皆有故迹而故亦自然之勢耳次節言不智者鑿其故惟智者順其故也末言雖千歲之厯亦不外求其故迹而得之何止於性哉皆非智者不能故程子曰專為智而發朱子曰囂囂無欲自得之貌無欲是無所欲於富貴自得是自有得於道義也始條理是始其條理終條理是終其條理揭樂始終而言之非謂其間之節奏也古者仕本為道而非為貧雖有時乎為貧而道未嘗離焉後世仕不為道借以為貧故其仕也道無聞焉惟求富貴而已天下安得無貪官邪一鄉善士章無名公傳似之不可誤指義以方外之說為告子義外之義孟子仁人心也一句最說得親切學問之道無他求其放心而已此便是孟子心學工夫其用功只在求上當道在事上說志仁在心上說若只事當於理而心未仁如梁惠王不嗜殺之心亦曲從而已內無以為之體者也若只心在於仁而事不合理如齊宣王雖不忍觳觫之牛而人不被其澤心亦徒仁而已必事當於道心志於仁乃盡心知性知天只一理相貫强恕而行即能近取譬之意歡虞可以强為皥皥乃自然而無造作於其間民之風俗君之影迹也觀歡虞則霸功可見皥皥則王道可見故霸者之民未有久而不變王者之民久則與之化也良知良能者性也本然者未壞也耳目口鼻是形儼溫厲是色皆天之性人所不能無者也惟聖人然後充此形色故視聽言動之著於形者皆根於性而不縱於欲儼溫厲之生於色者皆發於性而不喪其情舜居深山與野人等至聞善言見善行却又與野人異故謂之出乎其類合仁與人則謂之道仁亦人之所固有者是以人之理合於人而言之也引而不發待學者之自得中道而立待學者之自從若引而發之學者所得亦淺俯而就之學者所從是亦强之而已豈知中所在哉大是可用力處化是不可用力處化即顔子仰鑽瞻忽不容力的地頭神是出聖一等乃聖人極至的地位中庸中庸言形而上者之道非形而下者之器如鬼神之類是皆無形影的道理故學者難理㑹不先讀大學論語孟子之書却讀中庸不得先讀三書其義理啓發胸次後讀中庸方得貫通朱子中庸六大節第一節天命之謂性以首章說中和第二節君子中庸以下十章說中庸第三節君子之道費而隱以下八章說費隱第四節哀公問政以下七章說誠第五節大哉聖人之道以下六章說大德小德第六節末章復申首章之義愚嘗依此得讀中庸之法孔子之子鯉鯉之子伋鯉早死伋得家傳於孔子故述堯舜禹孔子所傳心法之意以立言作為中庸蓋堯以此中傳舜舜以此中傳禹孔子去堯舜禹之世既逺得此中之載於經者曰允執厥中是堯傳於舜之心法人心惟危道心惟微惟精惟一允執厥中是舜傳於禹之心法以為洙泗之教其間中之一字乃此道本體之字餘十五字乃維持此中的道理孔子教於洙泗亦以此中一退之以抑其過一進之以扶其不及皆維持之者也第一節首章朱子曰言中和天命之性即中之謂體也率性之道即和之謂用也戒懼是存養此中慎獨是省察此和喜怒哀樂未發是實指此中是天命之性故為天下之大本乃道之體其發而皆中節是實指此和即率性之道故為天下之達道乃道之用自戒懼而存養之則極其中天地於此乎位自謹獨而省察之則極其和萬物於此乎育始則推原於天中則存省於人又終則推極於造化中庸之全體妙用其大矣乎中庸一書撮其大要只是言道故首章三句將言道第一句先推吾道之本原說性以見道率於性非老佛者比到第三句却說道之謂教於天下者皆聖人品節是理而行之非徒立為萬世法也君子戒懼是承道也者兩句說來故有是故字君子慎獨是承隱微兩句說來故亦有故字道也者以下乃戒慎謹獨兩節總頭也喜怒哀樂是情中節處方是和第二節自仲尼曰君子中庸至惟聖者能之凡十章朱子曰言中庸以明首章之義變和言庸者以德行言之也二章言君子時中是釋君子中庸小人而無忌憚是釋小人反中庸三章言中庸之教不興以發不明不行之端四章言中庸之道不行因太過不及之弊五章言中庸之道不行由其不明之故六章言中庸之道如舜之知無過不及然後能行七章承舜言不知之弊以舉不明之端八章言中庸之道如回之行無過不及然後能明九章承回言中庸為易而難之理非三者為難而易故民鮮能以起下章子路之勇十章言中庸之道不行於血氣之勇而行於德義之勇十一章言中庸之道有索隱行怪者乃知之太過有半途而廢者乃行之不及惟依乎中庸然後知盡仁至無所賴於勇則有以見中庸之明與行有大舜之知顔淵之仁子路之勇然後能明能行也朱子道不可離是說人莫不飲食人自不察是說鮮能知味兩端是善之兩端其惡者已知為惡何復執乎智兼二義亦如貞兼二義不特理耳凡屬北方者其物曰𤣥武亦兼二物理與物皆然也能擇是知正之所在能守是固守之必知正之所在而固守之然後盡智之義回雖說仁擇乎中庸是能擇也服膺勿失是能守也即知也合舜之知與由之勇方謂之仁大扺仁知之道自不相離可均可辭可蹈非知仁勇之道乃知仁勇之事皆不得為中庸者也第三節自君子之道費而隱至其如示諸掌乎凡八章朱子曰言費隱以明首章道不可離之意第十二章全章費隱以下皆發此章之㫖故第十三章十四章十五章此三章皆以費之小者而言如道不逺人丘未能一素位而行行逺自邇凡此皆費也其所以然者隱也十六章十八章十九章此三章皆以費之大者而言如舜之大德以及位祿名壽文王之父作子述以及追崇之典武王周公善繼善述以及宗廟之制凡此皆費也所以然者亦隱也十六章不見不聞隱也體物如在費也則又兼費隱包小大而言者也中庸之道豈但用之廣邪亦有隱而難見者耳鳶飛戾天道之著於上魚躍於淵道之著於下鳶魚即道非喻道也與子在川上指水曰道義同忠恕違道不逺便見道不逺人弗見弗聞體物不遺是言造化鬼神洋洋如在是言祭祀鬼神位祿名壽皆指舜大德即大孝非外是孝而别有所謂德也文王以三分有二之天下而猶不取者不欲有湯慙德也必至武王纘太王王季文王之緒然後一戎衣以伐紂者周之德至是而極商之惡至是而稔武王於是未嘗身親臣之故不失天下之顯名也禘是一廟二主之祭祭之大者嘗是四時之祭祭之小者大祭有祫有殷中庸獨舉禘小祭有禴有祠有蒸中庸獨舉嘗蓋中庸非言祭祀之禮是舉祭祀之義以發中庸之㫖也大祭舉禘小祭舉嘗蓋一時之順言耳然亦要小大之極者而言之也第四節自哀公問政以下至純亦不已凡七章朱子曰說誠二十章哀公問政至所謂行之者一以下以發誠字為下六章樞紐其實一章之義又包上八章費隱二十一章以天道人道言誠二十二章以天道言誠二十三章以人道言誠二十四章又以天道言誠二十五章又以人道言誠二十六章又言天道之誠終焉中庸之道雖在於中而行之則本乎誠故此七章特為誠發得無意歟中庸之達道五達德三行之者一蓋亦要博約而言之者也自根博約而言達道博矣而約之以達德達德博矣而約之以一誠原用於其體也自約推博而言一誠約矣充之而為達德之博達德約矣充之而為達道之博體發於其用也入中庸之道行之必踐其實此所以無過高不實之弊也九經者治天下國家之常理故修身尊賢親親敬大臣體羣臣子庶民來百工柔逺人懷諸侯其道皆無過不及乃中之謂其事皆經常之道乃庸之謂故治天下國家者中庸之道也達道本於達德達德本於一誠皆治乎已者也天下本於國國本於家皆治乎人者也人已之間非誠不立故達道九經皆曰所以行之者一也修身為九經之首而修之於身者亦不過以五達道耳誠無不一其不一者惟天道人道聖人賢人有别耳故下文發之誠則明是由天命之性而入者聖人也天道也明則誠是由修道之教而入者賢人也人道也二則字略有輕重之别天下至誠以下全說聖人極則至於參贊造化其次致曲以下全說賢人極則至於聖人之域亦以誠而然後化也誠以心言是君臣父子之實心道以理言是君臣父子之實理故實心曰本而實理曰用也天有此實理則成天地有此實理則成地恐說得寬了至誠無息以下又言聖人之誠與天地同其體用第五節自大哉聖人之道至達天德者其孰能知之凡六章朱子曰言大德小德第二十七章發育峻極言道之大而無外禮儀威儀言道之小而無內尊德性以下亦分九小節大德小德以言人道二十八章愚而自用以下承上章為下不倍亦言人道二十九章王天下三重以下又承上章居上不驕亦言人道三十章仲尼祖述以下直指大德小德又以言乎天道三十一章天下至聖以下以天道言小德之川流三十二章天下至誠以下以天道言大德之敦化德有大小之殊其為中庸之道者一也發育峻極言道之大以尊德性為綱而致廣大極高明溫故敦厚極乎道體之大三百三千言道之小以道問學為綱而盡精微道中庸知新崇禮盡乎道體之細中庸入德有大小之殊其實莫詳於此居上不驕為下不倍此二句是下二章題目故愚而自用以下屬為下不倍天下三重以下屬居上不驕伋見堯舜文武之後有中庸之德者莫如孔子故直言仲尼祖述憲章而辟之天地日月四時也第六節自衣錦尚絅至無聲無臭至矣凡一章朱子曰復申首章之義所謂君子之道暗然日章與淡簡溫者皆言小學立心之始其間潛雖伏矣之詩申首章言下學謹獨之事相在爾室之詩申首章言下學戒懼之事奏假無言之詩結戒懼之效不顯惟德之詩言中庸之極功未盡其妙故又引豫懷明德之詩言上天之事以盡其妙焉中庸推致於此極矣前章言至誠之道非至聖不能知故言至誠之道必先言至聖之德至聖之德非至誠不能為故言至聖之德必終之以至誠之道夫聖至於至聖誠至於至誠中庸成德至此極矣故自下學立心之始言之則人有所措手而至聖至誠不托之空言子思必推至於極立言之㫖何其至歟逺近風自微顯此六者皆相對說各為一事其理則一耳小人之道道猶事也雖小人之所為豈無道哉但道非君子之道耳首章先言戒懼後言謹獨先存養而後省察末章先言謹獨後言戒懼先省察而後存養首章是言用功末章是言下學非用功也故但言存省而不復論其序之先後矣東溪日談録卷十一
