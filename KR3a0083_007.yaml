body:
  text: 東溪日談録卷七明周琦撰出處談君子之用以道不用以非道其用以非道者則無所不至矣幸而致大貴操大權不濫動聲色則亦無他所爲惟深情厚貌小亷曲謹以要譽以謀禄而已於世何補君子行道於進退之間騐之故進欲其緩必以禮焉進不以禮者其道失矣復何望其行道於己進之後哉退欲其急必以義焉退不以義者道亦失矣又何不能考其汚吾道於未退之前哉君子學聖賢之道以進至仕於時則舍聖賢之道而不用者是外道德而内功名外功名而内富貴也其操改者志不堅也其志移者見未真也是故行道之力須要識道之真大貴者小貴之表帥大貴者奔競致之小貴者效焉不效者不能進也是故奔競之風天下亹亹也奔競以求大貴其狀無所不至惟當時未覺耳迨夫老居林下緬想當時之態不厚顔也幾希科目薦人以文字不薦人以才德才德可全見於文字乎是故舉業之習雖庸才劣德善組織先儒傳註而成文者皆足以取科目也才德安知於是哉有君子之才有小人之才君子之才剛而正其及於民者有實惠小人之才柔而邪其及於民者惟一時聲色而已豈能有實惠哉君子之才王道也小人之才覇道也君子小人有邪正王覇之别其治法也能無真僞乆速淺深之異哉今人不問君子小人其才正與不正皆竒之孰知小人之才柔佞奸邪於世無補爲不足竒故大君有命開國承家小人勿用惟聖賢則有所别小人之才詐而多僞奸而多佞者是也今人之仕唯以便言語美容貌爲賢祝鮀宋公子何人哉聖人所深惡也時之所尚以爲賢者巧言論美容止也孔子之所不取者也茍言論容止足賢焉臯陶馬口面如削𤓰堯何用之舜目重瞳其身甚短堯何薦之禹耳三漏面黧色而歩不相過堯舜何用之且薦於天湯臂再肘又體半枯而身不能完長巨姣美之桀何臣之伊尹面無鬚麋湯何臣之傅說身如鱷魚之鰭商何召之周公甚短又背偻而斷葘閎夭之髪靣不見膚周何重之又公孫吕身長七尺靣長三尺衛靈何臣之葉公子髙身小膚短行不勝衣楚何用之數君子皆建不世之功若秦之美鬚髯形軀者維持社稷二世而亡視唐虞三代之臣事功逺矣士夫不修於内惟修於外以求就於時其謬甚焉君子遇與不遇時也固不得殉道以從乎人也羲和臯䕫遇堯舜故成偉烈龍逄比干遇桀紂故致殺身禹稷遇有虞之盛故出而成水土之功顔囬遇周室之衰故處而以安簞瓢之樂未嘗殉道以干衰世之禄君子出處觀此則有術焉道德世所重富貴世所輕功名在輕重之間今世之好道德者十一好功名者十五好富貴者十百道德吾不得而見之也得見功名者斯可矣君子其衰已矣名者實之符實者名之本務名不務實聖賢之學不如是也非君子之才者也所謂名者無爲國之實功而駕實功之名無及民之實惠而駕實惠之名學聖賢者豈爲是哉汲汲於名猶汲汲於利盖名與利其途殊其趨一故以好名之心觀好利者可見矣權衡者之於才將以私人之進必先譽之譽之不已然後用之將以蔽人之賢必先毁之毁之不已然後黜之故奔競之風日盛恬退之風日衰則人才之盛衰非賢否之所致實權衡者之所召也奔競者之竊功名富貴不起於下人之無恥起於上人之啟是門也今之爲道德者僞也立門户以要名也與奔競以覓功名富貴者無異耳世俗稱人之貴猶世俗稱人之富譬之貧人穿窬一旦與富家翁等人惟愛其富而已穿窬弗較焉天下之盜由是而起奔競致貴者不猶是乎時俗之流至於如此悲夫聖賢之學體用相須求其體於未進之曰變其用於可致之時者多矣春秋者聖賢之律令律令者官府之春秋故學道不學春秋則賞罰不明而聖賢律令之威失治民不治律令則賞罰不行而官府春秋之權蔽君子之學不必出之與處當先知此之爲學矣諫諍之士當爲君不當爲己爲君則導君於有道而不要譽於時爲己則要譽於當時而置君於有過之地故爲大經大法謀者舍小以言大舍輕以言重務導其君於有道也不爲大經大法謀者則諱大而言小諱重而言輕欺世以盜諫諍之名要一時之譽而已豈諫官之職哉故曰當爲君不當爲己無怪乎士之納交以要譽彼上不植黨雖臯䕫稷契姚房丙魏無稱下不逢迎雖龔黄卓魯不顕時使然耳故舍實行以要虚譽得效者多矣夫何怪乎内交以要譽也古之諫官以君過爲己過婉而導之使至於無過故君易從諫若不行然後碎首玉階曵裾折檻也近時之諫聲君罪以露己長未為諌官先以死許觸君之怒故多難從至於擯斥則又重君之過也非善諌者也奔競之風起於上人以導之茍上之人不受奔競斥而抑之其風息矣上人左右無阿墨毁譽善矣養才在己而成就在人故西漢之才開國元勲如韓彭軰者髙祖不能爲之保全則後之效者少東漢之才光武不以貴而少驕嚴光不以賤而少屈是嚴光以氣節自髙而光武能成就之故士多節義則東漢風俗固非西漢比矣君子出處貴兩得其道立朝則當致君出牧則當澤民大遇當功銘鼎鼐小遇當求無愧於心退居林下亦當以道自守使生重於鄉死祀於社則兩全矣到頭上纔是功名不可妄求到手上纔是事業不可妄爲愚嘗以此語人而亦以自守吕藍田所謂當官之法以清慎勤為之首者仕之心也呉草廬所謂廉而不明爲吏所蔽明而不仁流爲深刻等語者仕之才也存是心而用是才資於仕多矣宋杜世昌曰作官清一畏人知同列有不謹者皆將譖己爲上者不加明察適足以取禍耳但優游於其間黙而行之無愧於心可也此其法歟今人之仕以深情厚貌爲賢以真心真意爲不肖以苛刻爲有才以平易爲無用誤甚焉世無正學故不知所取也如是夫取士以行不以言三代用此法故治道盛三代以後兩漢近之惟東漢光武時尤勝成周有鄉舉里選之法士皆修己以進人才最盛唐制科舉建學校增廣生員却又似誘人利禄使人奔競故人才反不及前自後奔競則又過之無恠乎士失所處上誘之也世自唐宋不但冗散官不使任事而已其莅於事者亦然上取於官官取於民海内安得不困窮邪上下以利相尚固不得而禁之矣許魯齋曰賢者以公爲心以愛爲心不爲利回不爲勢屈寘之周行則庶事得其正天下被其澤此其出也其曰或遭不偶務自韜晦有舉世而人不知者此其處也出處如此亦正當矣前古多君子故小人亦變而爲君子後世多小人故君子亦變而爲小人其不變而與世不合者未始不爲流俗排笑排笑而不變者其守之賢者耶游定夫曰三代之士多全德戰國之士務竒謀而不徇正道西漢之士喜功名而不務竒節東漢之士貴節義而不通時變東晋之士樂恬曠而不務實用皆風俗世變使然也惟古之聖賢不然不以世治而竪其操世亂而改其度矣古今之士循道義者多難進而狥勢利者多易得故其守道義不狥勢利而登大樞要者幾人哉惟唐虞之世及三代盛時臯䕫稷契伊傅周召之儔而已三代衰時及漢唐以後間見之矣若春秋儒者孔子以下戰國儒者孟子以下至宋周程張朱以下皆聖賢大才守道義之正其人可法萬世不能登大樞要是何也不狥勢利故也後世守道義之正者當不以大樞要自期以大樞要自期則道義之志移焉將入勢利途矣士驟進及年少者未嘗得聖道陶鎔故見理不𢎞縱知正道無所執持多爲勢利所移亦與世儒俗吏等耳執持者幾人哉故士貴見理𢎞守理固也世之沽名者得名要譽者得譽内交者得交阿附者得以附其勢故名易立譽易致交易合勢易附也天下安能有實名實譽與交以道合勢以義附者哉世奔競而無排笑鄙陋之者多故也其不如是者謂無能耳故多者排笑鄙陋其少者其少者不能排笑鄙陋其多者也宜其風日盛而不能使之衰矣今人唾罵排笑鄙陋前人不知後人又唾罵排笑鄙陋今人幾何哉古人多畏義理今人多畏法度近來倂法度亦不畏義理何畏哉宋周必大從容廊廟引進善類故君子滿朝後世卿相立朝惟引進鄉人黨友與㤙家賄客而已善類何暇及哉故黨類滿朝一相敗一黨換一相興一黨進前車覆後車續前後相繼而不憚雖有願治之君末如之何也東溪日談録卷七
