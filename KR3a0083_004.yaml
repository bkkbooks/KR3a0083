body:
  text: 東溪日談録卷四明周琦撰祭祀談上壇祀於郊以事神尸祀於廟以事鬼壇祀尸祀皆祀氣也神非氣不感氣非誠不積是故齋戒沐浴以積乎誠誠則吾之氣充以氣感氣神鬼無不格矣古人冬至祀天於圜丘取陽之生夏至祀地於方澤取隂之生今合天地而郊於建寅之月於卦為泰於嵗為首取二氣之交人事方興之日比古為愈蓋合取隂陽之義也事天之禮惟黃帝堯舜夏商周配食皆善至秦雜方士而郊加祀青白黃赤四帝至漢髙祖以黑帝為有待故又加祀黑帝亦用方士武帝則能行夏之時故至平帝元始五年正月始以天地合郊但以祖配天以后配地與以后行亞獻之失者一至晉武帝大始二年始除五帝之座併圜丘方澤之祀郊於冬十一月止取陽生之義東晉元帝大興二年亦合天地乃郊乃在春之三月唐玄宗先天元年春正月并天寶元年合郊天地宋孝宗乾道三年冬十一月亦合郊天地於圜丘其間皆無定制不若國家合郊於建寅之月為尤愈焉兩間之禮惟祭天為大非天之子不祀非誠之積不獻豈庶人所得而干預哉後世庶人醮天是祭天也其僣起於秦雜方士而郊之所致也褻天孰甚焉天地山川其祭之不僣者氣不屬也豈徒禁人名分之僣哉古之配天之祭有二郊天其一明堂其二行之郊祭者以報本以祈穀行之明堂者以發政皆大祀也先世非有配天功德者曷與哉周人郊祭之有尸者非尸天也尸后稷也謂周人尸郊者不知其所尸之故也後世郊祭廟祭皆不尸者有木主以易之故耳秦人祀天有青白赤黃四帝惟黑帝不祀漢髙祖入關初行祀事問秦人有四帝之祀惟黑帝未祀故髙祖曰黑帝其有待於我乎然則天一而已何嘗有五帝乎秦漢之祀皆非其祀矣按月令孟春之月天子以元日祈穀於上帝又左傳啓蟄而郊與郊祀后稷以祈農事者郊以時也後世郊不以時其郊之頻者褻天也今郊以建寅之月餘月不郊者不褻天也所以敬乎天者也得古人之郊以時者也秦漢祭五帝之誤惑於方士而鄭康成因之又考功記周制明堂五室康成惑為天之五方故誤注祭法遂有青白赤黃黑之五帝以勾芒祝融蓐收玄冥后土之五神各配一帝此方士誤秦秦誤漢秦漢誤康成康成又誤推考功記遂致誤祭法也天子七廟廟各有主主各有祭其以西為上者是合七廟之主而祭於一廟蓋祫祭也古人以西為上順宫室之制今人不以西為上者門堂寢室與古制不同安復用西上哉宗廟之制古今不同者宫室之制不同也古人宫室以西南隅為奧乃其尊處故宗廟列主以西為上今人宫室背北而面南中堂乃其尊處故當以北為上故古人列祖在本廟者皆東西祫於太廟者止太祖東向其三昭之主皆列北牖之下而南向取向明之義故曰昭其三穆之主皆列南牖之下而北向取深逺之義曰穆今之宫室南向故堂北上不以西上祖之主南向其三昭之主皆列於東而西向其三穆之主皆列於西而東向左昭右穆之義亦無不在焉本朝宗廟之制已不泥古惟大夫士庶皆祭於寢多以西為上不知今人宫室非古之制況以西上者漢明帝謙抑之意非古之禮故今之祭當依程子祭及四世至已為五世而斬列主當依朱子分為四龕髙祖二主居中左曽祖二主居中右祖二主居中次左禰二主居中次右左昭右穆之義無不在焉古人宫室以西南隅為奧列主不得不以西上今人宫室門堂皆南向列主不得不以北上皆自然之勢也豈強也哉祭法三章漢儒鄭康成誤注趙伯循辨之甚周密所謂先王作樂殷薦之上帝以配祖考簡在帝心對越上帝宗祀文王於明堂以配上帝之帝皆天也所謂順帝之則帝力何有之帝皆天子也猶皇帝與昊天同稱帝不敢與昊天同稱天諸侯與天子同稱君不敢與天子同稱皇一義也秦人雜方士以郊漢祖襲之殊非禮也禮止郊祭為事天之典禘祭以下皆祀先也謂皆祀天者鄭康成之誤天子始行禘禮諸侯以下皆不敢禘此古禮也蓋天子始祖建邦啓土有功德於天地生民後世子孫始踐祚焉故郊祀配天廟祀推所自出之帝非謂遺子孫以位也有功德於天地生民也諸侯以下之始祖無此功德故不敢禘豈但名分而已哉皆根本深逺非誠不能格也禘止二主祭於始祖之廟祫則合七廟之主祀於太祖之廟是禘大於祫者也舜之始祖顓頊而顓頊所自出者黃帝也故舜禘黃帝於顓頊之廟而以顓頊配之禹始祖顓頊而顓頊所自出者黃帝也故夏之禘與有虞同也湯之始祖契而契之所自出者帝嚳也故殷禘帝嚳於契之廟而以契配之武王之始祖后稷而稷之所自出者亦帝嚳也故周禘帝嚳於后稷之廟而以后稷配之一祭止列二主何謹也推所自出之帝何逺也故非仁孝誠敬之至不格禘之祭不亦大乎魯之僣禘以周公為始祖推周公之所自出者文王也故禘文王於周公之廟而以周公配之蓋文王周公皆聖人也魯雖僣禘而聖人豈復享其僣哉祫取合食之義聖人和祖從儉之意也夏秋冬三時皆祫通祀於始祖之廟一以省廟禮之煩一以和祖禰之情春不祫者春物殷盛可以分祭於廟也當從程子之説得祫本意殷祭祫祭禘祭三祭不同蓋禘祭止二主祫祭通七廟之主殷祭併毁廟未毁廟之主皆祭故殷似祫不似禘先儒謂禘祫同曰殷者非也天子有禘有祫諸侯有祫無禘殷則升毁廟未毁廟之主祭於太祖之廟與祫頗同非祭厥初生民之祖天子諸侯皆得以行之是禘祫殷三祭天子皆行祫殷二祭諸侯皆得行惟禘一祭諸侯不敢行耳禘祭止二主雖群廟之主不與而祫則合七廟之主祭於一廟功臣於此則無所列故禘祫皆不祭功臣何休曰祫祭不及功臣禘則功臣皆祭楊氏曰祫則功臣皆祭以非何休所謂功臣者皆非也周嘗改殷為禘或者祭功臣於改殷之禘以起何楊之惑也聖人維天立極德同覆載功並生成故敢與天地配食有虞以帝嚳配郊以顓頊帝堯配明堂有夏以鯀配郊以顓頊大禹配明堂殷人以冥配郊以契湯配明堂周人以稷配郊以文王武王配明堂配郊者一帝配明堂者二帝祀天之禮惟此四代歸一至秦則雜方士以郊祭青白赤黃四帝而不及黑漢人襲用方士加祭黑帝為五帝魏晉宋齊梁陳隋唐五季宋元或以地配天或以祖配南郊后配北郊或推尊以舜配圜丘舜妃配方丘或以五祖配五方帝或以三祖同配或對享明堂皆先無可配祖而後始有配後世之祭所以變亂不一而所配之祖亦不一配天之祖固非可得而輕舉者也郊配明堂二祭皆不能及有虞以下之四代也夏禹以鯀配郊鯀治水無成禹舉以配郊者鯀雖治水無成其拯民昏墊之心蓋不在於成功者也稷配蒼龍青帝之説乃鄭玄注祭法以周制明堂考功記有五室為天五方之誤故有祭五方帝以后稷配蒼龍青帝之説非周真有稷配蒼龍之祭也庶人無廟而祭於寢按廟者朝也天子諸侯大夫皆有正朝之所故死皆立廟而祭於生時所有之朝所也寢者休息所也庶人無位惟生有正寢休息之所故死亦祭於正寢蓋生時所有之所也豈敢以立廟乎周氏家祭便宜是參程朱之説及今箐齋圖説之所定者以便家祭之常恐隨流俗以廢禮耳今士夫之家多廢祭者正以禮拘於古反病難行卒至古今兩缺子孫之於先祖邈然無關也月令以門行户竈中霤為五祀而不及井周隋宋元多從之白虎通劉昭范蔚宗髙堂隆諸人以門户井竈中霤為五祀而不及行漢晉多從之然行與井井之用尤重於行皆人道之所資用者也此五祭惟有祿之家得行庶人無祿恐不及行惟祀先耳祭户用春取萬物始出之義祭竈用夏取萬物得養之義祭門用秋取萬物自固之義祭井用冬取萬物伏藏之義祭中霤用六月取土居中之義古人於此各有取義豈茍焉而已哉古之中霤即今中堂乃其尊處有井祭井無井祭之於行則亦其理但竈為老婦之祭天子大夫非所當親祭今庶人之家皆嵗祭竈蓋為老婦之祭者也朱子曰凡祭五祀皆先設主而祭於其所然後迎尸而祭於奧略如祭宗廟之儀如祭竈則先設主於竈陘祭畢而更設饌於奧以迎尸也朱子此説古禮所載於是觀之可見五祀之禮有主亦有尸所謂祀竈尸膳夫祭門尸閽人祭竈祭門皆祀氣也非祀形也不當有尸先儒亦用其説不可曉祭法有七祀五祀三祀二祀之説與月令五祀不同所謂七祀者司命中霤國門國行泰厲户竈天子之所自立所謂五祀者司命中霤國門國行國厲諸侯之所自立所謂三祀者族厲門行大夫之所自立所謂二祀者門行適士之所自立所謂一祀者或户或竈庶人之所自立此乃祭法所載皆周制也與月令五祀不同或者月立五祀國之正祭而祭法所載者雜收時祭非祀典之正者也王制曰春曰礿夏曰禘秋曰嘗冬曰蒸又曰天子犆礿祫禘祫嘗祫蒸又曰諸侯礿則不禘禘則不嘗王制論祭似無歸一王制之所謂禘或只周之殷祭改而為禘之禘其實即殷也非王者大祭之禘如魯之所僣者也東溪日談録卷四
