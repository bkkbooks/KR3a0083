body:
  text: 東溪日談録巻十明周琦撰經傳談中詩十五國之風俗惟周召二南為正其餘邶鄘衛王鄭齊魏唐秦陳檜曹豳十三國為變皆諸侯采獻于天子民俗之歌謠播於聲樂之中其正可以化天下其變可以垂鍳戒故不分羙惡而並收之也天下國家之化造端於閨門而亦徵驗於閨門故國風之詩專采男女相與歌謠以見王化之得失如闗雎則夫婦無䙝狎之私葛覃則父母有歸寧之願卷耳則行役之無所汚樛螽則衆妾之無所妬桃夭則以宜其家人芣苢則以宜其女道漢廣汝墳則女化外行於隣國振振公子則后德内及於宗孫此文王后妃之化所以大行而周之風俗可謂正矣故周南為正風周南固文王后妃之化而召南亦其化之所及故召南如鵲巢彼穠女子有于歸之德摽梅野麕女子有來歸之願采蘋則夫人謹祭祀之儀草蟲殷靁則夫人守行役之貞小星則夫人待下之無妬忌江汜則夫人妬忌之能反已然亦皆得其正者也故召南之詩亦為正風周召二南詩皆相類如闗雎類鵲巢巻耳類草蟲殷靁類樛木螽斯類小星漢廣汝墳江汜皆化行於遠者也收詩所取之同其義如此十三國之變風者邶鄘衛鄭男女之亂倫王豳二國君臣之失道畋逰荒淫者齊也儉嗇褊急者魏也唐傷於憂秦傷於勇淫游歌舞莫若於陳亂極思治莫若於檜曹風俗皆變而非人道之常劉安城言之最詳能不為鍳戒乎故曰變風按鄭氏曰小雅大雅周室居西都之時詩也小雅自鹿鳴至菁莪二十二篇大雅自文王至卷阿十八篇為正小雅六月大雅民勞之後皆謂之變雅鄭說甚明風有正有變雅有正亦有變大抵正者皆文武成康盛世之音也其餘非文武成康而為衰世之音者也得不謂之變乎世道有盛衰故音有正變衰根於盛變根於正氣運之相㝷也豈偶乎哉國風之詩凡十五國為正風者二變風者十三亂多而治少也讀國風之詩可見天下亂日多而治日少理勢然耳詩之一正一變見世之一盛一衰即孟子之一治一亂也小雅之音通八什共八十篇其為小雅之正者皆燕饗之樂以鄭氏之說論之鹿鳴之什有九篇白華之什有五篇彤弓之什有二篇共十六篇至菁菁者莪止皆燕饗之樂歌其餘自彤弓之什六月棲棲起者如六月之詩即為征討之音不可奏之於燕饗者共五十八篇皆王政既衰之後歌其政之衰者也此所以有正小雅變小雅之别也大雅之正變亦如小雅大雅通三什共三十一篇其為大雅之正者皆朝㑹之樂歌亦以鄭說論之文王之什有十篇生民之什有八篇共十八篇至有巻者阿止皆㑹朝之樂歌其餘自生民之什民亦勞止起者如民勞之詩即為同列相戒之詞憂時感事之意乃厲王時言衰世之音不可奏之于㑹朝者其十三篇亦王政既衰歌其政之衰者也此又所以有正大雅與變大雅之别也讀者不先知其大㫖則㣲意不能究矣非獨思齊之詩具脩身齊家平天下之道而二南之詩亦具是道耳故朱子於周南曰其詞雖主后妃其實皆所以著明文王身脩家齊之效也於召南亦曰鵲巢與采蘋言夫人大夫妻以見當時國君大夫被文王之化而能脩身以正其家也甘棠以下見方伯能布文王之化而國君能脩之于家以及其國也程子亦曰天下之治正家為先天下之家正則天下治矣二南正家之道也觀此則闗於治也可見頌為四詩之末葢宗廟之樂歌與神明交者非若正小雅之燕饗賔客正大雅之朝㑹諸侯與人交者也朱子曰周頌三十一篇多周公所定亦或有康王以後之詩其詩清廟臣工閔予小子三什有祭宗廟之詩有祭太王之詩有祭文王之詩有祭武王成王康王之詩有郊祀后稷以配天之詩有宗祀文王於明堂以配帝之詩有戒農官之詩有朝㑹告祭之詩有成王除喪朝廟之詩有康王以後之詩有昭王以後之詩在康昭以前者多周公所定凡此皆治世之音也魯頌四篇皆無祭祀之詩朱子通謂宗廟之樂歌者葢周公封魯用天子禮樂故有頌名其實魯乃頌禱之頌而非宗廟樂歌之頌朱子見周南二頌皆告於神明之詩故通以宗廟樂歌言之耳魯頌者頌之變也華谷嚴氏之說是矣魯頌四篇二十四章如駉牡為僖公牧馬之頌禱有駜為燕飲之頌禱泮水為飲於泮宫之頌禱閟宫為閟宫落成之頌禱皆無宗廟祭祀之詩如後世得賢臣頌大唐中興頌酒德頌之頌也但其體制古今不同矣商有天下本先於周然其頌繫於周頌之末者武王克商封㣲子于宋以奉湯祀故尚書有微子之命其詩有五篇如猗與烈祖皆祀成湯之樂𤣥鳥為祭祀宗廟之樂濬哲言商世世有濬哲之君至湯始發帝命之祥帝命不違言商有明徳之祖天命未定至湯始應期而降小球大球言湯為天子而為諸侯之所繫屬武王載斾言湯既受命載斾秉鉞以征不義昔在中葉言伊尹佐湯而有天下撻彼殷武為祀高宗之樂維汝荆楚言氐𦍑莫敢不朝天命降監言高宗之中興商邑翼翼亦言高宗之中興凡此皆以歌成湯創始之功高宗中興之羙故不及商之先代周既滅商而封商子孫祀以㣲子抱來之樂器實舉廢國之盛典故商頌繫於周頌之末也周頌是周公所定之樂歌而魯則周之所封乃伯禽就封之國商亦周之所封乃祀宋之地非當年之商其頌葢商之子孫歌以祀湯者故以魯頌次周頌商頌次魯頌宜矣大小二雅亦周之雅不言周者無他所雜而頌言周者别魯與商也春秋孔子之筆惟易與春秋可見春秋之義不可以言求惟可以意求求之於意言自得矣春秋之作孔子挽禮樂征伐之權歸天子也春秋衰世之書聖人明之以天理人欲是扶持衰世之意易書詩禮樂言其理春秋言其用君臣父子夫婦朋友其道固見於五經然有不能成其道者則用春秋之法以誅其心矣春秋起自魯隠公者詩亡之時也詩亡之後王者之迹已熄故孔子為亂臣賊子懼作春秋所以正王道明大法以遏亂臣賊子之心誅死者於前懼生者於後也孔子告顔子以四代禮樂者即春秋書法也但四代禮樂是以善者取之春秋是以惡者誅之皆經世之大法者也春秋於天地日月星辰君臣父子夫婦長幼朋友建侯行師宫室禮幣鳥獸草木無不備書然皆裁之以義斷之以法理無不備焉故可以窮萬物之理孔子假二百四十二年南面之權者隠公十一年桓公十八年莊公三十二年閔公二年僖公三十二年文公十八年宣公十八年成公十八年襄公三十一年昭公三十二年定公十五年哀公在位十七年而十四年春秋絶筆十二公共二百四十二年以行天子之事故曰罪我者其惟春秋乎孔子何為自罪哉不幸而生於天理人心泯滅之餘以匹夫而代行天子之賞罰也豈得已哉朱子曰左氏是史學公穀是經學史學者記事却詳於道理上便差經學於義禮上有功然記事多誤三傳優劣朱子辨甚分明周之正月本建子之月冬也而曰春王正月者假冬以言春明經世之大法也春秋意在言外其如是乎春秋十二公不書即位者隠莊閔僖四公書即位者桓文宣成襄昭定哀八公或書或不書義固不同其書者與不書者亦各不同也不書即位者四公如隠與僖皆非元妃所生隠生母攝内主之事而年又長故隠當為嫡宜立但以諸大夫扳己以立造争亂之端莊為嫡長當立以其未誓擅有其國閔以般卒慶父夫人利公之幼而自立之僖以閔之幼薨夫人孫于邾慶父奔莒其母成風所屬季子立之皆内無所承上無請命故不書即位不正其始也書即位者八公如桓之殺隠為殺其君而立莒太子僕殺父紀公以其珠玉奔魯納諸宣公公受殺賊之立而不討其賊為殺君者所立罪與桓公等定公之兄昭公為季氏所逐出奔八年薨於乾侯殺嫡其弟定公當立喪越葬期不至虛其位七月不立不保宗祀非孝亦為逐君者所立與桓宣罪同而定少差其書即位明其無君自為一類惟文成襄僖哀雖不受命於天子則亦受先君之命以繼世五六公者又為一類故書即位以正其始春秋書即位不書即位者義雖不同然皆以内無所承上無請命為大義也朱子曰凡兵聲罪致討曰伐潛師掠境曰侵兩兵相接曰戰環其城邑曰圍造其國都曰入徙其朝市曰遷毁其宗廟社稷曰滅詭道而勝之曰敗悉虜而俘之曰取輕行而掩之曰襲已去而躡之曰追聚兵而守之曰戍以弱假强而能左右之曰以皆誌其事實以明輕重内外讀之令人快然又嘗雜考我所欲曰及不得已曰暨克者力勝之詞取者得非其有之稱納者不受而强致之謂次者止也享者兩君之禮凡大閱大雩大蒐而謂之大者譏其僣也大無者志食廩之竭也大去者土地人民儀章品物悉委置而不顧也書同盟同欲也逃義曰逃匹夫之事也滅而書奔責不死位也戰而言及主乎是戰者也敵加於己不得已而起者謂之應兵爭恨小故不忍忿怒者謂之忿兵珠玉曰含車馬曰賵生事曰唁死事曰弔軍獲曰㨗民逃其上曰潰雩得雨曰雩不得雨曰旱人火曰火天火曰災書之重詞之復其中必有羙惡也奔則其死社稷也如往朝見也公子出奔復而得國者其順且易則曰歸有奉焉則曰自其難也則曰入不稱納矣凡此亦春秋字義吾子京幼而直愚嘗以是課之僖公十六年正月隕石宋五月六鷁退飛過宋都本宋災異而書于魯者志宋以告魯宋不自咎欲魯之同咎志宋不自咎也書大雩多於九月者即今建寅之七月也聲人之罪鳴鐘擊鼓整衆而行此兵法出於正也是曰伐潛已之師銜枚臥鼓出人不意此兵法出以竒也是曰侵故以聲罪致討曰伐潛師掠境曰侵為是侵伐二字觀齊伐楚以正因而侵蔡出於不意為奇故齊於楚曰伐於蔡曰侵可見義所當執而逃者曰逃義不能以理自明效匹夫之行故逃義匹夫之事不覺其來乃追其去故曰追戎祭太山河海曰三望不奔王喪而祭之曰猶三望者天子之禮也魯祭僣也宣公之僣三望猶季氏之僣泰山也莊公肆大眚者失刑也故書之以正賞罰文公十四年有星孛入于北斗葢孛者惡氣所生北斗者北極所主惡氣之生入於北極故其應在宋弑昭公齊弑懿公晉弑靈公春秋書之以見天之示人顯也孛書春秋有三文公十四年入於北斗一也昭公十七年入於大辰二也哀公十三年見於東方三也入於北斗者有宋齊晉之弑入於大辰者有王子朝之禍見于東方者始應於伯國次應于王室又次應于蠻夷春秋歴書以見天屢示其戒人屢不知戒也昭公二十五年鸜鵒來巢於魯如杜鵑來鳴於洛也葢鸜鵒不踰濟杜鵑不過北其至必有謂也故書之生事曰唁即弔生曰唁也春秋以討賊為義取國為貪故三代之時湯有慚德也左氏謂人火曰火天火曰災者觀宣榭曰火新宫曰災其義可見矣春秋書日食或曰朔或不曰朔或曰既或不曰既或止曰日有食之義各不同也閻伊洛嘗謂愚曰方萬里得鮑云龍所著天源發㣲山中批㸃功完山之泓竭而不發先儒謂西狩獲麟為春秋書成之應信矣禮樂禮樂者治世之大用有禮則治無禮則亂有樂亦治無樂亦亂所謂禮者不止節文度數形而下者之禮是人心之序也所謂樂者不止宫商律吕形而下者之樂是人心之和也如君臣父子失了人心之序便是無禮徒有節文度數何用既失了序或臣弑其君子弑其父如春秋戰國之亂人心不和便是無樂徒有宫商律吕何用禮樂之用此其所以為大人心和序非仁者不有也故孔子曰人而不仁如禮何人而不仁如樂何禮樂有本末有理器理即本也器即末也前軰說古之樂正人心今之樂蕩人心此說甚痛快古者禮經樂經並行今樂經亡矣禮記一經四十九篇止第三十一中庸篇第四十二大學篇為禮經壓卷其餘四十七篇多為漢儒所亂非若易詩書春秋整齊然雖大理所在終不能與此四經相稱曲禮上下其詞與理亦優不獨檀弓上下也人生十年幼學至四十年强仕才之充也四十强仕才與年俱强五十服官政才與政俱進六十指使才與位俱尊何事功之不立邪此古人之治所以卓越也後世未二十三十而仕未四十而大夫未五十而指使惟以功名富貴自尊而已故六十七十但憂不能久於其位而七十不退者憂几杖之不賜耳何有於事功此後世之治所以不古若也王制言祭祀甚駁雜言班爵頗詳宻王制一篇或謂作於漢文帝時博士諸生故為漢儒手筆非聖人書也月令雖秦人吕不韋遺意其用夏之時得聖人斟酌之宜而氣物亦不爽候曽子問於孔子之禮反復詳盡其學問謹慤亦於此可見矣武王為世子以事文王成王為世子以事武王皆法文王之事王季也周之家法相傳可謂正矣禮而謂之運其理之通達禮而謂之器其物之適宜然禮則理之體而物則理之用也祭天止用一牛故曰特牲特牲者天子之禮也凡子之事父母婦之事舅姑男之由左女之由右皆閨門之内儀則也玉藻者天子諸侯冕服之制度也不曰明堂而曰明堂位若君臣上下尊卑前後之位天子制諸侯之事也若非祭祀之明堂也發政之明堂止曰明堂而已耳朱子曰小記是解喪服大傳少儀是小學之支流餘裔程子曰樂記最為近道表記其亦近道觀此可見四十九篇之内似大學中庸者少矣樂經既亡獨樂記不亡可見樂經是記聲音樂舞之節非文辭可讀之書秦火之後漢儒不收矣雜記亦有上下二篇雜記諸侯大夫士内子諸禮故如易雜卦序卦之類也喪大記非與喪服小記相配對說葢喪大記是記其喪之大服小記是解喪服小𫝊也虞夏商周四代郊禘之禮配天之祖甚整齊下及秦漢以後便不可觀祭法是禮所陳之制祭義是禮所起之宜祭統是禮所攝之本與祭義同意也孔子答哀公之問禮燕居閒居之論禮者石梁王氏於答哀公則曰如事天如事親此兩句非聖人不能言於燕居則詞㫖散漫處未必為孔子之言此說得是好賢能如詩之緇衣羙鄭武公然後為好之真惡惡能如詩之巷伯刺幽王然後為惡之正則天下同其好惡而作孚矣親喪之不事簀者則奔哭事簀者則哀怛故又制為奔喪之禮而問喪則記其所哀怛者以示人也讀服問閒傳三年問三篇則九族之服明矣凡服之制皆上衣而下裳惟深衣之制衣與裳連取深為義天子服之不以為卑庶人服之不以為尊盖上下之通服也諸侯大夫將行射禮必先燕飲用投壺樂賔以習射禮容儀故投壺發矢與射之發矢一也聖人之言語意渾然賢人之言引而自高孔子對哀公儒行之問多引而自高非語意之渾然者也後人疑非孔子之言或者為當乎冠禮昏禮鄉飲酒義射義燕義聘義六篇之所載者天下之達禮也故各為一篇而不雜焉四制之說以恩制者為父以義制者為君以節制者則三日而食三月而沐三年而禫以權制者三日授子杖五日授大夫杖七日授士杖婦人童子無病不杖與禿傴跛病皆不使至於極皆禮之有節文者矣古者斬衰之服行於君不行於父天下無二尊也後世易之不止行於君而亦行於父厚之道也天下之事過於厚則可過於薄可乎至我太祖則又易母服之齊衰與父之斬衰等焉葢父母一也何厚薄之分邪況母妊子十月乳哺三年勞莫大焉易母服而與父服等者亦若易父服與君服同斬衰者一也此太祖所以為聖人也歟東溪日談録卷十
