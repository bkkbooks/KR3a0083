body:
  text: 東溪日談録卷八明周琦撰物理談列子曰太易未見氣也太初者氣之太始也太始者形之始也太素者質之始也形氣質具而未離故曰混沌恐亦不當如此説天地雖大亦萬物中之一物也太極之所生也三五厯記天地混沌如雞子之説既如雞子便有清濁之分非混沌時矣混沌蓋清濁之未分而雞子之黃與白尚混為一處時也淮南子天如倚杵之説與北極出地上三十六度南極入地下三十六度之説似合日陽精之發故其色赤而光大月隂精之發故其色白而明止有魄而已其無所不燭者受日之光也非月之本體也郭璞注山海經謂羲和為天地始生之日月山海既誤郭璞則又誤矣五星列五方二十八宿列四方七宿皆指昏時之所見者也中夜則無定位矣黃帝分星次凡中外宫常明者百二十四可名者二百二十微星萬一千五百二十此後漢天文志所注者也明而為書者日也晦而為夜者亦日也非月也愚辨之頻矣五星木曰歲火曰熒金曰太白水曰辰土曰鎮此厯家所紀五行之異名也立十二辰以名十二月立十二獸以名十二辰事始謂起於黃帝蓋黃帝時容成造厯也黃道赤道及日月之食愚據先儒之説常因所談而應人也日月星宿雷霆風雨皆天之物隂陽之氣也隂陽精氣凝而大者為日月凝而小者為星宿此萬古之常者也及其氣之會合則又聲激而為雷光掣而為電披拂而為風發散而為雨此又一時之變者也凡此則隂陽之物於物者也天之所以為文章者也隂之為物其性凝沍故寒極則凍觀雪霰冰雹可見陽之為物其性發舒故溫暖即解觀雨露可見雷乃陽精之雄電乃陽精之姦皆隂氣密裹薄激而欲出於外者也電而雷者得陽之正雷電雨者隂勝乎陽非正也雷電雨露陽散隂也氷雹雪霰隂脅陽也雷陽之發而有聲電陽之發而有形霜刑罰萬物之具故春秋非時不當隕而隕者為人君刑罰不正之應也水乃盛隂之變而合於陽火乃盛陽之變而合於隂木乃稚陽之變合金乃稚隂之變合土乃盛隂盛陽稚隂稚陽之餘氣故五行一隂陽也陽性上行故火上炎是陽氣之升隂性下行故水下潤是隂氣之降盛隂盛陽之質也陽與隂兼故木得水則生得火則然隂與陽兼故金得火則鑠得水則凝稚隂稚陽之質也隂陽兼而適均故土於水木金火皆不相離成始而成終者也山川草木羽毛鱗甲皆地之物亦隂陽之氣所在也山川固重濁之隂凝於下者凸出則為山凹下則為川故山川為物其氣皆寒陽中之隂也草木皆植物羽毛鱗介皆動物又陽變隂化所致皆地之持載而為文章者也雀入大水化為蛤鳩化為鷹之類此又形化之變者也與氣化者類也雞司晨犬司夜皆自然之理也豈人所命哉物有物之性也鳥春至則發聲秋至則藏舌草木春至則萌蘖秋至則斂液天地非物物而提撕之自不能違其時者氣使之也鳥獸草木通乎天地之氣者矣觀子規鳴於洛可見得氣之先者鳥也是非通天地之氣者乎許慎注淮南子書曰黃帝古天神所造人時化生隂陽上駢桑林皆神名是不知天開於子地闢於丑人生於寅且人之生皆在黃帝之前黃帝既造人矣黃帝又何人造耶黃帝之生有妊二十月之説伊尹之生有夢臼水東奔之説宋祖之生有甲馬營香聞三月之説三蘇之生有枯眉山草木之説其理或然史謂母吞薏苡而生禹故夏之姓姒母吞玄鳥卵而生契故殷之姓子母履巨人之迹而生稷故周之姓姬夫薏苡者南方之草也漢馬援征交州始載而歸禹唐虞時人生於石鈕長於西羌乃極北之地在唐虞之世以地論之去交州一萬餘里以時論之去漢一千餘年其母修己氏安得薏苡而吞之乎玄鳥者隨陽之鳥也春即南征遺卵於南而生雛矣至秋始歸於北契乃帝嚳之子帝嚳居髙辛之國北方之地玄鳥南征而卵不生北其母簡狄氏居北又安得元鳥之卵而吞之乎大人亦人也人去迹存其所存者土耳土無氣之物也豈有履無氣之土而生有氣之人乎以豫揣之感草者當妊草而生草感鳥者當妊鳥而生鳥感土者當妊土而生土况復能妊人而生人乎此史氏博採遺言以明聖賢所生之異而不知其為不經也後人據之以為實也怪矣哉孔子之生日麒麟吐玉書於闕里其文曰水精子降衰周為素王顔氏異之以繡紱繫麟角而去妊十一月始生又曰孔子誕夕有二龍繞室五老降庭聞鈞天之樂空中考之年譜孔子生於魯襄公二十二年庚戌十一月庚子甲申時蓋晝時也非夕也豈有當晝之時五老降庭二龍繞室魯人無大驚駭乎凡有驚駭人無不知則亦無所不書何獨祖庭廣記能書之邪麟之吐書其書非麟腹中之所素有是誰納之麟腹使復吐乎無乃形容大聖之生而不知其所以生也蓋大聖之生自得天地一段正氣非雜揉而出者也恐亦不當以此怪誕不經之説形容之矣史謂漢髙祖之生其母劉媪息大澤中夢與神遇是時雷電晦𡨕太公往視之見蛟龍於上已而有妊夫龍之為物取之以象聖人者以其變化不測靈於天下之獸如聖人靈於天下之人也然龍雖至靈殆非人類矣未聞人與龍交復生人也無乃人異漢髙祖之生以布衣起於草莽以干戈成夫帝業三代以來之所未有世假此以言其盛耳謂劉媪當雷電之時息於大澤中夢與神遇太公至而始覺此或有之謂與龍交而生髙祖恐亦謬矣史官筆此吾恐不足以信萬世唐虞三代盛時天地氣數之盛人之稟受亦盛氣盛故人多壽三代末時天地氣數不盛人之稟受亦不盛氣不盛故人少壽如堯年百十有五舜年百有十禹年百歲湯亦百歲文王年九十七武王年九十三皆唐虞三代盛時之人多壽孔子之年七十三顔子之年三十二伯魚伯牛皆早死此皆三代末世之人少壽物所遇為命聖賢生遇氣盛之時則多壽生遇氣衰之時則少壽豈德有優劣哉故曰死生有命堯舜之君非不欲傳其位於子以舜禹久相丹朱商均又不肖故堯傳舜舜傳禹不能傳之均朱禹亦非不欲傳之益期與堯舜事等益相不久而啓又賢故傳啓不傳益此天也非人也孔子以大聖之才不得衛卿之位孟子以亞聖之才不得齊卿之位衛齊非不欲卿孔孟也自不能無沮也沮之者天也亦非人也故曰富貴在天人生名山大川之下得扶輿清淑之氣者其人多壽生於深山窮谷無功名富貴以撓其心安靜以保乎其氣者其人亦壽可見矣夫壽本乎氣氣原於所稟之初或養於所存之後者也世有借勢納賂不由正道而致富貴者故下愚之人皆享厚祿挾巧用智不用正路而竊功名者故小人之才亦在髙位屈其身而不為羞降其志而不為辱老死而不去逆天孰甚焉厲鬼殺人世有是言豈其有是理哉謂殺人者不過如周宣趙簡伯有之事蓋周宣無辜殺杜伯宣王以死期將至故見杜伯執彤弓射之而死趙簡公無辜殺莊子義簡公亦死期將至故見子義執彤杖箠之而斃鄭伯有貪愎多欲死後有人夢伯有曰今年壬子殺帶明年壬寅殺段後段與帶依期而死是夢之者其神之靈有以兆其事也人之死者自死厲鬼豈能殺之哉世以厲鬼殺人其惑人者巫氏也巫氏倡周宣趙簡伯有之事以惑人使祭祀焉其謀小其惑大也程子信伯有之事伯有豈如是乎此别是一説或問曰人死形歸於地固難殺人矣氣浮於天或有聲乎愚應之曰不觀之風乎風氣也風不能鳴必鼓草木宫室然後鳴焉不觀之管乎管物也管不能自響必藉之以氣然後響焉人死則形歸於地矣而氣則無所繫也氣浮於天矣而形則無所涉也氣之與形兩無關涉其不能為聲也明矣人之氣聚而生氣散而死死之順其常者人鬼也其氣未盡而死非其常者厲鬼也又有老而當死德髙氣厚用事精致而魂魄強或位尊權重用物精多而魂魄強者亦為厲鬼也古人於此皆為之立後使死有所歸至能受人祭祀亦所謂神也其氣久而亦散不復為厲鬼矣朝無咎象戲十九路九十八子亦三十二子而增廣之耳其圖未見其説僅存所謂廣十一路為十九路者半局之數也以三十二子為九十八子者盡全局焉嘗以意度之半局十九路者將一士二象四車八馬八炮十二卒十四共四十九子故全局得九十八子也蓋謂古局三十二子兩軍其意苦不若以九十八子為兩軍其意少放十九路者盡強弱之形九十八子者盡死生之勢死生強弱變化無窮茍得其説涿鹿之戰當在目前東坡曰著棋飲酒挑糞吾皆不能於愚亦然故今因朝無咎之説而推之或者古戰法所在也愚一日得宣和牌譜觀之見天地間理常寓之於數而數常根之於理蓋有數必有理故以理裁之作是牌者或者其知易乎夫易之爻以六而極牌之數亦以六而極易之畫有三才之義牌之數亦三才之義易之所謂三才者初二立地之道曰柔與剛也而牌之數亦以下為地道地取其始故以一為地牌而包乎二則一剛二柔之義存焉易之三四立人之道曰仁與義也而牌之數亦以中為人道人取其成故以四為人牌而包乎三則三仁四義之義存焉易之五上立天之道曰隂與陽也而牌之數亦以上為天道天取其極故以六為天道而包乎五則五陽六隂之義亦存焉一六者天之氣下交於地一五者地之氣上交於天一三者地之氣上升而與人會四六者天之氣下交而與人通故皆重而為對其間一者地也三者人也人生而植於地鍾和氣之最者也故以地氣上升而與人會者為和牌居乎三才之後而髙出於諸對之上也二二者地道闕而當補三三者人道損而當益五五者天道虧而當盈是以五六連而天道全三才之道惟天為大故以天道全者為天驗三居乎天地人和之後而壓諸牌之對也其餘一二一四二三二四三四四五二五三五二六三六又天地之氣雜揉而出者也故皆單而不雙流行於四牌七對之內如易九六之迭用也蓋推天地之數本易以象三才而作者也四牌之象則又孟子所謂天時不如地利地利不如人和作者之意或在是乎嗚呼亦微矣哉不識宣和初意亦如是乎蓋亦推其意而為之説如此夫東溪日談録卷八
